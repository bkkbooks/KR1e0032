body:
  text: 葉氏春秋傳卷十八宋葉夢得撰昭公二九年春叔弓㑹楚子于陳許遷于夷夏四月陳災外災不書此何以書存陳也楚既滅陳而以其國災告君子以為陳非楚之所得有此陳災非楚災也故正其名以存陳也葉子曰春秋滅國多矣君子何獨於陳致意焉陳舜之後而天子以為三恪者也子在齊聞韶三月不知肉味曰不圖為樂之至於斯而况其後乎陳亡而舜不祀矣楚滅六臧文仲聞之猶曰臯陶不祀忽諸此君子之所以欲存陳也秋仲孫貜如齊仲孫貜吾大夫之三命者也冬築郎囿築囿者何包地以厲民也古者諸侯一囿成築鹿囿已過矣今又於郎以築焉成公之囿以鹿名見從禽也昭公之囿以郎名見包地也其為民則俱已殆矣十年春王正月夏齊欒施來奔欒施齊大夫之三命者也秋七月季孫意如叔弓仲孫貜帥師伐莒季孫意如吾大夫之三命者也師舉元帥其言意如弓貜者大夫強而各為帥也戊子晉侯彪卒九月叔孫婼如晉葬晉平公十有二月甲子宋公成卒十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申誘者何詐之也楚子在申召蔡靈侯伏甲而饗醉而執之葉子曰蔡人殺陳他春秋以討賊之辭與之般負弒君之罪十有三年諸侯不能討而楚討焉然不得與陳他同辭而楚子不免於名何也楚子且不可以討齊慶封何可以討般而况於詐之乎故衛侯燬以誘滅邢侯名楚子䖍以誘殺蔡侯名然則何以不曰楚子䖍誘執蔡侯般于申賤之也可與齊慶封同辭不可與滕嬰齊同辭楚公子弃疾帥師圍蔡公子弃疾楚大夫之三命者也五月甲申夫人歸氏薨襄公之夫人也大搜于比蒲搜言大大比之禮也古者寓兵於農自五家之比為閭為族為黨為州而六卿立焉自五人之伍為卒為兩為旅為師而六軍立焉四時之田以習武事者軍而已合兵與農而挍其夫家之衆寡均土地閲老幼至於貢賦車輦無不盡治則三嵗一修之曰大比常時不書此何以書季氏之為也葉子曰吾何以知大搜之為大比歟大搜之禮以辨鼓鐸而已然而春秋之時晉作三軍以謀帥則謂之搜鄭因火以簡兵則謂之搜有伐而告諸侯稱搜有社而誇國容稱搜者則非春田也大比也魯自作三軍三分公室取其二民之與賦猶有其一也至舍中軍四分公室而盡征之則民之與賦皆非公之所得有大搜所以書豈以兵民之權盡在於季氏內以脅其君而外以威其敵者歟左氏以為自根牟至于商衛革車千乘此非紅之事比蒲之為也故昭公以是而失位定公以是而得國彼無以制之則君之所廢置唯其所欲為昭十有一年而再舉猶云可也定比年而迭舉則有甚焉哀公所以欲假越而為之謀者誠知其無以自為國也仲孫貜㑹邾子盟于祲祥秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人杞人于厥憗華亥北宫他宋䘙大夫之三命者也九月己亥葬我小君齊歸齊諡也冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之有未踰年之君也何以稱世子與之以繼世也有靈公之子誅君之子不立疑不得繼世者也楚子圍蔡有不為之服八月而後克之執有以歸而用焉非以有歸也以為如是而後世子之道盡矣用之者虐之也是以先名而後言用之之緩辭也不與其正之辭也此楚子也則曷為謂之師不正其伯討則是其為師焉者而已矣十有二年春齊髙偃帥師納北燕伯于陽髙偃齊大夫之三命者也陽北燕之邑也何以不言納于北燕未得北燕也其曰納與其納也三月壬申鄭伯嘉卒夏宋公使華定來聘公如晉至河乃復五月葬鄭簡公楚殺其大夫成熊成熊楚大夫之三命者也熊與鬭氏同出於若敖氏楚人惡鬭椒之亂或譛成熊於楚子曰若敖氏之餘也成熊知之不能去楚子於是殺之成熊之死罪纍上也故以國殺秋七月冬十月公子憖出奔齊公子憖吾大夫之三命者也楚子伐徐晉伐鮮虞鮮虞白狄之别族也晉何以舉國貶之也荀吳欲伐鮮虞僞㑹齊師而假道焉以入昔陽遂因其師而伐鮮虞詐而乘人以是為非正之道也十有三年春叔弓帥師圍費費季氏之邑也邑不言圍此何以言圍以公之不能正費也南蒯季氏之家臣季平子不禮於南蒯謀出季氏立公子憖不克而叛於齊有季氏之強而後南蒯得以肆其惡以國有政焉則不至於是也夏四月楚公子比自晉歸于楚弒其君䖍于乾溪弒君未有言自者何以言公子比自晉歸於楚比歸而後楚子可得弒也靈公為無道作乾溪之臺三年不成公子弃疾召比脅而立之然後令于乾溪之役曰比已立矣後歸者不得復其田里衆罷而去靈王無與處於是經而死故以比主弒也葉子曰召比脅而立之者弃疾也今以比主弒則弃疾為免歟春秋之義常加於人之所疑而不加於人之所不疑弃疾之罪固無得而逃矣比之非其謀則世或疑其可免焉使比知己之不可立效死而不聽則靈王固未遽死矣今告之謀而聽立之為王而從雖曰脅之終不以己之私易靈王之死則靈王之死非比為之乎治弃疾則比免治比則弃疾不免君子於是以比主弒也楚公子弃疾殺公子比此討賊也何以言公子弃疾弃疾亦弒君者也故以兩下相殺之辭言之秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘劉子王之中大夫也八月甲戌同盟于平丘何以再地平丘善之也自申之㑹楚子主中國晉不復合諸侯者八年楚遂滅陳與蔡肆行於天下諸侯莫敢與之爭蓋晉政己衰矣雖齊之彊猶且附楚及昭公立而為是㑹因以服齊返陳蔡之君劉子在焉蓋請於王而為之也於是齊聽命而陳吳蔡廬皆得復其國興滅國繼絶世而楚知中國之有霸君子是以善之也公不與盟公何以不與盟邾莒訴公而不得盟也不得盟則何以不諱恥不足恥也邾莒不共晉而曰魯朝夕伐我我之不共魯故之以晉侯於是辭公子服惠伯曰君信蠻夷之訴以絶兄弟之國弃周公之後寡君聞命矣君子以是為不恥也晉人執季孫意如以歸辭公非矣又執意如非伯討也故以人執公至自㑹蔡侯廬歸于蔡陳侯吳歸于陳此蔡世子陳世子也何以曰蔡侯陳侯諸侯請於王而復之則君也何以不言復歸舊位已絶也君之則何以名復國之辭也內無君則何以復國之辭言之陳蔡已滅矣不名則無以别其為廬與吳也其言歸順辭也以王命復則其道為順也冬十月葬蔡靈公公如晉至河乃復吳滅州來州來國也何以知其為國邑不言滅外取邑有見則繫之國非有見則不書也十有四年春意如至自晉意如何以不氏一事而再見者卒名之也三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒冬莒殺其公子意恢意恢莒諸公子也何以不曰大夫非大夫也曷為以國殺莒郊公立不戚其父之喪善意恢而惡公子鐸鐸於是與蒲餘侯謀殺意恢而出郊公意恢之死郊公之為也十有五年春王正月吳子夷末卒二月癸酉有事於武宫籥入叔弓卒去樂卒事叔弓卒何以言有事於武宫籥入涖事而卒也君在祭樂之中大夫卒不以告涖事而卒事之變也大夫卒廢繹不廢祭以大夫為重而廢祭則忘尊以宗廟為重而不去樂則忘恩去樂卒事變之正也君子與焉葉子曰吾何以知在祭樂之中大夫卒不以告歟昔者衛有大史曰柳莊寢疾衛侯以為社稷之臣曰若革疾雖當祭必告則當祭大夫卒不告當祭而告者以柳莊為之也夏蔡朝吳出奔鄭朝吳蔡大夫之三命者也六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞冬公如晉十有六年春齊侯伐徐楚子誘戎蠻子殺之楚子戎蠻子何以不名兩鈞之之辭也以楚子為可外則誘殺不足誅以戎蠻子為可外則死不以正不足治所以兩不名之也夏公至自晉秋八月己亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公十有七年春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝八月晉荀吳帥師滅陸渾之戎陸渾之戎公羊榖梁作戎左氏作之戎當從左氏不正其詐周也晉欲伐戎而請於周曰欲有事於雒與三塗遂涉自棘津以滅陸渾是以謂之詐周故辭閒容之之緩辭也不與其正之辭也冬有星孛于大辰記異也大辰大火也言孛之在大火也楚人及吳戰于長岸吳伐楚令尹陽丐卜戰不吉公子魴以上流欲戰故以楚及吳言楚之主戰也何以不言師敗績兩夷狄之辭也十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災外災不書此何以書宋陳所志也衛鄭以同日為異也六月邾子入鄅秋葬曹平公冬許遷于白羽十有九年春宋公伐邾夏五月戊辰許世子止弒其君買止非弒而言弒因其志以見正也古者醫不三世不服其藥君有疾飲藥臣先嘗之親有疾飲藥子先嘗之止之不嘗藥既自以為罪矣是以因其志而正之也葉子曰趙盾與止皆加之弒者也而春秋之義不同趙盾加弒治之者也治之者所以戒天下之為人臣者也許止加弒與之者也與之者所以勸天下之為人子者也何以知許止之為與也董狐書盾弒盾始曰天乎無罪孰為盾而忍弒其君者乎則盾未知其過者也未知其過而不治則凡為人臣者皆得以自免故加之以弒使天下後世知有如盾者皆當與弒等故曰所以戒也許悼公死止曰我與夫弒者不立乎其位以與其弟斯哭泣啜飦粥嗌不容粒未踰年而死則國人不以弒責止而止自責其志宜可與也故從而加之弒者使天下後世知有如止者亦不敢自逃乎弒故曰所以勸也此悼公所以得葬於後如是而為人子之道盡矣故以許止一見法焉己卯地震秋齊髙發帥師伐莒髙發齊大夫之三命者也冬葬許悼公二十年春王正月夏曹公孫㑹自鄸出奔宋公孫㑹曹大夫之三命者也奔未有言自者此何以言自強也鄸㑹之邑也㑹有罪曹人將治之不服而走其邑曹人迫之然後出奔其固自絶於曹也可言自鄸奔不可言自曹奔葉子曰臧武仲據防求後於魯而後奔邾孔子曰雖曰不要君吾不信也武仲以求後而據防且不可㑹不服罪而走鄸其能免於春秋歟秋盜殺衛侯之兄縶縶公羊榖梁作輒左氏作縶當從左氏春秋不以疾名人縶靈公之庶兄也其不立非疾也盜微者也有國不能保其兄而使微者得以殺之以靈公為不能弟也故目兄冬十月宋華亥向寧華定出奔陳十有一月辛卯蔡侯廬卒二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘宋華亥向寧華定自陳入於宋南里以叛向寧宋大夫之三命者也南里國中之南也叛者叛於楚也秋七月壬午朔日有食之八月乙亥叔輒卒冬蔡侯朱出奔楚公如晉至河乃復二十二年春齊侯伐莒宋華亥向寧華定自宋南里出奔楚大搜于昌閒夏四月乙丑天王崩六月叔鞅如京師叔鞅吾大夫之三命者也葬景王葬天王不書此何以書不正其無故以大夫㑹葬也王室亂王室者何內也亂者何大夫爭立君也大夫爭立君則何以言王室亂亂自內作非有亂之者也葉子曰厲王言天下蕩蕩無綱紀文章而其詩曰枝葉未有害本實先撥故序詩者以為周室大壞幽王言西戎東夷交侵中國而其詩曰苕之華藝其黃矣故序詩者以為閔周室之將亡王室之為言固天下之所本猶枝葉之有幹也然王子帶之難襄王出居于鄭而不言亂襄王猶在也乃景王崩敬王未立周蓋未有君君之廢置唯劉單尹召毛五子之所為雖有王猛之正而不得立則天下何適以聽命此君子所以志其亂歟劉子單子以王猛居于皇王猛穆后之子太子夀之母弟也君薨稱子繫名王猛何以不言子與之以王而正其所得立也其曰以居于皇者何制在劉子單子也君者受顧命於先王而臣之所宜奉之者也立君而制於臣非立之道也皇畿內之邑言居則猛之所宜有也葉子曰吾何以知猛之為正而得立歟猛太子之母弟而幼也朝庶子而長也魯襄公無嫡立敬歸之子野而卒季氏欲立敬歸之娣齊歸之子裯穆叔曰不可太子死有母弟則立之謂裯雖敬歸娣之子而非嫡則不宜立也楚平王無嫡子西為庶長昭王雖以為太子而子常欲立子西曰太子壬弱其母非嫡也子西長立長則順謂子西與昭王皆非嫡而子西長則宜立也齊桓公以公子昭屬宋襄公桓公死齊人立武孟宋襄公伐齊納公子昭而春秋不與焉晉人以趙盾納捷菑于邾邾人以貜且捷菑皆庶子而貜且長趙盾不克納而春秋與焉夫必太子之母弟而後可以繼太子則猛為夀之母弟所得立者也必無嫡而後可以立庶長則猛雖在朝長所不得立也而朝之言曰王后無嫡則立長是謂太子為嫡而欲以長奪猛夫安知太子母弟亦嫡哉此固朝之所以絶於春秋也秋劉子單子以王猛入于王城王城西都郟鄏也其言入何難也朝猶在焉然則天子亦有難於天下乎不難則無以正朝之罪也故王猛入于王城言入天王入于成周言入冬十月王子猛卒曰王猛矣何以復言王子猛正終之辭也何以不言崩未喻年之王也葉子曰三家言猛事皆不同學者疑焉公羊榖梁皆謂猛為不得立不知其事而以春秋書入意之也左氏知其事矣而不能明其所得立王子朝賔起有寵於景王劉伯蚠惡賔起之為人而欲殺之惡朝之言以為亂而欲去之是猛為大子已定于景王而朝以寵欲奪之也及景王崩劉單見王猛殺賔起而盟羣公子則猛固已即喪次之位而見羣臣矣故後諡之曰悼王然而春秋不書焉者不正其未踰年而得稱王也敬王猛之母弟亦立於劉單春秋正名之曰天王使猛而得踰年則豈不以天王名之哉凡春秋以尊者見卑者以不正者見正者王子帶之亂見襄王不見子帶襄王尊也今猛與朝更為出入自猛居皇至于卒見猛不見朝則猛亦尊也朝書尹氏立而敬王立不書敬王正也今猛立亦不書與敬王同盟亦正也惟尊且正則天下皆其所得居矣故襄王書居于鄭敬王書居于狄泉猛亦書居于皇其辭一施之則猛之得立其事與義固已具之矣豈三家未之思歟十有二月癸酉朔日有食之二十有三年春王正月叔孫婼如晉癸丑叔鞅卒晉人執我行人叔孫婼婼以晉討邾人之訴使于晉晉侯執之使與邾大夫坐婼不從乃以其介當之而館婼於箕非伯討也故以人執晉人圍郊郊朝之邑也邑不言圍此何以言圍以朝在焉圍郊所以圍朝也朝始作亂蓋以郊要餞三邑之甲逐劉子焉晉以籍談荀躒之師納王何以書人貶也納王而使大夫非勤王之道也夏六月蔡侯東國卒于楚秋七月莒子庚輿來奔戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧夏齧陳大夫之三命者也此救州來之師也何以直言敗公子光之詐戰也楚以六國之師救州來令尹子瑕卒而楚師熸光以薳越攝將賤而多寵政令不一七國同役不同心乃請先犯胡沈陳以奔楚師詐之也六國之師何以不纍數略之之辭也胡子髠沈子逞何以言滅死也陳夏齧何以言獲生得也凡君死於位曰滅生得曰獲大夫生死皆曰獲滅國我滅之故文在上君死自滅也故文在下天王居于狄泉天王敬王也敬王猛之母弟所得立者也未三年則何以稱王曠年不可以無君踰年而稱者臣子之辭也尹氏立王子朝王子朝何以書立不正其立也其言尹氏立者何見世卿也朝始敗而奔尹尹圍誘劉他殺之敬王如劉尹辛復敗劉師而取西闈遂以立朝則立朝者尹氏非一人也是已王矣其猶曰王子朝者何不正其立則不與其得王稱也是猶王子朝云爾八月乙未地震冬公如晉至河有疾乃復復未有言疾者此何以言有疾見外此皆無疾也二十有四年春王二月丙戌仲孫貜卒婼至自晉婼何以不氏一事而再見者卒名之也夏五月乙未朔日有食之秋八月大雩丁酉杞伯郁釐卒冬吳滅巢巢國也葬杞平公二十有五年春叔孫婼如宋夏叔詣㑹晉趙鞅宋樂大心衛北宫喜鄭游吉曹人邾人滕人薛人小邾人于黃父叔詣吾大夫之三命者也趙鞅樂大心北宫喜游吉晉宋衛鄭大夫之三命者也此謀王室也敬王在狄泉趙鞅合諸侯之大夫輸王粟具戍人曰明年將納王葉子曰天子䝉塵諸侯奔走以問官守禮也今周之無王四年矣而朝猶在此諸侯所宜奔走以共奬王室而討罪人也晉為盟主雖能合諸侯而不親㑹卒無所效其力而春秋之辭不加貶何也古者能齊家然後能正其國能正國然後能正天下今王室釁起於父子而禍成於兄弟春秋既書曰王室亂見其治家者如此固不足以正國則何以責諸侯之不能正乎易曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣君子以為使諸侯而至是者周實有以召之故緩諸侯而急王室蓋將使有天下者得以自反也故於黃父一見法焉有鸜鵒來巢記異也鸜鵒非中國之禽宜穴而巢也葉子曰天有時地有氣橘踰淮而北為枳鸜鵒不踰濟貉踰汶則死地氣也天有時而生有時而殺草木有時以生有時以死石有時以泐水有時以凝山有時以澤天時也天反時為災地反物為妖故天失其時則書霣霜殺菽霣霜不殺草李梅實地失其氣則書鸜鵒來巢秋七月上辛大雩季辛又雩雩而得雨則書雩既雩矣何以又雩非請雨也欲聚衆以逐季氏也九月己亥公孫于齊次于陽州奔也內不言奔若曰不有其地而自去云爾陽州齊地次于陽州待命于齊也齊侯唁公于野井唁弔也弔死曰弔弔生曰唁冬十月戊辰叔孫婼卒十有一月己亥宋公佐卒于曲棘曲棘宋地何以書非正也十有二月齊侯取鄆鄆魯鄆也外取內邑不書此何以書欲居公也公不能自有其地而齊取之以居公為公者病矣其挈齊侯者不能納公而徒取其地以居之非諸侯之道也二十有六年春王正月葬宋元公公已出矣孰葬之以公命葬之也以公命葬者猶以為有公也葉子曰昭公既出魯之政盡在季氏矣然春秋交諸侯之事未嘗不書而王室與諸侯所當告者亦未嘗不赴蓋季氏避逐君之名而以公自出告於諸侯凡國之事皆以公命行之而王室諸侯亦不以魯為無君而不赴故春秋所書與常法一施之將以見季氏雖有無君之心而不敢不畏於名王室諸侯亦不以季氏而亡公則公固非季氏之所能絶也葉氏春秋傳卷十八
