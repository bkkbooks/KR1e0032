body:
  text: 葉氏春秋傳卷十三宋葉夢得撰宣公三猶三望𦵏匡王楚子伐陸渾之戎陸渾之戎公羊榖梁作戎左氏作之戎當從左氏不正其詐周也楚子将至雒觀兵于周疆假伐戎以過之於是問鼎輕重焉是以謂之詐周辭閒容之之緩辭也不與其正之辭也夏楚人侵鄭秋赤狄侵齊宋師圍曹冬十月丙戌鄭伯蘭卒𦵏鄭穆公四年春王正月公及齊侯平莒及郯莒人不肯不肯者非弗肯也義可從而不從曰弗肯義不可從而不從曰不肯郯魯婚姻之國有莒怨公欲平之挾齊以脅焉義不足以服莒也莒人則不肯者非獨其君云爾公伐莒取向向莒邑也内取外邑不書此何以書不正其伐取也平人不肯而伐之莒固有辭矣又從而取其邑宜不能服莒也郯亦自是不終其好而伯姬来歸矣秦伯稻卒夏六月乙酉鄭公子歸生弑其君夷此弑者公子宋也曷為以歸生主弑宋欲弑靈公而謀于歸生使歸生能為公子友則宋之惡可遏而靈公亦免矣既不以告反畏宋譛而從之則成宋之弑者歸生之為也春秋用法常施於所疑而不施於所不疑於所不疑則舉重於所疑則舉輕以見重宋之弑無可免之道而歸生甞拒宋或疑於可免故治歸生則宋自見非以歸生薄宋也赤狄侵齊秋公如齊公至自齊冬楚子伐鄭五年春公如齊公始即位公子遂季孫行父一嵗而三聘齊猶可為也至是更三時而再朝則魯失位而屈於大國至公而不可復亢矣夏公至自齊秋九月齊髙固来逆叔姬髙固齊大夫之三命者也叔孫得臣卒冬齊髙固及子叔姬来子叔姬来歸寜也宣公在而子叔姬歸寜節矣何以書以髙固之俱行也禮大夫非君命不越竟楚人伐鄭六年春晋趙盾衛孫免侵陳孫免衛大夫之三命者也夏四月秋八月螽冬十月七年春衛侯使孫良夫来盟孫良夫衛大夫之三命者也夏公㑹齊侯伐莱秋公至自伐莱大旱冬公㑹晋侯宋公衛侯鄭伯曹伯于黒壌八年春公至自㑹夏六月公子遂如齊至黄乃復至黄乃復有疾也不書有疾君行有疾可復臣行有疾不可復大夫以君命出致使雖死以尸将事復譏廢命也辛巳有事于太廟仲遂卒于垂有事者何四時之常祭也四時常祭不書此何以書為仲遂卒猶繹起也仲遂弑君不得卒者也何以不言公子遂貶也貶則何以謂之仲遂宣公盖嘗賜之族矣曰是猶公子友之為季友者也垂齊地何以地外也壬午猶繹萬入去籥繹者何祭之明日也夏曰復商曰肜周曰繹萬舞也籥節舞者也同謂之樂猶可以已之辭也禮大夫死廢繹公知其當廢而猶舉之故去其有聲者而存其無聲者以公為無㤙也葉子曰大夫死而廢宗廟之祭禮歟曰非禮也昔者曾子嘗問于孔子曰諸侯之祭社稷爼豆既陳聞天子崩后之喪君薨夫人之喪如之何曰廢則非此四者皆不廢也而况於宗廟乎然則繹之得廢何也繹非正祭也禮有正祭有繹祭君子以為祭之所以事其先者至矣而猶恐有所未盡故於其明日為位於廟門之外而賔尸謂之繹正祭主於禮神而以宗伯將事繹祭主於禮尸而以士將事禮旣以是為差則所以事其先者亦有閒矣而大夫國體也未有聞其死而不哀者繹於祭為輕大夫於國體為重君子以所重權所輕則亦有時而可廢矣故檀弓記仲遂卒於垂壬午猶繹孔子以為非禮也卿卒不繹則是特施之於繹而已春秋之時君臣之義薄矣無罪而殺大夫無國而無有君子以為殺者吾無以救而死者又無以申其恩則天下無復與為臣者矣雖弑君之賊亦假之以致意故以仲遂一見法焉戊子夫人嬴氏薨宣公之妾母也何以稱夫人致之為夫人也致之則何以不言致之内辭也葉子曰魯之妾母五仲子也成風也敬嬴也定姒也定弋也自仲子始見於隐公之世春秋書歸惠公仲子之賵考仲子之宫初献六羽以見譏然仲子不為夫人於惠公則隐公之譏如是而己至成風則僖公致之為夫人矣魯之妾母為夫人自成風始書禘于太廟用致夫人王使榮叔歸含且賵王使召伯来㑹𦵏秦人来歸僖公成風之襚凡可以見譏者無不著所以正妾之不得為夫人也然而書薨書𦵏正以夫人小君名之者盖夫人之矣雖春秋不得而奪也自敬嬴而下惟定弋以哀公未君未得致之為夫人而敬嬴定姒皆以夫人書使宣公襄公未嘗致之為夫人則春秋惡得而名哉由是言之自成風而後凡為妾母者盖皆致之為夫人而春秋不可以徧書故於成風一見正而敬嬴以下無譏焉臣子之義也晋師白狄伐秦楚人滅舒蓼秋七月甲子日有食之既冬十月己丑𦵏我小君敬嬴雨不克𦵏庚寅日中而克葬敬諡也雨不克𦵏止而待之至於克𦵏禮也克之為言致力而後勝之者也不克𦵏非弗𦵏也欲致力而不得也葉子曰諸侯之𦵏為雨止禮歟禮也古者庶人縣窆不封不樹不為雨止潦車載蓑笠盖士之禮然言縣窆則有隧窆者矣言不封不樹則有封樹者矣言不為雨止豈固有為雨止者乎禮之降殺未有虚加之者亦各稱其情而已天子七月而𦵏所以待同軌諸侯五月而𦵏所以待同盟大夫三月而葬所以待同位非特以是為節盖禮有略而可得為者有詳而不可得為者可為而不為則緩緩則不恪不可為而為則亟亟則不懷自大夫而上其禮以次加詳則有不可以遽為者𦵏不為雨止特為士庶人言之爾諸侯旅見天子雨霑服失容雖入門猶廢而況送死之大乎或者乃以為通上下之辭榖梁氏之失也城平陽不時也楚師伐陳九年春王正月公如齊公至自齊夏仲孫蔑如京師仲孫蔑吾大夫之三命者也齊侯伐莱秋取根牟根牟附庸之國也八月滕子卒九月晉侯宋公衛侯鄭伯曹伯㑹於扈晉荀林父帥師伐陳荀林父晋大夫之三命者也辛酉晉侯黒臀卒于扈扈晉地也何以不言卒于㑹㑹散矣晉侯以疾留而卒也卒于寝正也卒于外非正也卒人道之終也正不正不可以不謹故凡不卒于正寝者必地焉魯君卒于路寝小寝楚宫臺下且志况其國外乎葉子曰吾何以知晉侯之為會散而留也凡諸侯卒于師言師卒于㑹言㑹非不地也曰師與㑹則既有地矣春秋諸侯擅相征伐盟㑹雖不能無得罪於王法然有救災恤患謀事補闕之道焉故凡卒於是者葬之加一等則春秋實不得不與也不地而言師與㑹蓋録之也今㑹扈之後閒有荀林父伐陳之事而見卒非㑹散而何伐楚之役許男在焉及其卒書許男新臣卒而不言師歸卒其國中也扈之㑹晉侯在焉及其卒書晉侯黒臀卒于扈而不言㑹卒于㑹散也吾是以知之冬十月癸酉衛侯鄭卒宋人圍滕楚子伐鄭晉卻缺帥師救鄭陳殺其大夫洩冶洩冶陳大夫之三命者也靈公之惡洩冶見其㣲則當諫諫而不從則當去逮其宣滛於朝而後言焉洩冶之死罪累上也故以國殺葉子曰洩冶其猶可以為罪歟曰昔者晉假道於虞以伐虢宫之竒諫百里奚不諫孟子不多宫之竒之諫而以百里奚為智曰知虞公之不可諫而不諫可謂不智乎靈公之惡固有自来矣而孔寧儀行父者洩冶之所得治者也既不能誅二人以正一君又見不可而不能止雖能言之徒以殺其身則異乎從君於昏者無幾志士仁人無求生以害仁有殺身以成仁所貴於殺身者為其足以成仁也殺身而不足以成仁君子何取焉然則比干非歟曰是不可以一道也比干貴戚之卿㣲子既已去矣使比干而復去誰與扶其宗者故雖死不失其為仁此君子所以立教也洩冶異姓之卿三諫不從則去而已何必至於死故曰所謂大臣者以道事君不可則止故以洩冶一見法焉十年春公如齊公至自齊齊人歸我濟西田此其為賂也曷為歸之以我為能事已也何以不言取濟西田曰是我濟西田也而齊人反歸之乎公以是病矣邴鄭邑也我非所當入而入故於入言我惡其取濟西我田也齊非所當取而取故於歸言我惡其與也夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衛崔氏崔杼也何以舉族杼齊之世卿盖力足以專齊者也其歸於是乎弑莊公公如齊五月公至自齊癸巳陳夏徵舒弑其君平國夏徵舒陳大夫之三命者也六月宋師伐滕公孫歸父如齊𦵏齊惠公公孫歸父吾大夫之三命者也晉人宋人衛人曹人伐鄭秋天王使王季子来聘季子王之季子也何以不名未大夫也未大夫則何以書愛之使行大夫之事也以為愛其子則可以之行大夫之事則不可君子以天王為爱其子而輕大夫也古者天下無生而貴者也二十而冠四十而仕五十而爵而後為大夫雖天子之子猶士也故齊侯以其弟年来聘譏天王以季子来聘譏公孫歸父帥師伐邾取繹繹邾邑也内取外邑不書此何以書不正其伐取也大水季孫行父如齊冬公孫歸父如齊齊侯使國佐来聘饑饑者何食不足也一榖不登曰嗛二榖不登曰饑三榖不登曰饉四榖不登曰康五榖不登曰大饑古者三年耕必有一年之蓄九年耕必有三年之蓄以三十年通計之則有九年之蓄故凶年可以補敗是為教民之道二榖不登而饑其為民者病矣何以於冬焉書冬五榖畢登之時也楚子伐鄭十有一年春王正月夏楚子陳侯鄭伯盟于辰陵公孫歸父㑹齊人伐莒秋晉侯㑹狄于櫕函冬十月楚人殺陳夏徴舒楚人者何討賊之辭也丁亥楚子入陳此討賊也何以書入陳不正其欲縣陳也楚子之伐陳盖在殺夏徴舒之先方其始謂陳人無動吾有討於少西氏遂殺徴舒而轘諸栗門孰知楚子之非討賊哉謂之入陳不可也則書楚人殺陳夏徴舒足矣及欲貪其地而有之雖能用申叔時之言不終其志與得而不居者何以異則亦入陳而已故於是再見入陳與入國之辭一施之納公孫寧儀行父于陳公孫寧儀行父皆陳大夫之三命者也納者何與其納也公孫寧儀行父陳大夫之與君同惡者也則何以得言納能討賊者也臣弑君在官者殺無赦靈公之死陳人未有能討徴舒者寧儀行父獨訴之楚而君讎復雖欲不與之可乎然而以楚子納寧行則可以寧行為陳之大夫則不可故不繫之陳不正其為大夫而君由之以弑者也十有二年春𦵏陳靈公楚子圍鄭此入鄭也何以言圍與楚子也楚子圍鄭旬有七日鄭人卜行成不吉不服楚子退師復修城而進圍之又三月始克入自皇門鄭伯降楚退三十里而與之平則圍鄭者楚志入鄭者非楚志也葉子曰楚圍鄭盖怒其貳也以夷狄而争中國雖有善焉義固不得與然此為楚鄭言可也入國非諸侯之善辭自諸侯推之安有舉師問罪待之百日而不服雖得之有能不有其地與之平而去尚可以入國之罪責之乎春秋之法義不勝人則責其人人不勝義則責其義故言楚之於鄭則雖終天下而不可得若其義則諸侯之所不可奪亦不可以楚而遂廢故以鄭一見法焉夏六月乙卯晉荀林父帥師及楚子戰于邲晋師敗績晋師救鄭聞楚平欲還先縠不可荀林父不能止而請戰故以林父及楚子言林父之主戰也秋七月冬十有二月戊寅楚子滅蕭蕭宋附庸之國也晋人宋人衛人曹人同盟于清丘是晉原縠宋華椒衛孔逹也何以稱人貶大夫而始同盟也葉子曰左氏以言恤病討貳則然矣而曰不實其言而不書卿豈以衛救陳而晉不討楚伐宋而晉不救者歟夫大夫盟而後能實惟向戌於宋爾春秋固有異文外此未有不叛者何獨於清丘責之是蓋知其為貶而不知其說也宋師伐陳衛人救陳十有三年春齊師伐莒夏楚子伐宋秋螽冬晋殺其大夫先縠先縠晉大夫之三命者也邲之敗固先縠之為矣晉侯既釋荀林父已而恥不得志復殺先縠先縠之死罪累上也故以國殺葉子曰晉之殺先縠冝若有罪然而春秋以國書之何也古之任將推轂而命之曰閫外之事將軍主之雖君命有所不受邲之役晉侯既以荀林父主中軍而先殺佐之師之進退實在林父舉六卿之衆不能奪一先縠遂至於敗使歸而誅主將非林父其孰為之首乎及其請死乃釋之而不問既失刑矣己乃恥不得志獨追咎而殺之則先縠安得無辭此亦不免乎累上者也十有四年春衛殺其大夫孔達孔達衞大夫之三命者也宋責清丘之盟而伐陳以其附楚也孔達背盟而救陳衞侯不能止晉人以為討衛侯懼乃復殺孔達以說於晉孔達之死罪累上也故以國殺夏五月壬申曹伯壽卒晉侯伐鄭秋九月楚子圍宋𦵏曹文公冬公孫歸父㑹齊侯于榖十有五年春公孫歸父㑹楚子于宋夏五月宋人及楚人平外平不書此何以書宋故也此圍者楚子也不勝将去使子反乗堙而闚宋城宋華元亦乗堙而出見之各告以其情楚子怒子反曰以區區之宋猶有不欺人之臣可以楚而無乎楚子於是引師而去君子以是為近王者之師也是子反華元也何以書人不與大夫得專平也何以宋人及楚人華元始告之曰憊矣易子而食析骸而爨子反曰噫吾聞之圍者柑馬而秣之使肥者應客是何子之情也乃告之曰吾軍亦有七日之糧爾盡此不勝將去而歸是宋有以先得楚者也六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸潞氏赤狄之别族也以歸囚服也何以名賤之也秦人伐晉王札子殺召伯毛伯王札子者何王之子札也召伯毛伯者何王之上大夫也兩下相殺不書此何以書不正其矯君命以殺二卿也何以曰王札子王之所親貴者也何以知其為矯王命而殺之則當書天王殺其大夫某子札忿怒而殺之則春秋所不書也盖王孫蘇與毛召争政使札子殺焉生殺王之大柄也札子得矯命而行之王之為王者無幾矣召伯毛伯何以不名札子殺之也葉子曰吾何以知札子之為王親貴者歟王子而為卿大夫以邑爵見者書邑爵以氏字見者書氏字其未為大夫則繫之王而已子瑕子虎是也然而晉人親貴卓則有曰卓子者焉衞人親貴伋壽則有曰伋子壽子者焉當時之辭也札子其猶是乎故得竊君命而矯用之春秋所以因而不革也秋螽仲孫蔑㑹齊髙固于無婁初稅畝稅畝者何履畝而稅也古者藉而不稅野以一夫受田百畝積九夫以為井以其八為私田一為公田謂之藉國中自園㕓至于漆林各視其地而征之多不過乎二十有五寡者止于十一謂之稅藉以田稅以地未有田而以畝稅者也舉貢之法而加之藉非正也魯盖自是稅畝矣初有終之辭也葉子曰魯固有藉矣而又稅焉此哀公所謂二吾猶不足者歟冬蝝生記災也未成謂之蝝既成謂之螽冬螽未成之時也饑十有六年春王正月晋人滅赤狄甲氏及留吁甲氏留吁皆赤狄之别族也曷為以甲氏及留吁嫌留吁之為甲氏也夏成周宣榭災災左氏作火公羊榖梁作災當從二傳災天事也火人事也春秋災不志火外災不書此何以書為成周也成周者何東周也宣榭者何宣王之榭也室有東西广曰廟無東西广有室曰寝有广無室曰榭榭所以講武事也秋郯伯姬来歸伯姬内女之嫁為郯夫人者也来歸者何出也何以不言郯人来歸伯姬出有罪之辭也冬大有年五榖皆熟也十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏𦵏許昭公𦵏蔡文公六月癸卯日有食之己未公㑹晉侯衞侯曹伯邾子同盟于斷道秋公至自㑹冬十有一月壬午公弟叔肸卒内大夫而後卒叔肸未為大夫則何以書卒賢之也公子三命以名氏見再命以名見曰弟云者母弟也叔字也何賢乎叔肸宣公弑子赤而立叔肸不義宣公之為欲去則曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為賢也葉子曰是外書所謂紀季蔡季者也内不可繫之國故舉字以加諸名之上然則與季友仲遂奚辨季友仲遂皆正卿也故可以功得賜族叔肸未嘗為大夫也則不嫌於為族是謂春秋羙惡不嫌同辭各於其事察之而已十有八年春晉侯衞世子臧伐齊公伐杞夏四月秋七月邾人戕鄫子于鄫戕者何暴之自外而賊殺之也鄫子不名惡邾也執之于邾而用之其虐固已甚矣戕之於鄫則又甚焉故人邾而不名鄫子其為惡至於此極則亦無所加辭也于鄫鄫亦有罪也國君而人得以戕之其為國者亦己殆矣甲戌楚子旅卒楚前未有書卒者此何以書卒始能以赴通中國也楚自荘王以椒來聘而漸能從中國之習矣椒以是得名故至是復能以其卒來赴進之也何以不書𦵏辟其號也録𦵏者當以主人之辭也公孫歸父如晉歸父仲遂之子也葉子曰齊晉盖相與為強者也宣公既因齊以得位勢不得不厚齊而棄晉三桓又附齊以自托者也故自即位聘好之使與身自朝齊者無虚嵗而未嘗一與晉通及三桓既張雖仲遂疑亦不能堪將謀去之非稍謝齊而假於晉不可故六年始為黒壤之㑹則仲遂之志也明年仲遂卒十年歸父始見逮晉景公復覇我始與諸侯為斷道之盟歸父之為此行殆行先君之志歟不幸宣公卒不克成君子猶以是録焉故後書還自晉至笙遂奔齊辭繁而不殺以與其正吾以是知左氏之言為有證也冬十月壬戌公薨于路寝歸父還自晉至笙遂奔齊大夫出疆未有書還者歸父何以書善之也何以不氏一事而再見者卒名之也禮大夫出聘君薨歸執圭復命于殯如聘然後行喪禮季孫行父既逐東門氏歸父還至笙墠帷復命于介袒括髮三踊而出遂奔齊君子以是為善也葉子曰桓宣皆與聞乎弑而自立者也何以桓不書王而宣書王歟桓不書王非特以其弑也昔者衞州吁弑其君完石厚問定君於石碏石碏曰王覲為可桓公死而後錫命盖為身未嘗覲王則桓之為君非受命於王者也宣不言錫命則宣固嘗覲於王矣覲而受命則春秋雖欲奪之王而不可也成公一元年春王正月公即位二月辛酉𦵏我君宣公無冰三月作丘甲丘甲者何軍賦也古者謂甲士為甲井田之法自九夫為井積十六井而為丘四丘為甸而後有軍旅之賦舉甸之賦而加之丘非正也作者何起而用之也猶曰作其衆庶然葉子曰先王賦於民者二有口賦有軍賦口賦常賦也大宰所謂九賦斂財賄者是也軍賦非常賦也有軍旅之事則征之縣師所謂受法於司馬以作其衆庶及馬牛車輦使皆備旗鼓兵器而稍人作其同徒輂輦者是也然其為法不可得而詳矣學者所言自丘出牛馬至甸為一乗然後甲士步卒具焉者司馬穰苴之法也然而司馬法甸而後出車一乗甲士三人而周官或謂甸為乗自天子建國至於大夫皆以乗為差則甸固乗之所出司馬法蓋本於周特其損益不可知爾故周制有言六畜車輦者則牛馬在焉有言六畜兵器者則甲士在焉而魯以丘為之是與子産作丘賦者同越先王之政而四之其厲民亦已甚矣盖魯自是有以四軍出者非多作其民則何以能成左氏以為有齊難故作丘甲此獨知之而公羊榖梁乃以工民為言審農工不相亂則何待丘使而始譏乎彼固不知先王有作民之政也夏臧孫許及晉侯盟于赤棘藏孫許吾大夫之三命者也秋王師敗績于茅戎茅戎戎之别族也何以不言戰王者無敵莫敢當也為之辭曰敗績于茅戎言王之自敗非敗於戎云爾葉子曰魯言戰不言敗内辭也言戰而不言敗某師則我固敗矣敗所恥也戰非所恥也故以戰見敗戰者諸侯之所宜有也王言敗不言戰天下辭也言敗績則固戰矣自敗可言也戰而敗不可言也故以敗見戰敗者雖王亦或有也冬十月二年春齊侯伐我北鄙夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績衛使孫良夫石稷寗相向禽将侵齊與齊師遇石稷欲還良夫不可而戰故以良夫及齊師言良夫之王戰也葉氏春秋傳卷十三
