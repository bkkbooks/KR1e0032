body:
  text: 葉氏春秋傳卷九宋葉夢得撰僖公二七年春齊人伐鄭夏小邾子來朝鄭殺其大夫申侯申侯鄭大夫之三命者也齊既再討鄭逃盟之罪孔叔言於鄭伯曰國危矣請下齊以救國鄭伯曰吾知所由來矣乃用陳轅濤塗之譛殺申侯以說於齊申侯之死罪纍上也故以國殺有國殺有人殺國殺者大夫有罪而君殺之君亦有罪而纍上者也人殺者大夫有罪而人殺之國人皆曰可殺者也古者大國三卿皆命於天子次國三卿二卿命於天子一卿命於其君小國三卿一卿命於天子二卿命於其君諸侯不得專殺大夫大夫國體也挈國與人殺者大夫之罪也挈殺其大夫者其君之罪也葉子曰吾何以知小國之亦有三卿歟五等諸侯之臣其命數則有間矣而卿大夫之名未之有别也蓋為之國者大小雖不同而設官分職之事則不可殺一官闕則一事廢矣既與共王事則未有不命於王者所以尊王也如是役也猶有私爵人而曠其官者况略之而無所受命乎則以為二卿而不命於天子者記禮者之失也秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于寧母陳欵鄭華何以得與盟諸侯有故則世子攝其君下其君之禮一等周道也曹伯班卒公子友如齊冬葬曹昭公八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮王人微者也序於諸侯之上先王命也鄭伯乞盟乞盟者何請盟也霸主有帥諸侯以共盟諸侯無乞霸主以請盟盟諸侯之所得為也鄭伯殺申侯以謝首止之逃則服罪矣然寧母之㑹以世子來而鄭伯不至則諸侯猶未信也故洮之役以王人㑹黜鄭不得與鄭伯於是懼而請盟乞盟猶乞師也有得不得焉師非我所有乞猶可言也盟我所得為乞不可言也有諸侯之㑹不能正其事乃至於下人而請焉賤之也夏狄伐晉秋七月禘于太廟用致夫人八年而禘禘之節也何以書不正其用之以致夫人且僭天子也夫人者何成風也成風僖公之妾母僖公欲尊之以匹嫡故因禘致於太廟始見其祖考為夫人不與非禘之道用禘者也成風遂為夫人矣故後薨以夫人風氏見不稱用致夫人風氏內辭也蓋魯自是以妾匹嫡致其志妾母之始而不言風氏其義則甚乎以風氏見也周之禘以七月日至魯之禘以季夏六月七月而禘僭天子也葉子曰三傳言夫人左氏以為哀姜公羊以為聲姜夫哀姜之為夫人固在莊公之世矣雖以罪討於齊僖公未之敢黜也故其歸曰夫人氏之喪至自齊何用至是而始致之乎聲姜不書至蓋僖公之娶在即位之前也以齊媵而得於傳無聞焉審僖公果以是易嫡則於至之日已定之矣何待禘而後始致之乎此皆理之必不然者吾固以榖梁之言為正也冬十有二月丁未天王崩九年春王三月丁丑宋公御說卒夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘宰王之太宰也何以言周公太宰而兼三公者也古者三公官不必備惟其人則以六卿有道者兼焉王人不得繫周劉子單子不得繫周宰周公得繫周三公論道經邦與王同體者也宋子未踰年之君也葉子曰子夏問於孔子曰三年之喪卒哭金革之事無辟也者禮歟初有司歟孔子曰夏后氏既殯而致事商人既葬而致事子夏曰金革之事無辟也者非歟孔子曰吾聞諸老聃曰昔者魯公伯禽有為為之也今以三年之喪從其利者吾弗知也故閔子要絰而服事既而曰若是乎古之道不即人心退而致仕孔子蓋善之也夫非禮之禮大人不為也其可有三年之愛而不盡於父母歟則雖伯禽為之固不以為常也而况因之以為利乎秦伐鄭晉襄公墨衰絰而敗之殽春秋貶而稱人君子之惡奪親也甚矣故春秋諸侯㑹征伐在喪而出與者或踰年或未踰年各以其實書之無所加損焉所謂不待貶絶而自見也而榖梁獨以宋桓公未葬背殯出㑹為無哀然則衛燬卒成公既葬而㑹於洮亦書子則無貶乎彼固未知春秋之意也秋七月乙酉伯姬卒內女未適人不卒伯姬卒許嫁也禮男子二十而冠字之不名列於丈夫三十而娶女子十五而許嫁笄而字之列於成人二十而嫁女子許嫁不為殤死則以成人之喪治之故亦以成人之禮卒焉葉子曰內女嫁為夫人則卒以尊同也為大夫妻則不卒厭也何以許嫁而卒之歟曰各以其服為之稱也女子在室為父母三年其嫁而適人降而為父母期故父母為之報也未嫁者服齊衰三月適人則服大功不以齊衰薄大功之喪此未嫁所以有加於已嫁者也九月戊辰諸侯盟于葵丘諸侯不序一事而再見也冉地葵丘善之也首止之㑹既已正父子而尊王室矣故於是合諸侯而授王政焉初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育材以彰有德三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸於好諸侯於是束牲載書而不歃血咸諭乎小白之志君子蓋以是善之也葉子曰惠王崩而襄王始立天子在喪可以王臣而會諸侯歟襄王之立非惠王之意而惠后猶在首止之盟雖已定而諸侯不能保其無如鄭伯之逃盟者則襄王固未知得終安其位也此霸主之所當憂則請於王而與之盟王亦出內臣而臨之有不得已者是以無易樹子猶載之初命如是而僅終喪猶有子帶之難則齊侯之慮君子不得不與也甲子晉侯佹諸卒冬晉里克殺其君之子奚齊里克晉大夫之三命者也奚齊未踰年未成君也故言其君之子未成君則不可以弒名故稱殺焉葉子曰弒君天下之大惡也可以未踰年而薄其罪歟曰春秋以名定罪若其義則亦各視其情而已矣齊商人之弒舍晉里克之弒奚齊皆未踰年之君也商人之弒以已也取而代之里克之弒以文公也蓋以納文公焉故於奚齊則不成其為君於舍則成其為君不成其為君者春秋之法也常也成其為君者春秋之義也變也法不可以變而亂名實義不可以常而廢善惡此政之所以行而教之所以立也十年春王正月公如齊如朝也凡公如皆朝朝君之事也大夫如皆聘聘臣之事也諸侯之邦交以世相朝非周道也即位大國聘焉小國朝焉霸主之令爾魯前有諸侯來朝者矣未有朝人者也蓋小白既霸魯於是事齊魯之屈於大國自僖公始矣狄滅溫溫子奔衛晉里克弒其君卓及其大夫荀息荀息晉大夫之三命者也及荀息賢也荀息不食其言者也葉子曰子糾之難召忽死之管仲不死孔子不嘉召忽之死而與管仲以仁里克傅申生申生死里克不死以納文公荀息以不正傅卓子卓子死而荀息死之春秋何以不與里克之不死而與荀息以賢歟子糾未君也卓子巳君也荀息之不正可責於傅卓子之初不可責於卓子弒之際夫受命而傅之既立以為君則君臣之義定矣可以君而不死其難乎言必信行必果孔子以為小人言不必信行不必果孟子以為大人夫言之不必信亦必有義焉而後可故非復言之為難而近義之為貴管仲之仁雖可與而召忽不可為不忠里克之罪雖可薄而荀息不可為不信亦各有義而已矣故曰人之欲善誰不如我我欲無二而能謂人已乎荀息蓋知之矣此春秋所以賢也夏齊侯許男伐北戎晉殺其大夫里克里克既弒卓惠公重賂秦以求入里克迎而立之惠公既得國曰又將圖寡人乃殺里克以說晉人里克之死罪纍上也故以國殺葉子曰晉里克衛寧喜皆弒君者也然其死不書以討賊之辭而與殺大夫一施之何哉所以殺者非討賊也始卓死惠公求入里克實迎立焉則惠公固幸卓之死而竊其位者也衛獻公之入立則固與聞乎弒矣是以求復於喜曰苟反政由寧氏祭則寡人此豈可責討卓與剽之賊者歟及其得國惠公則曰子弒二君一大夫為子君者不亦難乎而後殺克獻公既以政許寧喜而患其專乃與公孫無地公孫臣謀攻寧氏免余殺喜而尸諸朝則其討克與喜者皆畏其害已而除之者也孔子曰名不正則言不順其極至於刑罰不中無所措手足使惠公獻公初無愧於卓與剽歸正二臣之罪而誅焉春秋如之何不書曰晉人殺里克衛人殺寧喜乎而徒以行其私使二臣雖負弒君之惡而終得以免是謂名不正而刑罰不中者宜春秋之所謹也秋七月冬大雨雪大雨雪不志此何以志建酉建戌建亥之月書不時也十有一年春晉殺其大夫㔻鄭父㔻鄭父晉大夫之三命者也㔻鄭父里克之黨也惠公既殺里克㔻鄭父聘於秦未反請殺吕甥郤稱冀芮而納文公既歸秦使召三子郤芮曰幣重而言甘誘我也遂殺㔻鄭父㔻鄭父之死罪纍上也故以國殺夏公及夫人姜氏㑹齊侯于陽榖夫人姜氏聲姜也僖公不戒文姜之失而使夫人復㑹齊桓公不戒襄公之失而納夫人以為會皆過也桓公之業自是衰矣葉子曰吾何以知夫人之為聲姜歟言哀姜者已死矣言聲姜者見薨見葬而不見逆蓋僖公娶於世子之時故逆不書於經則夫人固聲姜也秋八月大雩冬楚人伐黃十有二年春王三月庚午日有食之夏楚人滅黃秋七月冬十有二月丁丑陳侯杵臼卒十有三年春狄侵衛夏四月葬陳宣公公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹秋九月大雩冬公子友如齊十有四年春諸侯城緣陵緣陵杞邑也外城邑不書此何以書城杞也淮夷病杞諸侯遷杞於緣陵而城之何以不言城杞不與諸侯之得專封也故為之辭若城其外邑然何以復言諸侯以不終乎城亦不序以見貶也楚丘之城也衛人忘亡緣陵之城杞未有聞焉以為有闕而去之則非救災恤鄰之道諸侯為不足序也與之故沒諸侯而為之辭略之故見諸侯而不序葉子曰春秋諸侯及大夫之行事有再見而不序者有初無所見而不序者再見而不序前目而後凡也初無所見而不序不足序而略之也故諸侯不序見於經者兩盟于扈一㑹于扈及是而四焉前盟于扈不與趙盾之臨諸侯後盟于扈不與晉伐齊而取其賂扈之㑹則欲平宋亂而後不果者也是皆以為不足言故略之略之者簡之也左氏以緣陵為闕後扈盟為無能為扈㑹為無功蓋近之矣然復或以為公後至或以為公不㑹故不序則不能必其說夫後至乃公之罪何與於諸侯而反不得序乎公羊榖梁或以為失序或以為略或以為桓德衰皆僅知其端而不能盡蓋春秋之義有在於詳略者非比事而深考之未足以言君子之意也夏六月季姬及鄫子遇于防使鄫子來朝季姬內女也內女則何以得遇鄫子愛季姬使自擇配也季姬已許嫁邾子鄫子來請婚僖公未知其所與也則召鄫子見季姬以擇之若邂逅相遇然防魯地季姬以為可而後鄫子來朝以請故以季姬及鄫子非婚姻之道也何以言使鄫子來朝鄫子以國君使乎季姬賤之也葉子曰吾何以知季姬之遇為擇配與季姬不繫鄫則未嫁之辭也後見季姬歸於鄫則始嫁之辭也於是乎擇之矣魯之亂始於不能正家僖公雖賢而不知禮故致成風為夫人則非所以事其母及聲姜以㑹齊侯則非所以間其妻愛人以姑息而已則安得以禮正季姬哉王政之不行蓋雖子産為鄭不能奪公孫黑之强委禽乃從徐吾犯妹之所欲以與子南其習俗有自然矣公羊乃以為奔則巳甚夫奔匹夫匹婦之事也豈可行之於有國故吾以徐吾犯妹與子南之事推之而後知其說云秋八月辛卯沙鹿崩記異也沙鹿梁山皆在晉不繫之晉名山大澤不以封為天下記異也葉子曰是所謂百川沸騰山冢崒崩高岸為谷深谷為陵者歟此幽王之詩也故曰國必依山川川竭山必崩亡之徵也伯宗其知之矣狄侵鄭冬蔡侯肸卒十有五年春王正月公如齊楚人伐徐三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡前救邢先言次于聶北聶北邢地以次為救者也此救徐先言次于匡匡衛地不果於救者也故以其大夫往焉非救之道也公孫敖帥師及諸侯之大夫救徐公孫敖吾大夫之三命者也以敖主兵內辭也大夫何以不序無功不足序也楚遂敗徐于婁林齊自是不復救人矣夏五月日有食之秋七月齊師曹師伐厲八月螽九月公至自㑹季姬歸于鄫已卯晦震夷伯之廟記異也晦月晦也夷伯魯大夫夷氏也伯字也大夫則曷為以字見大夫卒則不名也震雷擊之也桓宫僖宫災孔子在陳聞火曰其桓僖乎為其親盡而當毁也夷伯之廟必有不得其正者矣故辭間容之之緩辭也不與其正之辭也葉子曰是在周易所謂洊雷震君子以恐懼修省者歟天之威怒非苟然也成王未知周公秋大熟未獲天大雷電以風禾盡偃成王啓金縢之書曰今天動威以彰周公之德天乃雨反風禾則盡起是以君子迅雷風烈必變中夜必興正衣冠而坐以為天不可不畏也故以夷伯一見法焉冬宋人伐曹楚人敗徐于婁林十有一月壬戌晉侯及秦伯戰于韓獲晉侯秦伐晉惠公逆而請戰故以晉侯及秦伯言晉之主戰也以力得之曰獲不言師敗績君獲舉重也晉侯不名內未有君也執言以歸獲不言以歸執而以歸者屈服也獲而不以歸者非屈服也十有六年春王正月戊申朔隕石于宋五記異也外異不書此何以書二王之後也聞其隕而知其石數之則五也于宋國中也不言隕石五于宋嫌有隕之于宋者也葉子曰春秋不書晦朔惟記異與戰則書古者謂朔月為吉月惡其始之不能吉也用兵有違晦惡其隂之窮也故震夷伯之廟書晦戰于鄢陵書晦隕石于宋書朔戰于泓書朔謹始慎終之道也是月六鷁退飛過宋都是月逮是月也不得其日則嫌與上同日也鷁水鳥不能髙飛以進為順退飛猶逆飛也五石先物近也近者察其形而後知其數六鷁先數逺也逺者見其數而後辨其物都鄙也自是而之他矣三月壬申公子季友卒此公子友也何以言季友猶仲遂始賜族也賜族多矣何以獨言季友仲遂季氏後逐君仲氏身弒君世卿强而專國者也葉子曰吾何以知季友仲遂之為賜族歟古者天子以姓氏旌羣臣故舜以禹治內賜姓曰姒封之於夏而氏有夏以四嶽治外賜姓曰姜封之於吕而氏有吕天子之氏氏其土也諸侯不得以地與人則不得賜姓與氏故公孫之子氏以王父之字别其宗云爾而大夫之有功德者賜之族或以其氏或以其諡或以其官或以其邑天子命氏則世國諸侯賜族則世官天子諸侯之辨也故衆仲曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之凡族皆死而後賜之者也季子殺叔牙曰公子從吾言必有後於魯國及其死而立叔孫氏不待孫而稱叔孫此以氏為族者也而春秋之世亦有生而賜之族者諸侯討宋亂取華督賂而立華氏此周之末造也然則友未氏而先見季遂未氏而先見仲非以世卿故志其始賜族而特書之歟夏四月丙申鄫季姬卒秋七月甲子公孫兹卒冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮淮淮夷也十有七年春齊人徐人伐英氏英氏國也夏滅項項國也孰滅之公滅也公方在淮則何以能滅項使大夫滅也內不言滅此何以言滅諸侯方與公責淮夷病人於外而公復使大夫滅人於內以公為病矣何以不言大夫非大夫之罪也秋夫人姜氏㑹齊侯于卞何以不言公及公未歸也㑹非矣公未歸而專行又非也九月公至自㑹冬十有二月乙亥齊侯小白卒十有八年春王正月宋公曹伯衛人邾人伐齊伐齊者何納公子昭也何以不言納不與其納也齊侯之夫人三皆無子如夫人者六人生諸公子長曰無虧其三曰昭屬昭於宋以為太子其後復欲立無虧齊侯卒而無虧立昭奔於宋宋襄公用是納昭夫人無嫡則立長納昭非正也夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績以宋師及齊師言宋之主戰也狄救齊秋八月丁亥葬齊桓公冬邢人狄人伐衛狄何以稱人以狄邢也邢嘗病於狄而遷夷儀矣衛同姓而復與狄伐之自取滅於衛者也不可曰邢狄伐衛故人狄則邢亦秋也十有九年春王三月宋人執滕子嬰齊諸侯有罪執而歸於京師者伯討也故以侯執執而不歸京師者非伯討也故以人執執而言以歸者歸於其國而釋之也執而不言以歸者即其所而釋之也凡執而不名內未有君也此何以言名執而殺之也何以不言殺之大夫則言殺之諸侯則不言殺之君臣之辭也夏六月宋公曹人邾人盟于曹南盟于曹南曹地也何以不言宋公邾人盟于曹非曹之國中曹之南也曹衛邾同於伐齊而不同於戰甗衛以狄伐則有辭矣曹邾之不至以納為非正也宋公强而與之盟故不盟於國中而盟於國外各以其微者來義不足以服之也宋於是復圍曹鄫子㑹盟于邾巳酉邾人執鄫子用之鄫子不名惡邾也謂其為虐亦已甚矣故人邾而不名鄫子也用之或曰殺之以祭也或曰血其鼻以祭也秋宋人圍曹衛人伐邢冬㑹陳人蔡人楚人鄭人盟于齊㑹公羊作公㑹左氏榖梁作㑹當從二傳㑹者何沒公也地齊齊亦與盟也齊小白死五公子爭立而齊衰矣陳穆公思小白之德率四國與公而盟焉畏楚之或侵也陳蔡鄭皆楚之與國也陳率諸侯以保齊可畏楚之侵而使楚亦與盟不可小白率中國以攘楚公得率楚以保中國乎楚之窺中國自是始矣故四國皆貶而稱人公亦沒而不得見人諸侯所以人公也梁亡有一朝而亡者不幸而人或亡之也有積久而亡者雖幸而人欲存之不得不亡也人亡之可曰亡梁人欲存之而不得不亡不可曰亡梁梁亡而已其所由來者漸矣此梁之所以亡也二十年春新作南門南門路門也何以言新作僭天子也因舊而修謂之新有加其度謂之作禮天子五門曰臯門曰庫門曰雉門曰應門曰路門諸侯三門曰庫門曰雉門曰路門古者謂國門為南門故曰天子聽朔於南門之外謂路門亦為南門故成王喪言逆子釗于南門之外魯得以天子臯門之制為庫門應門之制為雉門周公之賜也而路門則有諸侯之門焉新作南門書豈非有加其度而僭天子路門歟故與新作雉門之辭一施之不曰路門天子有路門曰是天子之南門云爾夏郜子來朝五月乙巳西宫災記災也西宫夫人之宫也天子六寢后六宫諸侯三寢夫人三宫曰東宫曰西宫中宫處乎中鄭人入滑秋齊人狄人盟于邢狄何以書人以狄齊也衛人伐邢狄以前與邢人伐衛之故請於齊為此盟以謀邢難明年狄遂侵衛復報邢而滅之邢衛之怨以齊為有力則齊亦狄也冬楚人伐隨二十有一年春狄侵衛宋人齊人楚人盟于鹿上鹿上宋地此宋公也何以言宋人不知諸侯之不宗已而强圖霸也齊楚何以皆稱人此亦齊侯楚子也知宋公之不足宗而矯從之盟也故皆貶而人之夏大旱記災也夏以月志不雨者未為災也以時志大旱者歷時不雨而播種不入也秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂楚子何以先諸侯宋襄公欲圖霸而㑹楚子諸侯推先楚子也楚子先諸侯則何以不貶楚所以正諸侯也一人衡行於天下武王恥之諸侯知宋襄公不足霸則勿㑹而已㑹而先楚子遂使楚子得以爭中國則宋與諸侯之罪也葉子曰宋襄公可謂不量力矣齊桓公自同盟于幽而霸歷楚文王堵敖未嘗與之通至成王立而以人來聘已而連侵伐鄭者四年桓公於是遂伐楚雖成王之强以屈完來盟于師則楚服矣然相繼八合諸侯而楚不與知成王未可以致則外之而不使得與中國諸侯齒也今襄公一圖霸而遽召楚豈以桓公所不能為而已為之乎鹿上之盟公子目夷固知小國爭盟之為禍矣楚子僞從之以觀其釁而襄公弗悟遂再為此㑹則宜楚子之所易也故偃然欲與之爭中國而不肯為諸侯下諸侯亦莫敢復先焉者蓋以王爵推之也襄公乃反從之以相敵則惡在其為霸此楚子所以知其無能為而遂執之歟故春秋不貶楚子而以爵書之以為宋與諸侯之罪而未可以專責楚子也葉氏春秋傳卷九
