body:
  text: 葉氏春秋傳卷十六宋葉夢得撰襄公二夏四月四卜郊不從乃不郊鄭公孫舍之帥師侵宋公孫舍之鄭大夫之三命者也公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于京城北京城左氏作亳公羊榖梁作京當從二傳京鄭邑大叔所封也鄭懼而行成則地京城者鄭亦與盟也公至自伐鄭楚子鄭伯伐宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭㑹于蕭魚伐未有言㑹者此何以言㑹貴之也鄭人患晉楚之故諸大夫欲從晉曰何為而使晉師致死於我楚弗敢敵而後可固與也乃謀伐宋諸侯遂伐鄭而為京城北之盟矣已而楚復來伐鄭伯從之諸侯悉師再伐鄭鄭人乃使良霄如楚告將服于晉曰孤以社稷之故不能懷君君若能以玉帛綏晉不然則武震以威攝之孤之願也乃行成於晉晉於是申京城之言以成其本意約信命事而不盟赦鄭囚納斥堠禁侵掠使告於諸侯君子以是貴之也葉子曰吾何以知春秋貴蕭魚之㑹歟鄭介於二大國之間為弱國自楚與晉爭強鄭無不與事晉則楚伐事楚則晉伐晉討其從楚則是矣而晉不足恃也戲之盟士弱為之辭曰鄭國不唯晉命是聽有異志者有如此盟公子騑趨而改之曰鄭國不唯有禮與強可以庇民者是從而敢有異志者亦如之晉不能奪也故自虎牢之役至雞澤而鄭受盟僖公從於晉者六年至邢丘之㑹而復叛自是三年之間我之伐者三楚之伐者一晉楚之爭鄭無甚於此時也君子其亦閔鄭之無以固其國也歟及是鄭人擇所從而終以服晉良霄之執楚連三伐以討而鄭卒不從申之㑹雖諸侯皆在而晉不爭知其不得已也楚自是亦不復加兵而鄭之息肩者五十餘年則蕭魚之為已故曰蕭魚之服鄭也大矣此君子所以貴也公至自㑹㑹而後伐故以㑹致楚人執鄭行人良霄良霄鄭大夫之三命者也鄭以告服於晉而楚執之非伯討也故以人執冬秦人伐晉十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆鄆莒附庸之國也台在國內鄆在國外救台而遂入鄆非遂之善也季孫氏之強益甚矣夏晉侯使士魴來聘秋九月吳子乘卒吳前未有書卒者此何以書始能以赴通中國也吳自夀夢從諸侯㑹于戚而漸能從中國之習矣吳得以人見故至是復能以卒赴進之也不書葬辟其號也冬楚公子貞帥師侵宋公如晉十有三年春公至自晉夏取邿邿附庸之國也秋九月庚辰楚子審卒冬城防防臧孫氏之邑也臣邑而國城之臧孫氏強也十有四年春王正月季孫宿叔老㑹晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人會吳于向叔老吾大夫之三命者也公孫蠆鄭大夫之三命者也此吳諸樊之㑹也何以殊㑹不使吳得主㑹也吳告庸浦之敗故合諸侯以謀楚使舉上介曷為以季孫宿叔老並㑹大夫強也二月乙未朔日有食之夏四月叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦荀偃晉大夫之三命者也己未衛侯衎出奔齊衛侯衎左氏榖梁以為衛侯公羊以為衛侯衎當從公羊闕文也葉子曰衎之不名或曰此春秋之義而非闕也孫林父寧殖既逐衎而立剽剽以公孫得位非正故不以兩君之辭與之是不然春秋諸侯以篡立而不得其正與強臣援之而立者非獨剽也何嘗不以兩君之辭與之乎北燕伯欵出奔齊以其多嬖寵而大夫之所逐也蔡侯朱出奔楚以東國謀篡而蔡人逐之也則燕有君與東國之竊其位蓋有甚於剽者而欵與朱皆名夫豈君燕大夫之所立而與東國篡乎凡諸侯奔而名者皆以别二君所以辨其正不正者不在是也惟衛鄭奔不以名見蓋叔武不取於為君而攝之曹負芻歸不以名見蓋子臧不取於為君而逃之則內無君而不嫌爾今剽有國十有三年凡盟㑹征伐之事春秋未嘗不書以衛侯及寧喜殺之正其名曰弒君孰有如是而非君者吾故知其為闕文而非義之所在也莒人侵我東鄙秋楚公子貞帥師伐吳冬季孫宿㑹晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚華閲宋大夫之三命者也十有五年春宋公使向戌來聘二月己亥及向戌盟于劉劉夏逆王后于齊劉夏王之上士也何以不言使王臣來我則言使他國則不言使內外之辨也何以書過我也王臣過我則皆書乎天子逆后以卿而公臨之劉夏上士非正矣是故因其過我而正之也夏齊侯伐我北鄙圍成公救成至遇成仲孫氏之邑也臣邑而君救之非禮也救不目至何以言至遇至遇猶至酅也以公為畏齊故至遇而止也季孫宿叔孫豹帥師城成郛前圍而公救之固過矣今季孫氏叔孫氏復各以其君而為之城著三臣之自為政也秋八月丁巳日有食之邾人伐我南鄙冬十有一月癸亥晉侯周卒十有六年春王正月葬晉悼公三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁戊寅大夫盟前未有言大夫盟者此何以言大夫盟惡大夫之無君也溴梁之㑹齊髙厚歌詩不類晉荀偃怒以諸侯為有異志使諸大夫盟髙厚髙厚逃歸於是叔孫豹及偃宋向戌衛寧殖鄭公孫蠆小邾之大夫盟曰同討不庭諸侯皆在是而大夫盟故不曰諸侯之大夫以大夫為無君也葉子曰自諸侯失政而大夫強至襄公而愈甚故盟㑹征伐三年之間諸侯不出而大夫出者四雞澤之㑹諸侯始復見時晉悼公之德猶未衰其將有以振之歟故自是至於蕭魚諸侯之見者九而大夫皆不與庶乎其稍正也及會吳于向魯以季孫宿叔老二卿並出而伐秦會戚再嵗諸侯皆不出而大夫復三見明年晉悼公卒則大夫蓋復肆於悼公之末矣然而諸侯不出而大夫出猶云可也溴梁之㑹其君在而大夫敢專盟則天下豈復有君哉雖曰荀偃之為而諸侯之大夫皆與有罪矣故春秋之惡大夫莫甚於溴梁晉人執莒子邾子以歸悼公始葬而平公出會莒邾雖以侵伐魯之罪當執然平公為無哀矣非伯討也故以人執齊侯伐我北鄙夏公至自會五月甲子地震叔老會鄭伯晉荀偃衛寧殖宋人伐許秋齊侯伐我北鄙圍成大雩冬叔孫豹如晋十有七年春王二月庚午邾子牼卒宋人伐陳夏衛石買帥師伐曹石買衛大夫之三命者也秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防髙厚齊大夫之三命者也九月大雩宋華臣出奔陳華臣宋大夫之三命者也冬邾人伐我南鄙十有八年春白狄來白狄狄之别族也來者何來朝也何以不言來朝不能朝也古者荒服在九州之外曰蕃國世一見於天子諸侯而朝蕃國非正也夏晉人執衛行人石買衛孫蒯淫獵於曹隧以重丘人之詬而使石買伐曹曹人訴於晉衛使石買如晉辭焉晉不能治孫蒯而罪石買之伐非伯討也故以人執秋齊師伐我北鄙冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊圍未有言同者此何以言同圍齊惡靈公也諸侯不義靈公為溴梁之會共謀伐之於是前會之諸侯皆在而益以滕子晉平公禱于河曰齊環怙恃其險負其衆庶弃好背盟陵虐神主曾臣彪將帥諸侯以討焉齊侯禦諸平隂不勝脫歸諸侯遂及齊焚雍門及西郭南郭又焚東郭北郭古之言圍者未必皆環之也曰禁之使不得出焉爾今十二國之師皆盡其力而齊之四面無不及焉是以謂之同也葉子曰靈公以十五年伐我北鄙至是連伐我者五嵗再圍成又圍桃圍防我之虐於諸侯未有甚於齊也故嘗以叔孫豹請於晉晉辭之豹曰敝邑之急朝不及夕引領西望曰庶幾乎比執事之閒恐無及也於是荀偃從之而諸侯之師無不盡其力則事雖以魯出而所以圍齊者不以魯也故薄齊之城周其四門非共惡之能若是乎蔡失其國周公復封之為之訓曰睦乃四鄰夫不能睦其鄰者鄰亦不能睦也國何以守故以齊環一見法焉曹伯負芻卒于師楚公子午帥師伐鄭公子午楚大夫之三命者也十有九年春王正月諸侯盟于祝柯此圍齊之諸侯也齊未服故再盟何以不序一事而再見也晉人執邾子晉前執邾子以討伐我之罪矣明年邾人不受冬又伐我南鄙而執焉復取其田而舍之非伯討也故以人執公至自伐齊此圍齊也何以致伐齊圍齊所以伐齊也伐不服而後圍圍不言伐故以伐致也取邾田自漷水內取外田不書此何以書不一地也取者我所有而取之者也非所有而取之謂之盜是猶言取濟西田爾漷水邾水之經於我者也言自漷水則有非止於漷水者矣故於是復取漷東田季孫宿如晉葬曹成公夏衛孫林父帥師伐齊秋七月辛卯齊侯環卒晉士丐帥師侵齊至穀聞齊侯卒乃還師未有言還者此何以言還善士丐之不伐喪也葉子曰趙盾納捷葘于邾以邾人之辭弗克納而還春秋雖善趙盾而不言還趙盾不免於稱人士丐亦受命侵齊何以得與其還而以名氏見不伐喪將之事也納君非將之事也趙盾不得以師而專廢置君士丐不得以伐喪而致為師之道此士丐所以異乎趙盾也八月丙辰仲孫蔑卒齊殺其大夫髙厚靈公欲以公子牙易太子光而使髙厚傅之厚從君於昏而不能正於是光立而殺髙厚髙厚之死罪纍上也故以國殺鄭殺其大夫公子嘉公子嘉鄭大夫之三命者也尉止之亂嘉獨免既得而専召楚師至于純門鄭伯不能正故公孫舍之公孫夏討尉止之難與純門之師帥國人殺嘉而分其室公子嘉之死罪纍上也故以國殺冬葬齊靈公城西郛畏齊也城壞而當城則城之爾畏齊難而城其西郛非所以守國也叔孫豹㑹晉士丐于柯城武城畏齊也叔孫豹自晉㑹士丐還曰齊猶未也不可以不懼乃復城武城二十年春王正月辛亥仲孫速㑹莒人盟于向仲孫速吾大夫之三命者也夏六月庚申公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵秋公至自㑹仲孫速帥師伐邾蔡殺其大夫公子燮燮以楚使蔡無常求從文侯之志以事晉蔡入畏楚不從遂殺燮以止其謀公子燮之死罪纍上也故以國殺葉子曰公子燮其猶以為罪歟蔡自翟泉之役不復與諸侯會蓋附楚久矣故至于厥貉遂與楚子同見以謀伐宋及晉雖嘗以卻缺討之僅為城下之盟而不能服也自是晉復以欒書再侵之蔡雖小弱息肩者七十餘年古之君子作事必稽于衆未有違衆而能成者也方晉楚爭強蔡介於兩國之間事楚與晉無有不受其弊者今欲安于楚使燮而能為蔡謀必有絶楚而能保於晉者然後可為今未有以得晉而輕與楚絶身且不能自保况於蔡乎故君子不以晉楚為辨而以保其國者為難則堯之所謂稽于衆舍已從人者也故以燮一見法焉蔡公子履出奔楚公子履蔡大夫之三命者也陳侯之弟黃出奔楚黃哀公之母弟也慶虎慶寅執政畏黃之逼而訴於楚曰與蔡燮同謀黃不能安於是奔楚以自直以陳侯為不能兄也故目弟焉叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉邾庶其以漆閭丘來奔庶其邾大夫之再命者也以漆閭丘來奔者何據其邑叛而歸我也何以不言叛諱納叛臣也漆邑也閭丘亦邑也何以不言及皆私邑也葉子曰左氏以邾庶其及莒牟夷邾黑肱為三叛人書名齊豹衛之司寇殺衛侯之兄貶而不書名為春秋之義使欲蓋而名章求名而不得然歟非也夫豹以正卿而殺其君之兄是何足以為名邾莒雖小國再命之大夫自得以名見三人之奔亦何以知其欲蓋其惡歟以為當時之意邪豈有殺君之兄而人不知竊邑以叛君而可以隱者也以為有求於春秋而然邪則春秋之作三人固不能前知此左氏不知小國有得名之大夫而邾以弱莒以用夷適無事以屢見爾然莒有慶有拿邾有畀我有快皆非以地叛者何為而亦名也夫名不名春秋固有常法大夫而以其邑叛此與衛孫林父晉趙鞅荀寅士吉射何以異其惡蓋有不待貶絶而自見者春秋未嘗加之辭何於庶其三人而獨異哉夏公至自晉秋晉欒盈出奔楚欒盈晉大夫之三命者也九月庚戌朔日有食之冬十月庚辰朔日有食之曹伯來朝公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任二十有二年春王正月公至自㑹夏四月秋七月辛酉叔老卒冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨公至自㑹楚殺其大夫公子追舒公子追舒楚大夫之三命者也追舒為令尹寵佞人觀起而富之楚子不能禁既而復將討焉乃與其子弃疾謀之弃疾不從遂殺追舒追舒之死罪纍上也故以國殺二十有三年春王二月癸酉朔日有食之三月己巳杞伯丐卒夏邾畀我來奔畀我邾大夫之三命者也葬杞孝公陳殺其大夫慶虎及慶寅慶虎慶寅皆陳大夫之三命者也寅虎之殺也二人既訴公子黃於楚不勝而以陳叛故陳侯以屈建圍陳而殺寅虎寅從虎故言及慶寅寅虎之死罪纍上也故以國殺陳侯之弟黃自楚歸于陳自楚者何楚有奉也晉欒盈復入于晉入于曲沃曲沃欒氏之邑也復入求復也欒盈既出奔楚㑹諸侯于商任沙隨使錮欒盈無納盈盈以齊析歸父入曲沃以求復其曰入于晉何盈先入于絳不克而後返其邑也故言入逆辭也秋齊侯伐衛遂伐晉八月叔孫豹帥師救晉次于雍榆己卯仲孫速卒冬十月乙亥臧孫紇出奔邾臧孫紇吾大夫之三命者也晉人殺欒盈欒盈既返曲沃晉人圍而克之盡殺欒氏之族黨不言殺其大夫位已絶矣非復大夫也曰晉人討賊之辭也齊侯襲莒襲者何掩其不備也齊莊公自晉還不入而伐莒門于且于蓋掩之也傷股而退明旦將再戰復使人夜載甲入于且于之隧遂以勝莒故君子以是為襲也葉子曰韓之戰秦人獲晉惠公不言師敗績曰獲晉侯君獲重於敗也鄢陵之戰晉射楚王中其目敗績不言師曰楚子君敗重於師也然則齊侯亦傷股而敗矣何以不以君敗為文蓋詐戰也結日而後戰君子猶不與焉况乘人之不備而詐之乎得免吳遏之卒幸矣昔者子釣而不綱弋不射宿謂其非愛物之道也而况於人乎是以古之用師必先之以文告之辭威讓之令至於不服而後伐之彼輕千乘之貴而幸一日之勝君子不與也故以齊侯一見法焉二十有四年春叔孫豹如晉仲孫羯帥師侵齊仲孫羯吾大夫之三命者也夏楚子伐吳秋七月甲子朔日有食之既齊崔杼帥師伐莒大水八月癸巳朔日有食之公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀冬楚子蔡侯陳侯許男伐鄭公至自㑹陳針宜咎出奔楚針宜咎陳大夫之三命者也叔孫豹如京師大饑二十有五年春齊崔杼帥師伐我北鄙齊自同圍之後我以叔老往聘而怨稍平矣至是復伐我則以仲孫羯之侵故也我何以保其國歟葉子曰自襄以前莊僖文成之伐者各一皆齊而已至文而邾復見伐襄而莒復見伐於是終其世三國見伐者十有三甚乎襄之不能為國也齊伐其北莒伐其東邾伐其南齊侯之師遂至圍成圍桃圍防莒亦進而圍台則非特及其鄙而已我雖城防城西郛城武城曽不足以自守而區區方託晉以為雍榆之救固已兆怒又從而侵之豈吾所得己哉皆晉之故此其所以訖不能振也春秋固志之矣夏五月乙亥齊崔杼弒其君光稱名氏以弒者大夫弒君之辭也崔杼既立莊公而相之莊公通其室而杼弒焉公登臺而請弗許請盟弗許請自刃於廟弗許公踰牆射之中股反隊而弒之是以為杼之弒也公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀六月壬子鄭公孫舍之帥師入陳秋八月己巳諸侯同盟于重丘公至自㑹衛侯入于夷儀夷儀衛邑也何以不言入衛未得衛也剽在而內未有援則其歸為難矣故言入逆辭也何以不名未得國則不嫌於為君也楚屈建帥師滅舒鳩屈建楚大夫之三命者也冬鄭公孫夏帥師伐陳公孫夏鄭大夫之三命者也十有二月吳子遏伐楚門于巢卒巢國也諸侯不生名吳子伐楚則何以名非名也吳子卒矣文不可再見舉卒之名加之伐楚之上無嫌也何以目門於巢不正吳子不以禮假道而不得其死也吳子伐楚以報舟師之役假道于巢不納攻其門巢牛臣隱于短牆以射之卒巢楚之與國也吳子欲復怨於楚而道於其國不納而攻之吳子則已過矣巢人之黨其所與而賊夫人之君非諸侯相為賔之道也二十有六年春王二月辛卯衛寧喜弒其君剽稱名氏以弒者大夫弒君之辭也寧喜衛大夫之三命者也喜寧殖之子殖既從孫林父逐獻公而立剽及疾復召喜命之使謀納獻公故喜先攻孫氏而殺剽是以為喜之弒也葉子曰春秋以正治不正不以不正治正剽之與衎蓋不兩立也以衎之歸為正則剽之死不得為正矣何以加喜之罪而名之弒哉此剽與衎之說非喜與剽之說也夫所謂君臣者一日北面而事之皆君也方孫林父之逐衎殖以為不然則去而違之可矣既與之立則剽者殖之君也喜者受命於殖者也孰有北面事之十有三年而不以為君者乎為衎則可以殺剽為喜則不可以殺剽此喜與衎之說也是以書剽有三道以衛言之既已與諸侯盟㑹矣不可以不謂之君以寧喜言之殖已立而君之矣喜受命而殺之不可以不成其為君以衎言之則公孫剽而已矣别嫌明微非春秋不能辨是故不以其正者害其不正也衛孫林父入于戚以叛戚孫林父之邑叛者何叛于晉也晉於是疆戚田葉子曰楚取宋彭城以封魚石而求入攘人之地以劫其君也晉取戚而納林父之叛私人之地以背其君也然而春秋不著晉之罪者彭城之罪在楚戚之罪在林父各以其重者書也甲午衛侯衎復歸于衛衎何以言復歸易辭也寧喜援之公子鱄與之則其歸為易矣夏晉侯使荀吳來聘荀吳晉大夫之三命者也公會晉入鄭良霄宋人曹人于澶淵此趙武之會也何以曰晉人不正其登叛人以謀其君且疆戚田故貶而人之也何以不沒公公亦與有貶也葉氏春秋傳卷十六
