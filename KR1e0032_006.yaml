body:
  text: 葉氏春秋傳卷六宋葉夢得撰莊公二九月齊人取子糾殺之子糾在我者也齊人何以言取乗乾時之敗脅我而取之也孰取之齊侯也齊侯則何以言齊人貶也十室之邑可以逃難百室之邑可以隱死我以千乗之國不能納子糾又使人得以取焉必有與之然後取之病在我也必有得之然後取之病在齊也既兩見之矣然實殺之者齊也故歸惡於齊而人齊侯焉葉子曰此子貢所謂桓公殺公子糾者歟凡義所得殺者殺在上齊人殺無知衛人殺州吁是也義所不得殺者殺在下蔡公孫姓以沈子嘉歸殺之楚子誘蔡侯般殺之是也冬浚洙洙魯水也浚深也内無以服齊而求深於洙以為守國之道則非也十年春王正月公敗齊師于長勺二月公侵宋三月宋人遷宿夏六月齊師宋師次于郎公敗宋師于乗丘秋九月荆敗蔡師于莘以蔡侯獻舞歸荆楚也先曰荆後曰楚名從主人以國舉之外之也凡四裔君皆稱國臣皆稱人畧之也中國無王四裔交侵而楚始見焉楚大夫以椒來聘以屈完來盟則得稱名冬十月齊師滅譚譚子奔莒諸侯擅征伐罪矣况滅國乎凡滅之志皆惡也諸侯奔皆名而書出滅國不名内無君也不言出無所出也葉子曰孟子言周公相武王誅紂伐奄三年討其君驅飛廉於海隅而戮之滅國五十而天下大悦蓋内外亂鳥獸行則滅之先王之政也必武王而後可滅人必周公而後能滅人非武王周公而滅人之國者交相滅之道也小白始圖霸而先滅譚又滅遂遂卒不服而齊人殱焉其亦異於天下大悅者矣而或者以為軍譚遂而不有諸侯稱寛焉者妄也十有一年春王正月夏五月戊寅公敗宋師于鄑秋宋大水記災也凡外災異不書成周以王書宋以二王後書齊以大災書宋衛陳鄭以衆書陳以哀滅國書杞以二王後而不書以告而弔弔而合禮則書不以告或告而不弔弔而不合禮則不書也葉子曰凶禮六弔禮以哀禍烖周公之政也而諸侯與有焉是謂周禮救患修睦之道也冬王姬歸于齊我主之也葉子曰同姓而主昬魯所宜為也何獨兩見於莊公蓋惟齊不可主昬惟莊公不可主齊昬非莊公而主齊非齊而我主之皆不書小事也十有二年春王三月紀叔姬歸于酅叔姬紀季之妻也内女嫁為諸侯妻則書歸紀季之妻則何以得書歸非始歸也叔姬之歸紀季久矣非所當見則不書紀滅而紀季入于齊以叔姬託于我待其成國也而後復焉故以始嫁之辭書之成紀季之得後紀也葉子曰吾何以知叔姬之為紀季妻歟凡媵不書以叔姬為伯姬之媵待年而後歸則不得書且紀侯去伯姬卒雖媵何用歸將以紀侯而録之歟則春秋所以成紀者於紀季見之矣無所待於叔姫也舍是而叔姫得歸酅非紀季之妻而何然則叔姬託於我何以不書非歸寧也則不可以書來非見出也則不可以書來歸以為義無所用見則不書焉爾夏四月秋八月甲午宋萬弑其君㨗及其大夫仇牧萬宋大夫之再命者也仇牧宋大夫之三命者也及仇牧賢也蓋㨗弑仇牧趣遇之門手劔而叱之萬遂殺牧冬十月宋萬出奔陳十有三年春齊人宋人陳人蔡人邾人㑹于北杏齊人左氏公羊作齊侯榖梁作齊人當從榖梁四國何以皆稱人大夫而始為㑹與惡曹清丘之盟同罪者也葉子曰吾何以知齊侯之為齊人歟三家既不著其事考之於時則小白方圗霸而未成也當時諸侯雖未必全聽齊豈無一自至者而皆以㣲者㑹之哉以惡曹清丘之事推之則大夫為相好與共推小白爾夫圖霸亦大矣不能請之於王而大夫自相為謀小白亦靡然受之大夫而不受之其君皆春秋之所宜治也是說也榖梁㣲知之而不能盡故特以為舉衆之辭是蓋不原其情而臆為之說者也夏六月齊人滅遂秋七月冬公㑹齊侯盟于柯十有四年春齊人陳人曹人伐宋三國皆㣲者歟非㣲者也非㣲者則何以書人正王道也小白之圖霸自此始矣是可以為王而不為王故於其始抑而人之所以示天下之無所用霸也葉子曰吾何以知伐宋之為正王道歟小白五霸之盛者也前乎此嘗以師次于郎以窺我矣已而復以師滅譚焉春秋皆以常法書之以為與凡諸侯者等也至北杏之㑹大夫將推之於是始與滅遂皆書人則以小白為可責矣故柯之㑹與公皆以爵見則諸侯亦將推之明年遂與兩國為此伐覇於是始焉由是伐郳伐鄭伐戎伐徐伐山戎伐英氏三十餘年皆書人終其世得以爵見者二十四以師見者三則稱人豈皆㣲者哉蓋春秋之作憫天下之無王也必有如湯文王者然後為吾之所貴若小白而少假之則天下皆趣於霸王道何由而興乎惟小白可望以為王則亦惟小白可責以為不王此於其伐每抑而人之所以著其法以責天下後世也故言管仲之功於春秋之時則九合諸侯一匡天下不以兵車可以許其仁言小白之事於三王之道則管仲之功曾西且不肯為故曰五覇三王之罪人也孟子其知之矣夏單伯㑹伐宋單伯吾之孤也翬帥師㑹宋公陳侯蔡人衛人伐鄭言帥師將尊師衆也叔孫得臣㑹晉人宋人陳人衛人鄭人伐沈不言帥師將尊師少也單伯何以不言帥師猶之得臣也何以再見後至也秋七月荆入蔡冬單伯㑹齊侯宋公衛侯鄭伯于鄄北杏之㑹齊人先宋人齊人主㑹也是㑹以單伯往㑹為辭而復以齊侯先宋公蓋宋始服於齊諸侯於是相與推齊覇故明年再㑹鄄齊侯遂居宋公上矣葉子曰吾何以知是為諸侯之推齊覇歟此㑹鄄曰衛侯即朔也後㑹鄄曰鄭伯即突也朔自莊六年違王命而入衛不與諸侯通者九年突自莊四年與陳侯遇于垂不與諸侯通者十一年至是而皆來㑹非以小白浸强而得諸侯有不敢不至歟蓋於是為幽之同盟矣十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄夏夫人姜氏如齊夫人不得歸寧者也禮女嫁父母在嵗一歸父母沒使人歸寧禄父沒矣夫人前與桓公如齊已而㑹于禚享于祝丘又至于如齊師是在襄公之世其惡為甚矣然辭無所貶曰夫人姜氏焉所謂不待貶絶而自見者也今小白始覇而夫人復如齊小白安得受之歟古之善治其國者必先齊其家齊其家者必先正其身小白之正身齊家亦襄公而已故其刑能施於哀姜而其禮不能正於文姜君子以是病小白是以與襄公之辭一施之秋宋人齊人邾人伐郳宋序齊上主兵也諸侯雖推先齊然小白之覇猶未受命于王故宋復以主兵居上鄭人侵宋冬十月十有六年春王正月夏宋人齊人衛人伐鄭秋荆伐鄭冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽前未有言同盟者此何以曰同盟以天子之同禮盟諸侯也何以沒公同非諸侯之所得為也諸侯之同盟者多矣何以於是獨沒公於其始焉一正之以小白為可責也古者諸侯以朝覲宗遇四時更朝於王常事也見於廟中而不盟以事來見非其節而㑹十有二年王不時巡而同非常事也見於國外築宫為壇祀方明而盟常事不盟無所事盟也非常事有盟不協則和之也齊侯將帥諸侯以奬王室故假天子十有二年之禮而共受命焉齊侯於是始霸天子命之也然則春秋與之歟實與而文不與所以沒公也以為齊侯欲以奬王室則可以諸侯共行天子之禮而聽於齊侯則不可公不可見則諸侯亦不可見矣葉子曰周衰諸侯不朝王久矣齊侯既圖覇將從之而不正歟則天下無時而有王也帥之以共朝王歟則諸侯未必皆能朝也伐之則不可勝伐然則為齊侯者如之何曰天子固有不時巡而合諸侯者也吾請之王而設於此使諸侯如朝於方岳之下而莫不聽焉吾王庶幾其可尊矣是齊侯之志也吾何以知其然此始㑹也後十有二年而再㑹則天子殷國之節也豈齊侯之自為者哉及諸侯之從已者信然後以為吾非得已而不已者遂終其世而不復為則齊侯之志亦可見矣故晉文公㑹諸侯而召天子書曰天王狩於河陽以全天子之行齊侯假天子之禮而與諸侯㑹曰齊㑹諸侯諸侯同盟于某而無異文特以沒公㣲見之春秋與齊之實在是矣是以桓公有同盟文公無同盟孔子所以與桓公之正而不譎也自齊侯卒宋襄公一為會而不能終文公之後晉主中夏每襲其迹而竊用之天下卒莫從則僭而已矣其弊遂有大夫而為者豈春秋之意哉先儒乃謂同尊周同外楚夫盟則同矣何獨於是言之若曰姑以為言而後不能則與常盟何擇吾未知其說也邾子克卒克儀父之名也得以爵見進而成國矣北杏之㑹郳之伐邾人皆在焉或曰齊以是請於王而進之十有七年春齊人執鄭詹詹鄭大夫之再命者也稱人以執非伯討也詹未三命則非鄭之知政者也鄭伯與宋公㑹于鄄則同好矣未幾而鄭侵宋故宋復主兵而齊衛共伐之至同盟于幽而鄭服故以詹為說而執焉鄭非詹之所得任則執之非其罪者也夏齊人殱于遂遂國也齊人衆辭也殱盡殺之也齊以强滅遂遂不畏其力能以亡國之餘而盡殺其衆非遂能殱齊齊自殱也葉子曰得天下有道得其民斯得天下矣得其民有道得其心斯得民矣齊小白之覇能率諸侯而九合不能服遂一國豈得之者不以心歟文王之造周曰大邦畏其力小邦懷其德夫文王之所謂力者非强服之也靈臺之詩曰經始勿亟庶民子來使有國而知此則天下之民皆襁負而至矣何待滅人之國而後為强乎故以遂一見法焉秋鄭詹自齊逃來苟以身免曰逃大夫以道為去就以義為死生詹雖無罪而齊何畏焉幸於全生而不以義去則亦苟免其身而已奔以適我為志故曰來奔逃以舍彼為志故曰逃來冬多麋記災也麋多則害稼冬稼成之時也螽螟害稼者也凡見則為災麋非害稼者也多而後為災十有八年春王三月日有食之夏公追戎于濟西濟西内地也前未有言戎伐我者何以至乎濟西蓋過我而躡之也戎之於魯隱之所與㑹桓之所與盟者也過我而躡之蓋出不意以倖其功掩不虞以乗其利以莊公為諼矣然則及之乎不及也何以不言不及躡之則不責其及也秋有􅈮記異也􅈮與蜚皆害人之物􅈮蜚中國所無也鸜鵒魯所無也以所無則有為異矣冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公子結吾大夫之三命者也陳人陳侯也何以言人婦非陳侯之所得名曰人云爾别外之辭也古者諸侯娶一國則二國媵之必以大夫送焉謂之媵臣凡媵不書此何以書將以見其遂也魯以女媵陳人之婦而結之齊與宋將有不可於魯而遇諸鄄結因與之盟而和焉故言遂善之也葉子曰吾何以知結之遂為善歟春秋言遂二有君遂有臣遂君者命之所從出無所往而不可遂故諸侯而言遂繼事之辭也大夫受命於君有不可得而遂故大夫之言遂生事之辭也大夫言生事則有可得而遂者有不可得而遂者在國中則不可遂所謂大夫無遂事也在國外則可遂所謂大夫出疆有可以安社稷利國家則專之者也而春秋之辭一施之以為各於其事觀焉則審矣季孫宿帥師救台遂入鄆台在國内鄆在國外可以救台而遂入鄆乎盟者所以謀不恊也而非大夫之事然大夫與國同體君不在焉而事有不可者不為之所則亦不忠而已矣吾是以知君子之與結也夫人姜氏如莒如齊且不可如莒益過矣冬齊人宋人陳人伐我西鄙郊外曰都都外曰鄙凡伐皆先鳴鐘鼓以問罪服而行成則見伐不見戰不服而戰則見戰不見伐内伐言鄙詳内也有伐而圍邑然後言圍有伐而至城下然後言我我内辭也二十年春王二月夫人姜氏如莒夏齊大災大災災而大也有大荒有大札有大烖大荒饑也大札疾也大烖水火之變也凡内災必目其所宋陳災不目其所畧之也齊大災然後書齊災不書以大故書也曰宫室廐庫廛市皆盡焉爾古者國有大烖類宗廟社稷以是故重之也秋七月冬齊人伐戎二十有一年春王正月夏五月辛酉鄭伯突卒秋七月戊戌夫人姜氏薨莊公之母也冬十有二月葬鄭厲公二十有二年春王正月肆大眚夫𤯝者何大罪也肆者何縱也大罪則何以謂之大眚過也古者謂視不明為眚過而雖大君子宥焉何以書以文姜也有眚有大眚諸侯不得專殺則亦不得專生肆眚諸侯之事也肆大眚天子之事也魯得肆大眚雖周公之賜文姜之罪天子不討而得葬故莊公因推以及其國人非所肆而肆也惟辟作福惟辟作威臣有作福作威害于而家凶于而國莊公蓋作福者也其亦無以保其國矣葉子曰吾何以知肆大眚為天子之事歟周人告其臣曰乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺有大眚而肆之可也然馭福以生馭過以誅蓋王之八柄豈諸侯而得為乎莊公之意若曰吾固得肆大眚矣夫人之罪當討而不得葬今天子既宥而不討使得稱小君而終為夫人吾國人而有大罪吾如之何而殺之必有非大眚而肆者矣非大眚而肆雖天子且不可而況於魯乎大眚而得其節皆常事不書特一見吾是以知其非所肆而肆者也癸丑葬我小君文姜文諡也謂諸侯之妻君稱之曰夫人邦人稱之曰君夫人稱諸異邦曰寡小君異邦人稱之亦曰君夫人葬公曰我君葬夫人曰我小君厭也故以稱諸異邦之辭言之陳人殺其公子御寇御冦陳諸公子也何以不稱大夫非大夫也非大夫則何以書殺公子之重視大夫親親之道也凡以國殺而名者有罪而累其君也其不名則無罪也以人殺而名者有罪而干其衆也其不名則無罪也御冦曷為以人殺陳人殺御冦而其黨公子完顓孫奔齊御冦冝有得罪於陳人者也其事則史失之矣葉子曰古者刑不上大夫公族有罪不以干有司以為大夫者吾任之所與共政者也公族者吾親之所與共恩者也不幸而有罪則大司冦議其辟不得已而麗於法則甸師致其刑然而公族獄成而讞於公猶曰宥之三三宥不對走出又使人追之曰必赦之有司以為無及則哭於異姓之廟素服不舉而私喪之如是猶有慢賢而賊親者故葵丘之㑹齊小白猶曰毋專殺大夫天下無道政在大夫君子終不以一時之弊害萬世之法是以大夫强而君殺之由三桓始雖謂之義終不通乎春秋蓋以為大夫之有罪無罪吾固有以為之辭矣則其不可殺槩書之曰殺其世子殺其弟殺其公子殺其大夫所以正君臣之義而厚骨肉之恩也夏五月四時無事書首月以見時有事則於其月見之五月首時而下無事蓋闕文也秋七月丙申及齊高傒盟于防高傒齊大夫之三命者也及者公也何以不言公禮卿不㑹公侯也葉子曰名分不可不正也古者諸侯之命諸臣之爵莫不皆有别焉大國之君九命公也次國之君七命侯伯也其卿則不過三命小國之君五命子男也其卿則不過再命先王之意以為諸侯之邦交有不得不用其臣者既使之敵則臣無敵君之義不使之敵則無以致其睦鄰之道故為之節以大國三命之卿而當小國五命之君此禮之所不得已也至公侯伯則尊矣必君而後可敵焉晉荀庚衛孫良夫尋盟魯臧宣叔以為次國之上卿當大國之中虛大國上卿而不言蓋不以當諸侯之臣而晉執叔孫婼與邾大夫卒婼辭以為列國之卿當小國之君即命其介尚行先王之制也而齊以高傒晉以陽處父盟公可乎是以皆沒公而不見此春秋所以正名分也冬公如齊納幣納幣不書此何以書不正以其喪娶也文姜之喪始練而公圖㛰非禮也納幣大夫之事而公親之又過也何以不於始焉譏之納幣納徴也㛰禮納采以問其族問名以詢其氏氏姓得而告於禰廟曰吉而後納幣以為之徴則成禮矣納采問名猶未定成則不可易也二十有三年春公至自齊祭叔來聘祭叔王之下大夫也祭叔則何以來聘以其臣來也何以不言使内大夫不外交聘非祭叔之所得為也祭伯來朝自朝也不與其朝故不言朝祭叔來聘使臣也不與其聘故不言使葉子曰吾何以知祭叔之得有臣歟古者王之卿士六命而後賜官始得自置其臣以治其家邑謂之具官大夫則不得具官而得臣其邑官事使攝焉是亦臣也是故大夫以具官為非禮而管仲以官事不攝為非儉孔子嘗為魯司冦大夫而三命者也疾病子路使門人為臣子曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎夫子路豈以必不可行之禮而加之孔子哉以為孔子嘗為大夫蓋得攝官以為臣而不知不在其位則門人不可臣也然則大夫之在位固有攝官而為臣者矣夏公如齊觀社社者何春蒐田之祭也古者天子祀上帝諸侯㑹之受命焉諸侯祀先公卿大夫佐之受事焉未聞諸侯而㑹祭也蓋曰觀焉則非以為祭者也故曰齊棄太公之法而觀民於社君為是舉而往觀之非禮也曹劌固知之矣公至自齊荆人來聘公及齊侯遇于榖蕭叔朝公蕭叔宋附庸之君也諸侯相朝非禮也即遇而朝又非矣古者朝必以廟朝於王所可天子有方岳之朝也朝於公不可諸侯無外朝也朝公而已矣不言來榖齊地也秋丹桓宫楹桓宫桓公之廟也丹楹非矣丹桓宫楹又非也天子之楹黝諸侯之楹堊大夫倉士黈冬十有一月曹伯射姑卒十有二月甲寅公㑹齊侯盟于扈離盟也小白已覇矣公復為離盟則非諸侯之政也以圖㛰於我而固其好焉爾故前高傒為防之盟而後公如齊納幣今齊侯為扈盟而後公如齊逆女見公之迫於齊而不敢不從也二十有四年春王三月刻桓宫桷丹楹過矣刻桷又甚也桷椽也禮天子之室斲其椽而礱之加密石焉諸侯礱而不加石大夫斲而不礱士斲其本葉子曰莊公之修桓宫非其節也以為崇之以致孝歟則公之即位二十有四年矣而今始修也以為壞之而修歟則修非特楹與桷也然則何以修以夫人將歸也古者天子七廟親廟四祧廟二與太祖之廟而七諸侯五親廟二祧廟一與太祖之廟而五大夫及其皇考士及其王考其為禮雖有别而宗廟之制則未之有間也商人戒肜日而曰典祀無豐于昵昵近也夫祀且不可豐而況宗廟之飾乎莊公因夫人而為之蓋有甚於徒致其豐者故言丹言刻則非所以事其禰言桓宫則非所以事其祖莊公之厚桓適以侈之而已武曰武宫煬曰煬宫遠也故以諡舉之宣曰新宫近也諡之則疏也桓以禰而得祖稱豈其厚之乃所以疏之歟故曰斥言桓宫以惡莊也榖梁其知之矣葉氏春秋傳卷六
