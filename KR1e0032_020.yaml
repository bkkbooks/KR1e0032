body:
  text: 葉氏春秋傳卷二十宋葉夢得撰定公二衛公孟彄帥師伐曹公孟彄衛大夫之三命者也季孫斯仲孫何忌帥師墮費秋大雩冬十月癸亥公會齊侯盟于黃十有一月丙寅朔日有食之公至自黃十有二月公圍成公至自圍成內不書至此何以書至危公也成黨季氏以逐昭公復結齊以救季氏卑公室而犯其君於二氏為尤甚郈費各叛其主故二氏皆自為之謀矣成獨未嘗叛則墮成非季氏之欲也故公斂處父以為無成是無孟氏子偽不知我將不墮公於是自圍成家臣而叛其主固已強矣陪臣而叛其君強孰甚焉以公為危矣內書至惟桓會戎于唐與此而二蓋視之猶異域然十有三年春齊侯衛侯次于垂葭夏築蛇淵囿有鹿囿矣又築郎囿焉有郎囿矣又築蛇淵囿焉大搜于比蒲衛公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛晉陽趙鞅之邑也荀寅士吉射謀作亂鞅據其邑以逐君側之惡人焉此家邑也何以言入逆辭也以其入之道為逆也何以謂之叛以地要君非君命而擅興師則是叛者也冬晉荀寅士吉射入于朝歌以叛荀寅士吉射皆晉大夫之三命者也朝歌晉之邑也晉趙鞅歸于晉荀寅士吉射奔則鞅釋兵而復其位矣此叛者也何以言歸順辭也以其歸之道為順也葉子曰春秋之責臣子可謂嚴矣昔者太甲立而不明伊尹放諸桐三年復之孟子曰有伊尹之志則可無伊尹之志則篡鬻拳諫楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖君子以為愛君人臣之事君有不幸不得道其常如伊尹鬻拳者雖其志不失為愛君然要不可為天下法是故鞅之事雖逐寅吉射而晉少安不得為不忠然據邑而有其地專兵而有其權亦不得為晉之道君子將與之則亂臣賊子必有假之以劫其君不與之則惡人在君側而大臣不能正國終無與為者也是以治其始則正之以名而書叛原其終則察之以情而書歸使逆順兩得其道而不相廢則涖經事者不失其冝遭變事者不失其權矣故以鞅一見法焉薛弒其君比稱國以弒者衆弒君之辭也其事則史失之矣十有四年春衛公叔戍來奔公叔戍衛大夫之三命者也衛趙陽出奔宋趙陽衛大夫之三命者也二月辛巳楚公子結陳公孫他人帥師滅頓以頓子牂歸公子結公孫他人楚陳大夫之三命者也滅國未有言兩國之師者惡楚也楚嘗圍陳以納頓子矣今以陳訴而滅頓為人而滅者甚於己之滅也夏衛北宮結來奔五月於越敗吳于檇李吳子光卒公會齊侯衛侯于牽公至自會秋齊侯宋公會于洮天王使石尚來歸脤石尚王之上士也脤祭肉也古者以脤膰之禮親兄弟之國腥曰脤熟曰膰前未有言歸脤者此何以書善王命也自王季子來王命不復加於魯矣見天子所存猶有祭與號也衛世子蒯聵出奔宋衛公孟彄出奔鄭宋公之弟辰自蕭來奔見辰不見公子地仲他石彄以景公為不可正而辰獨去之也故終以弟言之大搜于比蒲邾子來會公來會會于比蒲也諸侯相見於郤地曰會蓋約信以命事焉搜而會之非禮也會公云爾城莒父及霄秋而城畏晉也以莒父及霄小大之辭也葉子曰是嵗無冬蓋定公至是而終矣定公之立以季氏故元年不書正月自二年而書正月不得已而與之正也然定公終不可以為正故於其終復去一時其始無正言其不得受之於王也其終無冬言其不得承之於天也桓公之罪大故絶其二時因其聘與朝而正焉定公之罪小故絶其一時其在人者無所與責也則正其終而已十有五年春王正月邾子來朝鼷鼠食郊牛牛死改卜牛不言所食食非一也不敬之道甚於食角也二月辛丑楚子滅胡以胡子豹歸夏五月辛亥郊五月何以郊五卜而從也五卜強也壬申公薨于髙寢諸侯有大寢有小寢髙寢非正也鄭罕達帥師伐宋罕達鄭大夫之三命者也齊侯衛侯次于渠蒢邾子來奔喪喪何以言奔急事也禮非天子父母之喪不奔見星而行見星而舍日行百里謂之奔諸侯而奔喪非禮也秋七月壬申姒氏卒哀公之妾母也何以不言夫人薨哀未成君未致之為夫人也非夫人則何以書卒哀己君也八月庚辰朔日有食之九月滕子來會葬丁巳葬我君定公雨不克葬戊午日下昃乃克葬辛巳葬定姒定姒者何未致之為夫人則繫之定也未致之為夫人何以得繫之定哀公將致之則不以妾母葬之也曾子嘗問於孔子曰並有喪如之何何先何後子曰葬先輕而後重其奠也先重而後輕禮也定姒後公葬非禮也冬城漆不時也哀公一元年春王正月公即位楚子陳侯隨侯許男圍蔡鼷鼠食郊牛改卜牛夏四月辛巳郊秋齊侯衛侯伐晉冬仲孫何忌帥師伐邾二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹此伐邾三卿也何以不言季孫斯季氏強也古者唯天子三公不與諸侯盟列國之卿當小國之君卑邾子而不與盟以季孫斯為僭也夏四月丙子衛侯元卒滕子來朝晉趙鞅帥師納衛世子蒯聵于戚納者何與其納也君薨矣蒯聵何以稱世子明正也輒不得受命於王父則蒯聵之世其國者正也葉子曰左氏載蒯聵使戲陽速殺南子之事然歟非也子路嘗問於孔子曰衛君待子而為政子將奚先子曰必也正名乎名不正則言不順推而下之至於民無所措手足使蒯聵果欲殺南子則弒母之賊也安有弒母之賊許之以繼世而謂之名正而言順乎是故夫子不為衛君子貢固知之矣蓋蒯聵始以南子召宋朝聞宋人之歌而醜之其歸必有正南子者而南子愧焉故欲加之罪誣以殺己爾戲陽速附之者也左氏不能辨遂以為實公羊不知其事而妄意之乃以輒為受命於靈公而為不以父命辭王父命之説夫靈公卒南子欲立公子郢為太子以為君命郢辭曰亡人之子輒在靈公未嘗立輒也此亦左氏之言從公羊之説固不可以為訓以左氏為正則輒非靈公之所立亦安得為受命於王父乎秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績趙鞅以兵車之斾先陳而會鄭師故以趙鞅及罕達言鞅之主戰也冬十月葬衛靈公十有一月蔡遷于州來蔡殺其大夫公子駟公子駟蔡大夫之三命者也楚圍蔡以報柏舉之役蔡人辨男女以聽命楚使遷於江漢之間而還蔡以駟謀復請於吳以遷州來而不果吳人將襲之乃殺駟以説吳公子駟之死罪纍上也故以國殺三年春齊國夏衛石曼姑帥師圍戚石曼姑衛大夫之三命者也此石曼姑之師也何以先齊國夏不使子加於父也何以不言衛戚不外戚於蒯聵也夏四月甲午地震五月辛卯桓宮僖宮災桓宮僖宮桓公僖公之宮也曷為以諡舉之逺也逺則何以不毁三家之為也禮諸侯五廟自襄數之至成於太祖之廟為五三家皆出於桓及僖而始大是以存而不毁三家之私也何以不言及尊相敵也季孫斯叔孫州仇帥師城啓陽以夏而城畏晉也定公城中城矣又城莒父及霄城漆哀公城啓陽矣又城西郛城毗城邾瑕蓋莊宣二君而書城者各一隱桓文成四君而書城者各再至襄以來求於城者始亟襄一君而城者四魯未有如是數也及定哀之間而書城者七則定哀守其國者如是而已宋樂髠帥師伐曹樂髠宋大夫之三命者也秋七月丙子季孫斯卒蔡人放其大夫公孫獵于吳公孫獵蔡大夫之三命者也以人放者放有罪之辭也州來之役以公子駟不即遷既殺駟以説吳獵復放于吳皆有纍於駟者其事則史失之矣冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾四年春王二月庚戌盜殺蔡侯申盜賤者也何以不言弒其君賤者不得列於君臣也蔡公孫辰出奔吳公孫辰蔡大夫之三命者也葬秦惠公宋人執小邾子稱人以執非伯討也其事則史失之矣夏蔡殺其大夫公孫姓公孫霍公孫霍蔡大夫之三命者也蔡侯之弒春秋書盜而左氏以為大夫公孫翩大夫不得言盜非是其事史失之矣公孫辰與姓霍蓋盜黨蔡於是逐辰而殺二人公孫姓公孫霍之死罪纍上也故以國殺晉人執戎蠻子赤歸于楚楚人圍蠻蠻氏潰出奔於晉楚人以師臨上雒索於晉曰晉楚有盟好惡同之不然將通於少習以聽命晉人於是執戎蠻子而歸於楚若京師然然非伯討也故以人執赤何以名不返也城西郛六月辛丑亳社災亳社商社也古者天子必存亡國之社屋其上而柴其下以為廟屏戒魯何得有亳社周公之賜也秋八月甲寅滕子結卒冬十有二月葬蔡昭公葬滕頃公五年春城毗夏齊侯伐宋晉趙鞅帥師伐衛秋九月癸酉齊侯杵臼卒冬叔還如齊閏月葬齊景公閏月不書此何以書著喪禮也以月計者數閏以年計者不數閏葬者計月不計年以景公葬為得節一見正也六年春城邾瑕晉趙鞅帥師伐鮮虞吳伐陳夏齊國夏及髙張來奔叔還會吳于柤秋七月庚寅楚子軫卒齊陽生入于齊陽生齊景公之世子也何以言入逆辭也景公欲廢陽生而立荼陳乞不能爭既偽許之而立荼矣景公死陳乞復詐國人立陽生而弒荼陽生雖得立而立之道則逆也齊陳乞弒其君荼陳乞齊大夫之三命者也殺荼於駘者朱毛也曷為以陳乞主弒荼陳乞之所君也既召陽生則荼雖欲存而不可是以不嫌於免朱毛而陳乞之罪不可以不正春秋之義也冬仲孫何忌帥師伐邾宋向巢帥師伐曹向巢宋大夫之三命者也七年春宋皇瑗帥師侵鄭皇瑗宋大夫之三命者也晉魏曼多帥師侵衛魏曼多晉大夫之三命者也夏公會吳于鄫秋公伐邾八月己酉入邾以邾子益來入邾者伐邾而入也何以不言公諱之也師入邾處其公宮與吳入郢之師何擇焉以公為一闔閭也宋人圍曹冬鄭駟𢎞帥師救曹駟𢎞鄭大夫之三命者也八年春王正月宋公入曹以曹伯陽歸此滅曹也何以不書滅惡宋公也曹文之昭也武王殺紂立武庚武庚叛復立微子於宋以代商後曰崇德象賢統承先王賔之弗臣曹伯雖失德然於宋未有罪也宋以向巢伐之固已過矣既又圍之歷三時而卒入焉虜曹伯歸而殺之遂以滅曹君子以宋為忘武王之德矣故書其始入不書其終滅不使曹得滅於宋也虢未滅而虞師晉師先書滅夏陽罪在滅者也曹已滅而宋公不書滅罪在滅之者也吳伐我何以不言鄙至於城下也初鄫人道吳師以克武城遂自蠶室庚宗次於泗上微虎欲宵攻吳吳人行成始為城下之盟而還以我為恥也夏齊人取歡及闡外取內邑不書此何以書賂也公前入邾固非道矣至是猶未釋也邾齊之出將為之伐我焉故公賂二邑以求免於是歸邾子益葉子曰歡闡之事吾何以不證於左氏而證之穀梁歟陽生娶於季氏非內女不書則有之矣而齊以季姬故來伐我及我與齊平則不得不見經也而皆不書且季魴侯之罪使公治之而齊罷婚可矣公何罪而受伐焉男女之别人倫之大也誠以有罪來討亦安可以賂而復合又從而嬖之非人情也若曰以執邾子而取邑釋邾子而歸邑則春秋之世所應有故公羊亦云吾是以知穀梁之為近實也歸邾子益于邾諸侯虜而返未有言歸者此何以言歸與內也我既與吳盟故釋邾子而返之其言歸何易辭也我脅於吳而聽焉則其歸為易也秋七月冬十有二月癸亥杞伯過卒齊人歸歡及闡此其為賂也曷為歸之邾子歸也何以不言我其與之恥其歸之恥不可以我見也九年春王二月葬杞僖公宋皇瑗帥師取鄭師于雍丘師未有言取者此何以言取不正其以詐乘人而盡獲之也雍丘宋邑也皇瑗圍鄭師每日遷舍壘合鄭師哭鄭罕達救之不克大敗宋於是取鄭師唯使能者無死以郟張與鄭羅歸則鄭之免者無幾矣夏楚人伐陳秋宋公伐鄭冬十月十年春王二月邾子益來奔公會吳伐齊三月戊戌齊侯陽生卒夏宋人伐鄭晉趙鞅帥師侵齊五月公至自伐齊葬齊悼公葉子曰諸侯弒而以疾告春秋從而書卒見於左氏者三吾信其一不信其二吾豈苟然哉楚麇之弒見於圍之行事而慶封亦言之此吾之所信也鄭髠頑之弒吾既言之矣齊陽生之弒吾亦未知其説夫弒君之惡亦大矣自非亂臣賊子欲篡而爭國則必強宗大家挾權專政而肆其虐今陽生左氏不言其故直曰赴于吳師而已未見陽生取弒於齊者也其赴於吳以為同好而告之邪則兵方交非以為好也將畏吳而求説邪吾既卒能敗之何懼而遽弒君乎吳子三日哭於軍門之外以為恤其災而哀之邪則冝不伐喪而返也將必自海而伐之則何為而哭乎既無當於人情而齊未有討弒君之賊者春秋乃書葬則陽生固未嘗弒也姑以為從赴告則非春秋之法此吾之所不信者衛公孟彄自齊歸于衛薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳十有一年春齊國書帥師伐我國書齊大夫之三命者也此猶吳之言伐我也冉求之師入齊軍孟孺子奔齊人從之遂涉泗冉求之師獲齊師甲首八十齊師乃宵遁則至於城下矣是非我之所恥也夏陳轅頗出奔鄭轅頗陳大夫之三命者也五月公會吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書公會吳伐齊齊人不服國書將中軍皆欲死戰故以國書及吳言齊之主戰也獲國書死於敵也秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋世叔齊衛大夫之三命者也十有二年春用田賦賦軍賦也古者自甸而上有軍賦成公作丘甲其厲民固已甚矣用田賦則凡受田者皆有賦雖井猶不免焉用者何賦不以田用田而賦舉丘之賦而加之田非正也於是季孫肥使冉有訪於孔子子曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足且季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聽子曰季氏冨於周公而求也為之聚斂而附益之小子鳴鼓而攻之可也其是之謂歟夏五月甲辰孟子卒孟子者何昭公之夫人也何以不曰夫人昭公取於吳諱取同姓也古者取妻不取同姓買妾不知其姓則卜之所以别男女也諱取同姓則何以謂之孟子疑辭也若宋女然何以不言薨疑其為夫人則不可以言薨也葉子曰吾何以知孟子之為宋姓歟記曰魯春秋去夫人之姓曰吳其死曰孟子卒孟子云者魯人之辭也宋魯婚姻之國故因之以為稱春秋從而不革史也其書吳則義之云爾孔子所以為法受過焉是以陳司敗嘗問於孔子曰昭公知禮乎子曰知禮陳司敗曰君取於吳為同姓謂之吳孟子君而知禮孰不知禮子曰丘也幸苟有過人必知之公會吳于橐臯秋公會衛侯宋皇瑗于鄖宋向巢帥師伐鄭冬十有二月螽十有三年春鄭罕達帥師取宋師于嵒師未有言取者此何以言取不正其以詐乘人而盡獲之也嵒宋鄭之隙地也鄭人城嵒以處宋之叛族向巢伐而圍嵒鄭罕達復圍之宋以桓魋救其師罕達徇其師曰得桓魋者有賞魋遁而歸鄭於是取宋師獲其二大夫以六邑為虛則宋之免者無幾矣夏許男成卒公會晉侯及吳子于黃池會未有言及者此何以言及會兩伯之辭也吳何以謂之伯進吳子也吳子與晉會黃池晉侯問師故吳子曰天子有命周室卑弱貢獻莫入上帝鬼神而不可以告無姬姓之振也今君將不長弟以力征於一二兄弟之國孤欲守先君之班爵用親聽會晉侯以其僭王稱使復命曰周室既卑諸侯失禮於天子孤以下無所逃罪今君掩王東海以淫名聞夫命圭有命固曰吳伯不曰吳王諸侯是以敢辭君若無卑天子以干其不祥而曰吳公孤敢不順從君命長弟吳子許諾辭尊稱居卑稱乃退而會吳先歃晉侯亞之吳遂以伯君子以是進吳子也何以先晉侯不使吳子得主中國也葉子曰吳楚皆非中國者也吳晚見春秋抑之常甚於楚楚屢會中國以長諸侯皆不免於貶雖莊王之賢不得一以伯稱吳自季札之聘柏舉之戰僅得以爵見然與中國會未嘗不殊惟一見於戚者下與鄫人齒而已今夫差胡為遽許之以伯哉蓋莊王之會欲以強奪諸侯而陵晉夫差之會欲以禮尊天子而責晉從莊王之義則干戈必至於中國從夫差之義則朝會必能尊中國此其所以異也夫差之志雖未必然而春秋之義蓋以其道不以其人故曰苟以是心至斯受之而已矣楚公子申帥師伐陳公子申楚大夫之三命者也於越入吳秋公至自會晉魏曼多帥師侵衛葬許元公九月螽冬十有一月有星孛于東方記異也何以不言次旦見也盜殺陳夏區夫夏區夫陳大夫之三命者也十有二月螽十有四年春西狩獲麟西國之西也孰狩之公也何以不言地不使麟得為地有也何以不言公不使麟得為公獲也公狩而叔孫氏之車子鉏商獲麟以為不祥以賜虞人孔子觀之曰麟也然後取之於是感而作春秋何感焉麟仁獸也有王者則至無王者則不至麟不至而狩獲之子曰吾道窮矣此春秋所以感麟也故以是始亦以是終葉子曰春秋以獲麟為終始吾既言之矣四靈王者之物也然易以乾言聖人之進退而六爻皆取象於龍其在初六曰潛龍勿用楚狂接輿比孔子於鳯而歌曰鳯兮鳯兮何德之衰也是四物者皆聖人以為類則麟非孔子以自説者歟龍非時而隱謂之潛鳯非時而出謂之衰則麟非王者不見而人獲之固麟德之衰也孔子伐木於宋削迹於衛窮於商周厄於陳蔡其亦出非其時而人以為不祥者歟道之廢興君子之用舍天也孔子蓋自任之矣故曰文王既沒文不在兹乎又曰如有用我者吾其為東周乎然求之天下而卒不得則天宜無意於斯也是以不復夢見周公則知其衰鳯鳥不至則知其已及顔淵死曰天喪豫子路死曰天祝豫此麟之獲所以為吾道之窮也春秋有闕一時而不書者矣有闕二時而不書者矣此責之於時君者也未有闕三時而不書者焉獲麟而闕三時不書其意若曰春秋吾以無王而著一王之法者也天下之所宗者王也王之所承者天也王者既不作則所謂承天者終何以見乎此其所以獨以春首時而不書王正月一見獲麟而闕其三時非明王者之事而盡天人之道者未足與言也葉氏春秋傳卷二十
