body:
  text: 葉氏春秋傳春秋類提要臣等謹按葉氏春秋傳二十卷宋葉夢得撰夢得字少藴號石林吳縣人紹聖四年進士南渡後官至崇信軍節度使事迹具宋史文苑傳其書以孫復春秋尊王發微主于廢傳以從經蘇軾春秋集解主于從左氏而廢公羊穀梁皆不免有弊故其書考三傳以求經不得于事則考于義不得于義則考于事更相發明頗為精核開禧中其孫筠刋于南劍州真得秀跋之稱其闢邪説黜異端有補世教不淺宋史藝文志又載夢得别有春秋考三十卷讞三十卷指要總例二卷石林春秋八卷今讞考二書散見永樂大典中尚可得其大槩餘皆散佚惟此傳猶為完書南窗紀事載夢得為春秋書其别有四解釋音義曰傳證正事實曰考掊擊三傳曰讞編列凡例曰例嘗語徐惇濟曰吾之為此名前古所未見也惇濟曰吳程秉著書三萬餘言曰周易摘尚書駁論語弼得無近乎是云云案此傳不専釋音義其説已非至于以一字名書古人多有即以春秋而論傳為通名不必言矣如漢志所載鐸氏張氏皆有春秋微公羊傳疏有閔因春秋敘後漢書有鄭衆春秋刪隋志有何休春秋議崔靈恩春秋序孫炎先有春秋例夢得博洽安得不見乃以為古無此名必非事實且宋志載夢得春秋指要總例亦不名曰春秋例殆小説附會之詞不足據也乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀葉氏春秋傳原序葉子曰春秋為魯而作乎為周而作乎為當時諸侯而作乎為天下與後世而作乎曰為魯作春秋非魯之史也曰為周作春秋非周之史也曰為當時諸侯作春秋非當時諸侯之史也夫以一天下之大必有與立者矣可施之一時不可施之萬世天下終不可立也然則為天下作歟為後世作歟故即魯史而為之經求之天理則君臣也父子也兄弟也朋友也夫婦也無不在也求之人事則治也教也禮也政也刑也事也無不備也以上則日星雷電雨雹雪霜之見於天者皆著也以下則山崩地震水旱無冰之見於地者皆列也泛求之萬物則螽螟蝝蜚麋􅈮鸜鵒之於鳥獸麥苗李梅雨冰殺菽之於草木者亦無一而或遺也而吾以一王之法筆削於其間穹然如天之在上未嘗容其心而可與可奪可是可非可生可殺秋毫莫之逃焉迎之不見其始要之不見其終是以其書斷取十有二公以法天之大數備四時以為年而正其行事號之曰春秋以自比於天由是可以為帝由是可以為王由是霸者無所用其力由是亂臣賊子無所竄其身前乎此聖人者作固有堯舜禹湯文武周公焉而莫能外也後乎此聖人者作復有堯舜禹湯文武周公焉而莫能加也是以當孔子時雖遊夏之徒不能措一辭自孔子沒而三家作吾不知於孔子親聞之歟傳聞之歟至於今千有餘嵗天下之言春秋者惟三而已孟子不云乎其事則齊桓晉文其文則史而子之自言則曰其義則丘竊取之矣夫春秋者史也所以作春秋者經也故可與通天下曰事不可與通天下曰義左氏傳事不傳義是以詳於史而事未必實以不知經故也公羊穀梁傳義不傳事是以詳於經而義未必當以不知史故也由乎百世之後而出乎百世之上孰能核事之實而察義之當歟惟知春秋之所以作為天下也為後世也其所自比者天也其所同者堯舜禹湯文武周公也不得於事則考於義不得於義則考於事事義更相發明猶天之在上有目者所可共覩則其為與為奪為是為非為生為殺者庶幾或得而窺之矣天之既喪斯文也後死者不得與於斯文也天之未喪斯文也後世必有作者焉乃酌三家求史與經試嘗為之言以俟後之君子而擇其中其亦有當爾乎其亦無當爾乎作春秋傳二十篇
