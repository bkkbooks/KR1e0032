body:
  text: 葉氏春秋傳卷十二宋葉夢得撰文公二冬楚子使椒來聘秦人來歸僖公成風之襚襚者何歸死也貝玉曰含衣衾曰襚襚不書此何以書因外之弗夫人以見正也妾母繫之子曰僖公成風禮也內既夫人之矣春秋所不得革猶以秦人之辭為正也葉子曰含襚皆所以贈死也既葬而後歸之禮歟死喪之戚君子未有不致其哀者也然死而赴赴而弔則為之含襚賵與之俱焉弔者降出反位而後含者執璧以入含者降出反位而後襚者執冕服以入其歸死者盡矣而後上介執圭將命曰寡君使某賵然而死三日而斂上下之所同也則含襚有不及其尸者矣先王待人以情而不責人以事故禮有既葬而至含于蒲席者稱其情而為之也而左氏乃謂惠公仲子賵為貶不及尸榖梁謂成風之含賵為貶不周事者皆妄也葬曹共公十年春王三月辛邜臧孫辰卒夏秦伐晉秦何以國舉秦晉之讎久矣自四年晉侯伐秦不復貶七年而為令狐之戰蓋有為而然也而公子雍之不可納秦固已失正矣如不可而退猶以為愈也晉自是不出師者三年而秦復首興兵端終不忍小忿以殘其民則秦晉之怨無時而可息矣殽戰晉固與有責也至是則晉有辭矣是以獨歸惡於秦也楚殺其大夫宜申城濮之戰宜申兵敗楚子不殺以為商公既而㳂漢泝江將入郢曰臣免於死又有讒言謂臣將逃臣歸死於司敗楚子復使為工尹乃謀弒楚子遂殺焉宜申之死罪纍上也故以國殺自正月不雨至於秋七月及蘇子盟于女栗蘇子寰內諸侯王之中大夫也孰及之公也何以不言公不與公之與內大夫交也公於內大夫有㑹盟無及盟及而離盟私交之也冬狄侵宋楚子蔡侯次于厥貉十有一年春楚子伐麇麇國也夏叔彭生㑹晉郤缺于承匡叔彭生吾大夫之三命者也郤缺晉大夫之三命者也秋曹伯來朝公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹十有二年春王正月郕伯來奔郕伯何以不名內未有君也葉子曰吾何以知郕之內無君歟衛侯鄭附楚晉文公興懼討使元咺立其弟叔武而奔楚叔武不當國而攝焉春秋不名鄭書衛侯出奔楚不嫌也踐土之盟叔武亦書子而不以爵見不君之也凡諸侯奔而不名惟此兩見以類求之吾是以知其然也杞伯來朝二月庚子子叔姬卒子叔姬文公之女也何以書卒許嫁也夏楚人圍巢巢國也秋滕子來朝秦伯使術來聘術秦大夫之再命者也冬十有二月戊午晉人秦人戰于河曲何以不言及兩欲之也何以不言師敗績貶之也前既已貶秦矣此何以復貶秦前伐未得志而復伐晉晉以趙盾禦之於河曲謀深溝固壘以老秦師秦軍掩晉上軍趙穿以其屬獨出趙盾不能禁乃皆出戰以為不能弭敵而復出以爭是以貶而又貶也季孫行父帥師城諸及鄆諸鄆內二邑也以諸及鄆小大之辭也城則何以帥師畏齊也莒有鄆魯有鄆莒鄆附庸也魯鄆吾邑也齊嘗取其田矣是以城而有畏焉畏非城之道也十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒自正月不雨至于秋七月大室屋壞大室公羊作世室左氏榖梁作大室當從二傳大廟之室也古者將祭祀其廟則有司修除之其祧以守祧黝堊之無壞之道壞久不修也自文而上皆貶矣冬公如晉衛侯㑹公于沓狄侵衛十有二月己丑公及晉侯盟公還自晉鄭伯㑹公于棐公還不書此何以書善公之能平衛鄭也衛鄭皆嘗附楚而畏晉討故因公之朝往則衛侯㑹公于沓反則鄭伯㑹公于棐皆介公以請平于晉明年于是同盟于新城則公成之也一出而三國附是以善其還焉十有四年春王正月公至自晉邾人伐我南鄙叔彭生帥師伐邾夏五月乙亥齊侯潘卒六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城晉始得諸侯衛鄭既請平從于楚者盡服故趙盾修小白之舊復為同盟㑹而後盟故别見日㑹何以不目新城盟何以不目諸侯君子以趙盾之盟異乎小白之盟略之也秋七月有星孛入于北斗記異也五星之變為彗孛彗也何以曰入北斗有環域自外入于環中也公至自㑹晉人納捷菑于邾弗克納納捷菑則何以言弗克納善之也此趙盾之師也善之則何以言晉人不與大夫得専廢置君也古者立嫡以長不以賢立子以長不以貴邾文公卒無嫡捷菑貜且皆庶子也貜且長邾人立貜且晉以捷菑已出而往納焉邾人曰子以其指則捷菑四貜且六雖然貜且也長趙盾引師而去之君子是以與其弗克納也故言弗弗者可納而不納也然趙盾不納捷菑可専廢置邾君不可春秋不以所可廢不可此趙盾所以不免於人也九月甲申公孫敖卒于齊內大夫卒于外不書此何以書録難也敖初奔莒魯人立其子榖以為後榖死復立其弟難敖請重賂以求復難以為請許之未至而卒故與大夫卒于國內者同書君子以是録難也葉子曰吾何以知內大夫卒于外不書歟季孫行父以仲遂之故逐公孫歸父歸父走之齊魯人徐傷其無後於是立其弟嬰齊以後仲氏則歸父蓋死于齊矣然而春秋不見歸父之卒蓋位已絶則不得以大夫卒之也古者以大夫卒則得以大夫卒之蓋為之變也不以大夫卒則不得以大夫卒之蓋不為之變也敖雖許其復而非大夫則禮不得書卒書卒所以為録難也使嬰齊能為難則生必能盡其力以復其身生不能復則死必能盡其力以歸其喪而嬰齊無聞焉春秋之時臣弒君子弒父無國而無有則有如難者不得不貴所以盡人倫之至而示天下以大孝也故以難一見法焉齊公子商人弒其君舍公子商人齊大夫之三命者也舍未踰年之君也何以稱弒其君惡商人也成之為君則可名以弒不成之為君則不可名以弒商人取舍而代之者也君子以為異乎里克之殺奚齊故成舍之為君者所以正商人之弒也宋子哀來奔子哀宋大夫之髙哀也何以曰子哀字也宋昭公無道哀為蕭封人昭公命以為卿哀不義其所為知宋之將亂棄而來奔故以字褒之為於治亂為見幾於去就為有義也冬單伯如齊單伯魯四命之孤也齊人執單伯單伯以事使於齊者也何以不稱行人單伯之執非以其事也商人暴子叔姬單伯因使而為之請曰既殺其子安用其母商人怒遂執單伯非伯討也故以人執葉子曰單伯左氏以為王大夫而公羊榖梁以為魯大夫道淫子叔姬而見執左氏固已失矣二傳亦得之而未盡也戎伐凡伯以歸不言執榖梁謂以一人同一國大天子之命春秋施之於戎猶爾豈中國執天子之使而反與諸侯之辭一施之乎王大夫適他國初不書於春秋州公如曹劉夏逆王后于齊皆因過我而得見也則單伯何以得獨書經書單伯至自齊且執王大夫而魯書至此尤理之必不然者蓋左氏傳事不傳義也公羊榖梁雖以為魯大夫然求其執而不得則意其為道淫不近人情愈甚蓋二氏傳義不傳事也齊人執子叔姬子叔姬齊君舍之母也商人舍之庶弟商人既弒舍不禮於叔姬因單伯之請而執單伯故又執叔姬再見齊人别單伯之執非一事也凡國君自執其國人未有書執者子叔姬則何以書執春秋天下之大教也天下豈有無母之國哉言夫人姬氏則不可書執言子叔姬則可書執故以父母之辭言之若魯人然不使得見為齊君之母所以存教也舍未踰年既成之為君而正其弒則商人之罪無所逃矣故不再貶使天下之為母者存亦以絶商人於天下也十有五年春季孫行父如晉三月宋司馬華孫來盟司馬官舉者也華孫華耦也官舉則何以復稱氏而不名貶也華樂皇皆戴族襄夫人殺大夫司馬三族與焉昭公立而不得自為政華孫於是出而來盟以為能其官則非也故不言使而加氏其不得以名見焉者嫌其與楚屈完同辭也屈完以君命出而専盟者也華耦不以君命出而擅盟者也以為若齊仲孫來則近之矣夏曹伯來朝齊人歸公孫敖之喪內大夫葬歸不書此何以書録難也敖死齊人飾其棺而置諸堂阜難毁以請期年猶未巳立於朝以待命魯人許之取而殯于孟氏之寢葬視共仲君子以是録難也春秋一惡不再貶一善不再褒難之善己特見於書卒此何以復書喪歸生雖許復其位死不能終歸其葬猶不復也故曰書之重辭之復其中必有美惡者焉春秋之意也何以不言來齊人許而我受之於齊也六月辛丑朔日有食之鼓用牲于社單伯至自齊內大夫如不書至大夫執而後書至大夫國體也晉郤缺帥師伐蔡戊申入蔡伐而以同日入故見日郤缺以上下軍伐蔡曰君弱不可以怠遂以戊申入㑹而以同日戰故先言㑹而後言日伐而以同日入故先言伐而後言日戰不為期則近於詐伐不待服則近於陵秋齊人侵我西鄙季孫行父如晉冬十有一月諸侯盟于扈此晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯也何以不序不足序也齊執子叔姬晉率諸侯尋新城之盟以謀伐齊晉受齊賂不克而還以諸侯為不足序也十有二月齊人來歸子叔姬來歸出也何以不言子叔姬來歸不正商人以子出母也內女出皆以歸為文見其以罪絶於夫之國也故國君出夫人使者將命曰寡君不敏不能從而事社稷宗廟使臣某敢告主人對曰寡君固辭不教矣敢不敬須以俟命天下豈有子而出其母者哉故以齊人來歸為文曰齊人出之則可子叔姬無絶於商人者也齊侯侵我西鄙遂伐曹入其郛郛外城也諸侯之國三里之城七里之郭城中城郛郭也入其郛而不入其城是亦入焉爾十有六年春季孫行父㑹齊侯于陽榖齊侯弗及盟弗及盟齊侯不肯與我盟也齊侯既歸子叔姬遂侵我西鄙我以季孫行父約齊侯而與之盟齊侯不肯與大夫盟而後約若弗及然以齊侯為愧矣桃丘我往而不肯遇故言弗遇陽榖齊侯來而不肯盟故言弗及盟夏五月公四不視朔不視朔不書此何以書言公之有疾也以公有疾而書則凡不書者皆公無疾而不視朔也古者天子皮辨以日視朝朔月則以𤣥端聽朔於南門之外諸侯朝服以日視朝朔月則皮辨聽朔於太廟未有天子聽朔而諸侯不視朝者也蓋魯自是不視朔矣葉子曰是子貢欲去告朔之餼羊者歟子曰爾愛其羊我愛其禮此春秋書不視朔之意也六月戊辰公子遂及齊侯盟于郪丘秋八月辛未夫人姜氏薨僖公之夫人也毁泉臺毁泉臺何以書不正其聽於神而疑民也有蛇出於泉宫入國如先君之數既而夫人薨魯人以為妖遂毁泉臺非示民之道也葉子曰殷人率民以事神先鬼而後禮孔子以為其民之敝蕩而不靜是以古者假鬼神時日卜筮以疑衆者誅不以聽孔子蓋知之矣故曰不語怪力亂神然後人知敬鬼神而逺之故以泉臺一見法焉楚人秦人巴人滅庸冬十有一月宋人弒其君杵臼稱人以弒微者弒君之辭也昭公既不得於襄夫人夫人殺其大夫司馬而昭公無以自立矣即位九年卒因昭公田率郊甸之師而弒公故以人弒十有七年春晉人衛人陳人鄭人伐宋夏四月癸亥葬我小君聲姜聲諡也齊侯伐我西鄙六月癸未公及齊侯盟于榖諸侯㑹于扈扈之㑹晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯也何以不序不足序也宋既弒昭公晉侯復合扈之諸侯以討宋亂而後不能以諸侯為不足序也秋公至自榖冬公子遂如齊十有八年春王二月丁丑公薨于臺下非正也秦伯罃卒夏五月戊戌齊人弒其君商人稱人以弒微者弒君之辭也商人為公子與邴歜之父爭田弗勝即位掘而刖之而使歜僕納閻職之妻而使職驂乘游于申池二人遂弒公納諸竹中故以人弒六月癸酉葬我君文公秋公子遂叔孫得臣如齊使舉上介公子遂叔孫得臣何以並見二卿共使也聘則何以二卿共使非常聘也其謀立宣公也歟文公夫人姜氏生子赤其二如敬嬴生宣公子赤嫡而幼宣公庶而長敬嬴私事公子遂以屬宣公文公薨遂於是欲立宣公問赤於叔彭生曰君幼如之何願與子慮之對曰吾子相之老夫抱之何幼君之云遂知不可乃殺彭生將見於齊侯而請之以其非常聘故以得臣共使見重也聘禮君與卿圗事遂命使者蓋使必以卿既圖事而後戒上介衆介則以宰命司馬戒焉司馬掌士衆介以士為之則上介宜以下大夫得臣卿此非以為介蓋共使者也葉子曰公子遂莊公之子僖公之弟也自僖公以來三桓之子孫始漸進四年公孫兹見文元年叔孫得臣見而叔孫氏強矣僖十五年公孫敖見而仲孫氏強矣文六年季孫行父見而季孫氏強矣終春秋之世莫之能去也僖之十六年公子友卒秋公孫茲卒三家子孫列於卿者惟公孫敖一人遂以二十八年得政雖後於敖然視三家為最親故敖自十五年救徐之後不復用事所往來齊晉楚三大國之間至於入杞伐邾皆遂為之魯之政蓋皆在遂焉文公立而遂益専及元年叔孫得臣見六年季孫行父見二氏雖復進而力未能與遂抗故其末年執政惟遂與叔彭生得臣行父四人彭生既以不從而殺則得臣行父不得不畏而聽此其所以挾得臣與之偕行將以見此魯執政之意而非已之私也齊侯於是許之宣公立季孫行父亦如齊公遂㑹齊侯於平州以定其位則二人蓋皆與聞乎弒者歟冬十月子卒此弒也何以不書弒內辭也不書則何以知其為弒不地則知其為弒也遂既以賂請於齊齊惠公新立亦欲親魯而許之故遂歸弒赤而立宣公何以不名未踰年君之辭也夫人姜氏歸于齊歸者何大歸也子赤既死夫人無以容于魯執政於是謀而歸之齊執政謀之宣公從之齊人受之以為一有禮義之心焉則不至於是也季孫行父如齊莒弒其君庶其稱國以弒衆弒君之辭也葉子曰弒君天下之大惡也春秋各正其名而無所加辭吾固言之矣而左氏不能盡辨乃曰弒君稱君君無道也稱臣臣之罪也夫國有不幸出於爭奪以庶而篡嫡如齊商人者立非其正黜於強臣如晉里克者槩以為君無道可乎君君臣臣天下之大義也必以稱臣而後為臣之罪則稱國為非其罪可乎此左氏不傳經臆以為說者也故各書其事雖或僅得之而終不免惑其私故於庶其曰莒杞公生太子僕又生季他愛季他而黜僕且多行無禮於國僕因國人以弒莒公於密州曰莒犁比公生去疾及展輿既立展輿又廢之犁比公虐展輿因國人攻莒子弒之乃立若然則庶其當為世子弒密州當為公子弒何為反書國與人乎以吾考之庶其所謂多行無禮於國密州所謂虐國人而國人弒之者其言是也以為僕與展輿之弒則不明春秋之義而妄信舊史之過矣惟公羊穀梁氏為能近之蓋非傳經者不能辨吾是以於左氏所記事每不敢盡以為證必斷於經焉孟子曰盡信書不如無書吾於武成取二三䇿而已此之謂善學宣公一元年春王正月公即位繼弒而書即位見宣志也葉子曰隱公之弒公子翬也子赤之弒公子遂也春秋於翬與遂皆無異辭至桓與宣則書即位以著其意何也春秋以道治弒君者三而正弒君不與焉鄭公子歸生非本弒夷者也懼人之譛已而從之故夷弒不書公子宋而書歸生楚公子比非親弒䖍者也告之謀而不能拒故䖍弒不書公子弃疾而書比晉趙盾非實弒夷臯者也不討賊而居其位故夷臯弒不書穿而書盾書歸生者春秋之義也書比者春秋之情也書盾者春秋之教也翬與遂之罪固不得免矣然其所為則桓宣之意也使以翬遂首惡則凡天下之為篡奪而弒其君者皆得因人而免矣此桓宣所以書即位也公子遂如齊逆女此喪娶也何以不言納幣在文公之世也三月遂以夫人婦姜至自齊遂不稱公子一事而再見者卒名之也文與宣皆喪娶也故出姜逆不稱氏穆姜至亦不稱氏其為貶之道同也何以不於其逆焉貶逆者未成婦也至者已成婦也出姜公自逆不與其自逆而沒其至則不得於至為貶矣婦有姑之辭也夏季孫行父如齊晉放其大夫胥甲父于衛胥甲父晉大夫之三命者也放者宥之以逺也古者臣有罪待命於其境君賜之環則還賜之玦則去謂之放晉與秦戰于河曲胥甲父佐下軍㬰駢佐上軍秦晉以力爭而民敝久矣秦師將退㬰駢欲薄諸河胥甲父不可而止秦師遂遁至是八年晉患不得志於秦追咎胥甲父而放之非其罪也故以國放凡以國放者大夫無罪而君放之也以人放者大夫有罪而衆放之也公㑹齊侯于平州公子遂如齊六月齊人取濟西田外取內田不書此何以書賂也宣公既請於齊而以弒立故以濟西田賂齊為之辭言齊取若非我與之然齊稱人貶也曰濟西田不一地也秋邾子來朝楚子鄭人侵陳遂侵宋晉趙盾帥師救陳宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭此趙盾之師也不言趙盾不以大夫㑹君也冬晉趙穿帥師侵崇趙穿晉大夫之三命者也崇國也晉人宋人伐鄭二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元華元公子歸生宋鄭大夫之三命者也鄭受命于楚以伐宋華元不服而禦之故以華元及歸生言華元之主戰也君獲不書師敗績大夫獲書師敗績君重於師師重於大夫華元獲再見宋華元盡力於戰不以獲恥華元善之也秦師伐晉夏晉人宋人衛人陳人侵鄭秋九月乙丑晉趙盾弒其君夷臯此弒者趙穿也曷以為盾主弒盾正卿也臣弒君在官者殺無赦盾有憾於靈公而出聞靈公弒未越境非君命而自復不討穿反與之並列於朝君子以為此同乎欲弒靈公者特假手於穿爾是以探其惡而誅也葉子曰左氏記盾事載孔子之言稱盾能為法受惡為良大夫而許之以越竟乃免此非孔子之言也弒君天下之大惡也有為不為爾使與聞乎弒雖在四海之外無所逃則安取於越竟使不與聞雖在朝如晏子其誰敢責之而况已出春秋書盾非以其實弒也榖梁氏載董狐之言曰子為正卿入諌不聼出亡不逺反不討賊則志同志同則書重非子而誰是蓋推盾之志而加之弒者也左氏傳史不傳經故雖得於三言而莫知春秋之義正在於志同則書重乃略而不言則盾為實弒矣安有實弒君而為法受惡是區區何足言者猶得為良大夫乎親弒其君者其惡易見假手以弒其君者其惡難察使盾而得免則亂臣賊子皆將假諸人以肆其惡甚乎親弒君者矣故以趙盾一見法焉冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊三年之內不郊初未有書者此何以書為郊牛之口傷及牛死起也古者祭祀天子諸侯必有養獸之官君召牛納而視之擇其毛而卜之吉然後養之朔月月半則皮辨素積以巡牲有帝牲有稷牲何為稷牲后稷之牲也郊必以祖配后稷祖也未用謂之牛將用而全謂之牲故將祭展牲則告牷牷之為言為其全而無傷也帝牛不全則扳稷牛而卜之稷牛不吉或死則不郊郊牛之口傷自傷也改卜牛稷牛也傷者養之不謹死者若有譴之者也以宣公為事天者怠矣葉子曰先王養獸之官曰充人其祀上帝享先王之牲繫於牢芻之必三月初未有閒也散祭祀也牲則繫之國門而公羊氏乃以為帝牲在滌三月於稷者唯具是視記禮者因之遂以為事天神人鬼之别夫天地宗廟先王以類求之者其文或有異至於齊明之誠豈有二哉此公羊氏之失也葉氏春秋傳卷十二
