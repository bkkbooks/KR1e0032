body:
  text: 葉氏春秋傳卷八宋葉夢得撰閔公二冬齊仲孫來仲孫者何齊大夫仲孫湫也何以不名貶也何以不言使不與其使也外大夫不徒出盟當言盟聘當言聘未有非盟聘而來者也齊侯既與公為落姑之盟矣謂魯難為未息則問罪伐之而已以為已息則何難焉齊侯之失也湫大夫也大夫非公事不受命非所來而來湫之失也雖曰不去慶父魯難未止而不能使齊侯討慶父姑曰難不已將自斃是養亂也雖曰魯不棄周禮未可動也而不能使齊侯保閔公姑曰君其務寧魯難而親之是懷安也則亦從君而已矣故於齊侯則奪其使於仲孫則奪其名葉子曰春秋大夫以名見而不名者所以為貶也仲孫湫以奪名為貶則與殺大夫無罪而不名者何辨殺大夫不名官舉之也尊之故不名貶大夫不名氏舉之也略之故不名二年春王正月齊人遷陽陽國也夏五月乙酉吉禘于莊公禘推其祖之所自出之祭也何以言吉禘喪三年不祭惟天地社稷則越紼而行事莊公之喪二十有二月矣未應吉而吉也禘祭於太祖之廟以其祖配之者也何以言於莊公君薨祔而作主特祀於寢三年升于廟莊公之主未升於廟即於寢而以莊公配之非所配而配也葉子曰禮天子七廟諸侯五廟大夫三士二過是而毁矣以為親盡而迭毁者禮之所不得已而非其情也時一變而祭之者親廟也而毁廟不及焉故謂之祫喪畢而舉之自是五年而再殷祭則毁廟之主皆及矣五年而再祭者毁廟也而祖之所自出不及焉故為之禘以祫之明年舉之自是二年而復禘則祖之所自出亦及矣然是天子之禮也古者不王不禘諸侯不得祖天子則祖之所自出不敢僭故諸侯祫而不禘大夫不得祖諸侯則太祖不敢越故大夫享而不祫其曰大夫士有大事賜於其君干祫者此禮之不以為常者也故曰都邑之士則知尊禰矣大夫及學士則知尊祖矣魯之得禘以周公之賜也周人禘嚳而魯以禘祀周公豈周以嚳為祖之所自出文王配之魯以文王為祖之所自出而周公配之有為之降殺者歟禮廢久矣世之學者猶及見魯禮者以春秋所書也然而春秋見禘而不見祫何也以為祫者諸侯之所得為合於禮則不書其因事而見則謂之大事諸侯之祭莫大於祫也禘非諸侯所得為而魯以周公之賜合於禮亦不書則因事而見以著其名者特以别其非所為而為爾禘祫之時於禮無見吾以孟獻子之言推之所謂正月日至可以有事於上帝七月日至可以有事於祖考是在魯雖為僭然實周之舊制歟蓋郊天事主乎陽故以冬至禘鬼事主乎陰故以夏至魯以季夏六月禘周公于太廟者不得全同於天子則以夏之四月也乃僖公以七月禘于太廟者是用獻子之僭言爾春秋所以著之也惟祫無所據而文公以八月大事于太廟此躋僖公有為為之未必其節也秋八月辛丑公薨此弒也何以不書弒內辭也不書則何以知其弒不地則知其為弒也葉子曰季子來歸見貴於春秋然叔牙將弒君而季子殺之慶父弒子般而季子不能討乃使復致閔公之禍則季子得無貶乎春秋之與奪有正之以法者有揆之以情者正之以法所以立天下之教揆之以情所以盡天下之變魯之權在慶父矣外挾霸主之令內恃國人之心此季子之所以得歸也然齊侯雖盟於落姑其志未果於討慶父方使仲孫湫來省難則慶父無深畏於齊而權猶在已豈季子一朝所能奪哉是以姑吉禘於莊公以示宗廟之重徐以待其釁此季子之所能為也慶父知國人不與而季子未可動終不能保齊侯之不討已則惟有篡閔公而君臨之猶可以苟存此季子之所以不能知也使季子始得國而即誅慶父不幸不能勝身死而慶父無與制雖閔公其可保乎則魯固慶父之國矣二者權其輕重寧失之緩不可失之急故終能圖慶父而不喪其宗國此春秋所以原其情而不貶也九月夫人姜氏孫于邾公子慶父出奔莒子般之弒夫人與慶父矯立閔公而歸獄于鄧扈樂故夫人猶得安國中而慶父可以託君命以聘齊閔公之弒慶父篡而不得則夫人與慶父之計窮矣外已失齊援而惡暴於國人雖權在己亦無能為季子可誅而不誅猶使逃焉者以僖公為重而不遽討之也僖公立則慶父自不能免矣故直書慶父出奔莒而不著季子奔邾春秋終始之意也葉子曰公羊以牙欲立慶父而季子殺之以為遏惡故將而不免慶父親弒二君而不誅以為不可及故既而得免夫弒君之惡一也豈未弒者以遏惡不免已弒者反以不可及得免乎是蓋不知季子以僖公為重之意陳他殺於蔡春秋不以為緩而桓公得葬慶父召於莒而殺之固已討矣何免之云冬齊高子來盟高子齊大夫高傒也子男子之美稱也何以不言名褒之也閔公弒慶父奔季子與僖公方適邾齊侯使高子以南陽之甲至魯未知其窺之歟平之歟齊侯之命高子將曰可則盟不可則不卒與季子立僖公盟國人而定其位則高子之為也春秋之義大夫出疆有可遂者則遂焉高子遂之善者也君子於是褒焉不言使制在高子也前定之盟曰來盟楚以屈完來盟齊完能服罪以尊王故得名氏齊以高傒來盟魯傒能立君以定國故得稱子是以春秋之辭一施之也十有二月狄入衛鄭棄其師此高克之師也鄭伯惡高克而反暴其兵於外久之不召衆散而歸非師之棄鄭鄭棄其師也葉子曰是高克之奔陳者也春秋何以不書高克出奔而獨志鄭之棄其師乎蓋鄭伯之所惡者高克爾而師何罪焉凡戰而敗績雖君將猶稱師以衆為重也今狄入衛鄭伯以禦狄為名而出高克遂并其衆而不返夫誰與為師哉東山之詩曰我徂東山滔滔不歸夫周公之征三年矣而士無歸志使有天下而用其師如此孰有能棄之者是在易之師所謂地中有水者以為畜衆之道非鄭伯之謂矣故以鄭一見法焉僖公一元年春王正月不書即位繼故也有不忍於先君也僖公閔公之庶兄也而閔公已踰年親之非父也繼之如父者臣子一例也齊師宋師曹師次于聶北救邢聶北邢地前未有言伐邢者何以言救備狄也狄與邢為怨久矣前言伐邢而齊救之未得志也故今入衛而三師為之備焉次者有待之辭也凡救不必皆交兵苟可排難解紛者皆救焉敵未至而前為之備則先言次而後言救次其意也救其事也敵已至而後為之援則先言救而後言次救其事也次其意也直救為救次而救亦救要其成功則一而已矣故滅無善辭救無惡辭葉子曰吾何以知次言救之為善歟孟子曰今人乍見孺子將入於井皆有怵惕惻隱之心非所以納交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也由是觀之無惻隱之心非人也然則救之為言亦非有惻隱之心者歟孰利之而使趨也孰迫之而使進也亦曰吾心而已矣則救豈有不善者哉春秋救而言次者二聶北也雍榆也學者皆言雍榆救晉先救後次而齊無聞聶北救邢先次後救而邢遷于夷儀為以不果救見貶於春秋夫三國於邢利害未有相及也如欲不救則勿救而已矣何用入其地而復止待其遷而後為之所乎三師能救邢不能使邢常存邢之遷自遷也非亡也邢不待伐而先救晉已伐而後救之吾以聶北之功有大於雍榆者是以知三師非得罪於春秋者也夏六月邢遷于夷儀邢自遷也齊師宋師曹師城邢何以再目齊師宋師曹師救一事也城一事也歸而復城者齊侯之志也凡城而遷者專也遷而為之城者正也秋七月戊辰夫人姜氏薨于夷齊人以歸夷齊地也公薨地不地故也夫人薨不地地故也何以不言薨于齊非薨于齊也薨于齊則可言歸夫人之喪非薨于齊則不可言歸夫人之喪曰齊人以歸者喪非齊人之可以歸也楚人伐鄭荆自是始稱楚荆其自名也楚中國之名也蓋將變而從中國矣故前伐狄曰荆今始加之人荆人來聘臣之辭也楚人伐鄭君之辭也君臣猶同辭以為是無别於君臣者則亦無别於君臣也八月公㑹齊侯宋公鄭伯曹伯邾人于柳此齊侯之㑹也邾人以微者㑹乎非微者也夫人嘗孫于邾矣而齊侯殺之於夷蓋取之于邾也齊取子糾於我殺之猶為之辭則取夫人於邾殺之我不得與之並㑹公可以辭矣故邾稱人若非其君然所以病公也九月公敗邾師于偃夫人之故也齊可以取夫人於邾義也霸者也我不可許夫人與齊道也子也故不敢以柳之盟無討於邾君子以魯為近於道矣偃邾地冬十月壬午公子友帥師敗莒師于酈獲莒拿酈魯地也拿莒大夫之再命者也蓋責慶父之賂而不得故來伐我莒拿死之凡諸侯戰死曰滅生曰獲大夫生死皆曰獲十有二月丁巳夫人氏之喪至自齊夫人不稱姜貶也文姜之罪未有以討之者也故於其孫貶之其惡以孫著也哀姜之罪齊討之矣則孫不必遽見也故於其討而喪歸著之其惡以討著也文姜得罪於夫故去姓與氏哀姜得罪於子故去姓存氏不於薨貶霸主之令也喪至而後貶春秋之義也二年春王正月城楚丘楚丘衛邑也外城邑不書此何以書城衛也狄入衛殺衛懿公戴公文公廬于曹而不能國齊侯與諸侯遷衛於楚丘而城之何以不言城衛不與諸侯之得專封也諸侯城之則何以獨言城楚丘衛非諸侯所得城故為之辭若城其內邑然古者大封諸侯告於后土頒祀於其國土其地而制其域為之畿疆而設其社稷非天子莫之敢為也上無天子下無方伯天下有相滅亡諸侯力能救而救之與之則亂法不與則滅國無與興也故與其實不與其文以楚丘言之云夏五月辛巳葬我小君哀姜虞師晉師滅下陽下陽虢邑也外取邑不書此何以書為滅虢也虞貪晉賂許之假道而請先伐故序晉上疾之也下陽虞虢之塞邑也邑不言滅虞恃虢虢恃下陽無下陽則無二國矣故以下陽當二國也葉子曰域民不以封疆之界固國不以山溪之險有天下者固不在險也然在易之坎曰天險不可升也地險山川丘陵也王公設險以守其國則聖人有時而用險矣所惡於險者為其恃之而不為德也苟德之修雖險猶將設之况可守而不守乎虞虢之相為援宫之竒蓋知之矣曰脣亡則齒寒豈特滅國乎詩曰赫赫宗周褒姒滅之古之人蓋有推其所以滅而知其滅者也恃其非所恃則雖浚洙見譏不守其所可守則滅下陽亦不免於罪夫亦必有德者然後無所恃而不失其守故以虢一見法焉秋九月齊侯宋公江人黃人盟于貫冬十月不雨歷時而言不雨者不憂雨也無志乎民也歷月而言不雨者閔雨者也有志乎民也楚人侵鄭三年春王正月不雨夏四月不雨徐人取舒徐始見書人狄之也舒附庸之國也葉子曰荆九州也鬻熊受封在荆之楚而非荆也故謂之荆楚而楚初以荆自名者僭荆而有之也其後復中國之稱故言楚舒亦荆之别也故謂之荆舒其不曰荆者以舒自名而已其後復有舒鳩舒蓼舒庸者蓋又舒之别所謂羣舒者也名從主人君子無所加損焉六月雨記喜也書不雨矣則不書者皆雨也何獨志於僖公歟僖公書不雨者四皆以月見僖公有志於民而閔雨者也則僖公之雨宜喜矣僖公之喜皆雨也何獨志於六月歟建巳之月也萬物始盛待雨而大古者以是月雩而祈雨則六月之雨宜喜矣葉子曰水旱堯舜之所不免也然古之人不以是歸之天而必反之已故湯有六事自責者矣春秋十有二公而不雨獨見於僖文蓋憂雨者有矣莫勤於僖公故以歷月見而志雨不憂雨者有矣莫慢於文公故以歷時見而不志雩夫文公而無雩則雨之得否亦何以為心哉雖旱亦不書也僖公有志雨文公無志雩是民事之不可不重也故以僖公一見法焉秋齊侯宋公江人黃人㑹于陽榖冬公子友如齊涖盟涖盟者前定之盟而往涖也楚人伐鄭四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰民逃其上曰潰蔡自莘之敗楚以獻舞歸後十三年北杏之㑹一以人見又明年而楚復入之自是齊侯霸不與諸侯㑹者二十有三年蓋懼楚而屬之以為與國也齊侯將有事於楚故觀兵於蔡先楚而侵之蔡人知楚不足恃而齊為可畏是以不與蔡侯而潰楚於是乎始服蓋善之也葉子曰左氏記侵蔡以為蔡姬之故夫小白之霸攘荆蠻而抗中國莫大於此舉苟以一婦人之怨而勤七國之君夫誰肯聽之哉蔡人雖畏齊亦不遽潰矣此事之必不然者也昔者湯征諸侯葛伯仇餉湯始征之孟子曰湯一征自葛始天下信之小白一侵蔡而蔡潰雖楚之强不敢不聽天下之不難服如此惜乎小白之不能為湯也遂伐楚次于陘遂繼事之辭也齊之侵蔡志在楚也故蔡潰遂伐楚次于陘伐之道也古之伐罪者必有威讓之令文告之辭不遽加之兵也齊蓋命於楚曰爾貢包茅不入昭王南征不反對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濵楚蓋未之服焉進而次于陘屈完來盟于師始退而盟于召陵以是為伐之道也葉子曰昔者稱管仲曰相桓公九合諸侯一匡天下微管仲吾其被髮左袵矣其在此伐也歟然而辭無所褒何也春秋王道也自伐楚而言中國所賴以安則雖管仲以為仁可也自王道而言則小白亦霸而已矣天下何取於為霸故小白之事管仲之功春秋未嘗有異辭而為公羊者乃始進之為王者之事挈小白以為春秋每致意焉盟不日㑹不致有過則為之諱榖梁從而和之山戎之伐以人為愛葵丘之㑹以日為美梁丘之遇以辭為大夫春秋豈區區於一小白哉信斯言也是將率天下以為霸乎孟子曰春秋無義戰彼善於此則有之矣然春秋未嘗與戰也吾亦以為小白於諸侯亦彼善於此爾而何褒焉故曰仲尼之徒無道桓文之事必孟子而後能知也夏許男新臣卒諸侯卒于㑹稱㑹卒于師稱師許男在師矣何以不言卒于師非卒于師也疾而返卒于道也楚屈完來盟于師盟于召陵屈完楚大夫之三命者也凡吳楚之大夫皆言人屈完何以不言人進之也諸侯次于陘楚使屈完來觀于師未知其窺之歟服之歟楚子之命屈完將曰可則盟否則不盟齊侯陳諸侯之師與屈完乘而觀曰與不榖同好如何屈完曰君惠徼福於敝邑社稷辱收寡君寡君之願也則屈完之為已春秋之義大夫出疆有可遂者則遂焉屈完遂之善者也君子於是進焉不言使制在屈完也盟于師楚志也盟于召陵齊志也盟而後退師其成在楚退師而與盟其成在齊故再見盟焉以齊為善也齊人執陳轅濤塗轅濤塗陳大夫之三命者也濤塗畏齊師之道其境以病陳使出於東方齊侯以申侯之譖執濤塗不責其師之病人而責人之不忠已非伯討也故以人執秋及江人黃人伐陳及不言主師內之微者也八月公至自伐楚此侵蔡也何以致伐楚侵蔡所以伐楚致其本事也葉子曰至諸侯返而告廟之禮也出而告者必以事則歸而告亦必以其前所告者春秋從而書之此禮之常也何以或不致其本事非故異之也各原其事而為之辭者異爾桓公之㑹本以伐楚而先自侵蔡始楚服而與之盟蓋伐之後事歸自宜以伐楚告而榖梁氏不察曲以為義謂有二事偶而或致後事或致前事以為大小之辨者故謂此為致後事而大伐楚以新城救許致伐鄭為致前事而大伐鄭夫新城之役出而告者伐鄭而已楚人圍許而遂救許此乃伐之遂事既非其本事則歸安得而告乎至於柯陵蕭魚之㑹皆不悟其㑹伐本以服鄭而後㑹為言或曰不周乎伐鄭或曰得鄭伯之辭皆不知經而妄意之也葬許穆公冬十有二月公孫兹帥師㑹齊人宋人衛人鄭人許人曹人侵陳公孫兹吾大夫之三命者也五年春晉侯殺其世子申生殺世子何以目君甚之也故母弟亦云葉子曰殺公子以國與人公子國與人可得而殺也殺世子母弟不以國與人世子母弟非國與人可得而殺也父子天性也兄弟天倫也非其父不父兄不兄而誰敢殺乎昔者萬章嘗問孟子曰象日以殺舜為事立為天子則放之何也孟子曰封之也或曰放焉以為仁人之於弟也不藏怒不宿怨親愛之而已夫惟知親愛之出其性則雖有罪固不殺也况無罪而殺之乎世衰道微有子弒父弟弒兄者故春秋之為教殺世子母弟特以其君責之蓋曰能為人父然後可正天下之子能為人兄然後可正天下之弟亦各反其性而已矣杞伯姬來朝其子伯姬來歸寧也莊公哀姜死伯姬歸寧固罪矣曰朝其子則志乎以子見而已曹伯猶不得使其世子來朝伯姬而可朝其子乎我以待人父之道待人之子而與之朝我亦與有罪也夏公孫兹如牟公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止世子襄王鄭也殊世子尊之也天子之世子世天下諸侯之世子世其國皆不可以齒其臣也秋八月諸侯盟于首止間無中事而復舉諸侯尊王世子不敢與盟也盟者所以結信不敢以所不信加之於尊者也諸侯不序一事而再見者前目而後凡也再地首止善之也惠王欲立子帶而廢世子小白欲置之則無以尊王室欲爭之則無以奪惠后故率諸侯盟世子而㑹焉諸侯相與奉鄭而世子之位定矣天子在而名世子世子舍父而從諸侯以道則不正也世子定而王室安以小白之義則正也君子蓋以是善焉葉子曰春秋辭繁而不殺者正也書之重辭之復其中必有美焉樂道人之善而惡人之不善天下之情一也樂之故每以為不足一言不已至於再再言不已至於三君子猶以為未也惡之則唯恐絶之不速拒之不嚴一言之已過矣而肯至於再乎故春秋㑹盟而再目地惟四而已首止也葵丘也宋也平丘也以為㑹盟非諸侯之所得為吾既槩以為罪而一正之矣後世有繼世不以道而亂世嫡定之如首止者守國不以禮而慢王政率之如葵丘者强弱相陵而窮兵不已和之如宋者荒服闌入而滅人之國正之如平丘者不少假之則天下終無與立也故待天下之變而有出於不得已者各於其事一見法焉春秋之義也鄭伯逃歸不盟何以不曰逃盟有不盟之心而後棄而歸也盟者諸侯之所同也不盟鄭伯之所獨也舍所同從所獨苟以其身竊去焉則逃而已矣賤之也楚人滅弦弦子奔黃九月戊申朔日有食之冬晉人執虞公下陽滅則虞虢為已滅故虢亡不書滅虞亡不書滅獨志執虞公焉所遺者惟其君而已不言以歸虞為已滅則虞公不得有其國猶若執之晉也晉假道以滅人而復滅其所假非伯討也故以人執虞稱公或曰商之故爵也或曰嘗入而為王三公者也六年春王正月夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城伐國不言圍邑此何以言圍新城以新城為伐也伐者問罪之師不于其國于其邑非伐也為後齊人伐鄭起也葉子曰伐以問罪非志於得也服之而已宋伐鄭而圍長葛楚伐宋而圍緡君子以為非伐之道故見圍焉此伐鄭而圍新城蓋鄭未服罪而施之於新城未遽加兵於鄭此霸主之令也則何以與長葛及緡同辭蓋宋楚以一國而伐此以諸侯而伐以一國而伐固有私之者矣以諸侯從霸主而伐其誰取于一邑君子宜無疑焉乃其不即問罪於鄭使楚得圍許而遷其師致齊人再伐而後服則諸侯未得為無罪也其情雖與宋楚異其事則與宋楚同故其辭一施之此君子所以愼於伐也秋楚人圍許諸侯遂救許遂繼事之辭也此圍鄭之諸侯何以不序一事而再見也冬公至自伐鄭葉氏春秋傳卷八
