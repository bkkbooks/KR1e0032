body:
  text: 葉氏春秋傳卷十一宋葉夢得撰僖公四三十有一年春取濟西田濟西田我田而曹侵之者也晉侯執曹伯班其所侵地於諸侯而我受焉故曰取不繫之曹非曹之所得有也凡外取内邑外取内田皆不書恥也反而歸于我則書重地古者國亡大縣邑公卿大夫士皆厭冠哭於大廟三日君不舉以為吾受之君而為之守者失地則失其守矣是以謂之重也公子遂如晉夏四月四卜郊不從乃免牲郊何以言四卜四卜而不從免牲非禮也周郊以日至則不卜魯郊以上辛則卜求吉之道三以十二月下辛卜正月上辛不吉則以正月下辛卜二月上辛又不吉則以二月下辛卜三月上辛不吉則不郊牲所以祭也卜郊不從則無所用牲矣以為嘗置之上帝不敢專也則又卜而免焉卜而吉則免卜而不吉則置之繫待庀牲而後左右之曷為則謂之繫牲六月上甲始庀牲十月上甲始繫牲繫牲必在滌三月繫牲之道也曷為則謂之免牲或曰為之緇衣𤣥裳有司𤣥端奉送於南郊免牲之道也郊不過乎三月至春之末而止矣三卜禮也四卜非禮也五卜強也故夏四月四卜郊不從而後免牲者非禮也葉子曰天子祭天諸侯祭土魯何以得郊天歟曰周公有勲勞於天下故成王賜魯以重祭使得用天子禮樂内祭則禘也外祭則郊也此記禮者之言也或以為成王焉夫成王賢君也立國之道孰大於禮樂周公雖有勲勞可以人臣而僭天子之制乎聞之吕不韋之書曰此平王之末造惠公請於周而假寵於周公是平王為之則可也然猶有降殺焉故郊不以日至而以卜辛禘不以祖之所自出而以文王望不通方望之祀而以三望門不兼五門之制而以天子臯門為庫門應門為雉門雖有為之别而孔子不與焉故曰魯之郊禘非禮也周公其衰矣然春秋何以無貶文其賜之者非春秋也禮有其廢之莫敢舉也有其舉之莫敢廢也非天子不議禮不制度不考文是先公所以受賜於先王者吾焉得而廢歟乃有賢君能因其壞請於王而復正之庶㡬其可矣故郊之當其時不書禘之得其節不書凡書者皆非其時而失其節者非以譏郊禘也乃新作南門書新作雉門及兩觀書亦為可因以革而不革反有加其度以僭天子則後之子孫有當其責者矣此君子所以每致意也猶三望三望者何禮天子四望方望之事無不通則四方無不祭也魯得用天子之禮樂而制不同故以泰山河海為三望何以言猶三望望郊之細也猶可以已之辭也不郊亦無望猶三望非禮也葉子曰吾何以知三望為周公之賜歟儒者或言四望天子之禮也三望諸侯之禮也周官典瑞用玉四圭有邸以祀天而上帝同焉兩圭有邸以祀地而四望同焉天地祭於圜丘方澤而四望各兆於國之四郊天地之祭以冬夏之日至而上帝四望無常時然詩書言柴未有不兼望者柴則郊也葢隂陽之義必參配故祀天之後則祭四望祀地之後則祭上帝周道也而三望之名於經無傳焉獨見於春秋諸侯山川不在其封内者不祭楚昭王所以不越江漢睢漳而祭河何魯之得祭泰山河海乎吾是以知其為周公之賜而非諸侯之所得通也秋七月冬杞伯姬來求婦逆婦非姑道求婦非母道狄圍衛十有二月衛遷于帝丘三十有二年春王正月夏四月己丑鄭伯捷卒衛人侵狄秋衛人及狄盟衛人何以及狄盟離盟不可以地狄也何以再見衛人盟非侵之事也冬十有二月己卯晉侯重耳卒三十有三年春王二月秦人入滑滑國也齊侯使國歸父來聘國歸父齊大夫之三命者也夏四月辛巳晉人及姜戎敗秦于殽秦左氏榖梁作秦師公羊作秦當從公羊貶之也中國未有不言戰敗績者曰敗不以戰不以中國與秦也癸巳𦵏晉文公狄侵齊公伐邾取訾婁訾婁邾邑也内取外邑不書此何以書取訾婁不正其伐取也秋公子遂帥師伐邾晉人敗狄于箕冬十月公如齊十有二月公至自齊乙巳公薨於小寢小寢燕寢也不與其正也乙已十一月之日也何以言十二月經成而誤也隕霜不殺草記異也霜者天之所以殺萬物也霜降矣而不殺草天反時而不能正其殺是以謂之異也李梅實記異也霜不殺物則有非所實而實者矣晉人陳人鄭人伐許文公一元年春王正月公即位二月癸亥日有食之天王使叔服來㑹葬叔服王之下大夫也諸侯喪天子以大夫送葬禮也前未有書㑹葬者此何以書正文公之僭也天子七月而葬諸侯五月而葬僖公之薨以十一月葬以四月僭七月矣天王以二月來㑹葬正也薨以十一月葬以四月則何以謂之僭七月哉僖公之末未有閏也舉天王之正見魯之不正所以正魯也葉子曰魯十有二公見葬者九文宣成襄定葬而得節者也桓莊僖昭葬而緩者桓以故而九月莊以亂而十一月昭以喪後至而八月皆有為而然是雖緩也而無所嫌則慢葬而巳矣僖葬以七月未見其所以然者也豈其尊之欲以擬天子乎文公之事親亦巳悖矣昔者孟懿子問孝於孔子子告之以無違曰生事之以禮死葬之以禮祭之以禮故大夫之簀曾子且不敢死而况諸侯而僭天子之葬凡文公之於僖公皆欲過厚而不知反䧟其親於罪所謂細人之愛人以姑息者故未有一得於禮已練而作主逆祀而先其祖至是復僭天子而葬以是為孝則亦違而已矣夏四月丁巳葬我君僖公天王使毛伯來錫公命毛伯王之上大夫也文公在喪未終不待其朝而錫命非正也晉侯伐衛叔孫得臣如京師叔孫得臣吾大夫之三命者也衛人伐晉秋公孫敖㑹晉侯于戚冬十月丁未楚世子商臣弑其君頵商臣弑其君又弑其父而無異文極天下之辭無所加也正其名而君親之義盡矣公孫敖如齊二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績秦伐晉以報殽之役以晉侯及秦師言晉之主戰也丁丑作僖公主主者何練主也作主不書此何以書不時也禮既葬而虞虞有虞主既朞而練練有練主虞主喪主也既練則埋於兩階之間練主吉主也既祥則藏於廟未有非時而作者也三年之喪以二十有五月故朞而練練而祥僖公之薨至是十有六月矣葢以遽吉為不忍故從練而作之也三月乙巳及晉處父盟處父晉大夫之再命者也孰及之公也何以不言公及不以處父敵公也晉人以公不朝来討公如晉晉侯以處父盟焉何以不言公如晉恥也不地地於晉也夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴士縠晉大夫之三命者也自十有二月不雨至于秋七月記災也不書旱非大旱也春秋惟大旱而後書故見大旱則不見不雨見不雨則不見旱八月丁卯大事於太廟躋僖公大事者何祫也太廟周公之廟也天子之祭莫大於禘則禘者天子之大事也諸侯之祭莫大于祫則祫者諸侯之大事也大事於太廟不書此何以書為躋僖公起也躋升也僖公以屬于閔公則為兄閔公以世於文公則為祖君子不以親親害尊尊文公欲先其禰而後其祖故因祫升僖公以先閔公君子以為逆祀也冬晉人宋人陳人鄭人伐秦此晉先且居宋公子成陳轅選鄭公子歸生也何以稱人不正其以兵爭既敗人而復伐之故貶而人之也公子遂如齊納幣納幣不書此何以書不正其以喪娶也僖公之喪始祥而公圖㛰非禮也始祥則何以謂之非禮禮祥而縞是月禫徙月樂孟獻子禫縣而不樂比御而不入夫子曰獻子加于人一等矣禫而圖㛰猶喪娶也三年春王正月叔孫得臣㑹晉人宋人陳人衛人鄭人伐沈沈潰夏五月王子虎卒王子虎王之中士也外大夫不卒此何以卒翟泉之盟嘗主我而天子為之赴也葉子曰嘗接我而喪之禮歟曰以義起也昔者孔子遇舊館人之喪入而哭之哀出使子貢脱驂而賻之子貢以為重而子不從夫禮縁人情而以義起者也情有所不能已則義有所不能廢故嘗接于我則王必赴之赴之則必為之變此禮之所由起也然則宰周公宰渠伯糾榮叔毛伯亦接我者也何以不卒蓋赴則卒不赴則不卒君子不虚加之也秦人伐晉此秦伯也何以稱人不正其忘殽之悔為彭衙之戰以取晉伐又從而濟河焚舟取二邑兵自是不解故貶而人之也秋楚人圍江雨螽于宋記異也自上而下謂之隕自下而上謂之雨雨螽死而墜也外異不書此何以書宋故也冬公如晉十有二月己巳公及晉侯盟晉陽處父帥師伐楚以救江處父何以氏始三命也救不言伐此何以言伐伐所以為救也君子録人以意不責人以事圍陳所以納頓子故因納以見圍則圍非所責也伐楚所以救江故因救以見伐則伐非所責也江即滅矣何以獨録其救救所能為也不滅非所能為也四年春公至自晉夏逆婦姜于齊孰逆之公也何以不言公諱以喪娶也此逆女也何以言逆婦成禮於齊也逆婦何以書以為卿之事而公親之也何以不言姜氏公以喪娶夫人與有貶也婦人在家制於父既嫁制於夫貶夫人所以貶齊也哀姜之罪在其身故喪至言氏不言姜姓以别其身也出姜穆姜之罪在其父故逆與至言姜不言氏以别其族也狄侵齊秋楚人滅江晉侯伐秦衛侯使甯俞來聘甯俞衛大夫之三命者也冬十有一月壬寅夫人風氏薨僖公之妾母也何以曰夫人致之為夫人矣五年春王正月王使榮叔歸含且賵榮叔王之下大夫也歸含賵不書此何以書妾母非王之所得含賵者也凟夫婦之道而亂嫡庶之别王無以繼天矣故去天何以不曰歸含及賵含一事也賵一事也何以不言來上有逆禮則下有慢令榮叔不自來也葉子曰名分禮之大也古者立五教以正上下夫婦居其一焉其叙為五典曰天叙秩之為五禮曰天秩明其有所受也非王其誰任之歟禘于太廟用致夫人僖公之為也使王而能用其政則僖公在所誅矣今王不能正其僭死又從而禮之則致之以為夫人者殆請於王而王聽之者也春秋之去天非正其歸含且賵也正其成之為夫人者也三月辛亥葬我小君成風成諡也王使召伯來㑹葬召伯王之上大夫也㑹夫人葬不書此何以書妾母非王之所得葬者也故王去天與含賵之辭一施之也葉子曰春秋一惡不再貶吾固言之矣妾母之不得為夫人王去天既見於含賵則㑹葬何為而復貶乎君子之待其君所以異於衆人也疾惡而一見貶吾以正天下之為惡者而已彼自棄而不能改吾亦何用每致意焉曰是不足誅云爾乃吾以為君則不可以不足誅而遽絶之也見一惡焉曰庶幾其或改也則從而亟救之又見一惡焉曰庶幾其或改也則又從而亟救之見者不己救者亦不已終必至於改而後止此君子之事其君者也含賵非矣吾為之辭而去天以為知其道者宜於此焉變矣其不能變而至於㑹葬吾又為之辭而去天以為知其道者亦宜於此焉變矣是其存於心者豈有異乎則貶之者乃所以愛之也夏公孫敖如晉秦人入鄀秋楚人滅六冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳秋季孫行父如晉季孫行父吾大夫之三命者也八月乙亥晉侯驩卒冬十月公子遂如晉葬晉襄公晉殺其大夫陽處父晉以狐射姑將中軍趙盾佐之處父黨趙氏言於晉侯不以趙盾佐射姑襄公從之蒐而易中軍故襄公死射姑使人殺處父於朝處父之死罪累上也故以國殺晉狐射姑出奔狄狐射姑晉大夫之三命者也閏月不告月猶朝于廟閏月者積日之餘以附于月也閏月何以不告月無是月也天子正嵗年以序事各於其朔頒之於諸侯曰頒朔諸侯受而藏之於祖廟各於其朔朝廟而告行之曰告朔諸侯告朔不告月前未有書閏月不告月此何以書為朝于廟𧺫也無是月而不告正也有告朔而後有朝廟不告朔則亦無所用朝矣閏月而朝廟非禮也猶者可以已之辭也葉子曰吾何以知閏月為無是月歟日月所㑹謂之辰日月所合謂之朔辰之大數不過十二周天之度而居其舍為十有二次日行一度而遲故三百六十日而成嵗月行十三度有竒而速故三十日而成月日遲而月速每以三十日㑹於所次之辰所謂朔也閏既積日之餘以附於月則日月無所合是以斗指兩辰之間而無是朔無朔安得有月哉古者常月則聽朔於南門之外以告其月之事閏月則闔門左扉立於其中以聽其附月之餘事此禮之所由辨也春秋積月以編宣之十年書夏四月丙辰日有食之在晦下見五月而中有己巳齊侯元卒己巳距丙辰十有四日則為閏四月䝉上文不書襄之二十八年書十有二月甲寅天王崩下見正月而中有乙未楚子昭卒乙未距甲寅四十有二日則為閏十二月䝉上文不書惟喪以月計故齊景公葬見閏月亦以無是月故不得别見天子既不以是頒朔則諸侯宜亦不以是告月七年春公伐邾三月甲戌取須句須句嘗為我取矣何以復見再歸於邾也何以書不正其伐取也遂城郚書不時也夏四月宋公王臣卒宋人殺其大夫大夫何以不名大夫無罪也宋昭公即位欲盡去羣公子穆襄之族遂率國人攻昭公而殺公孫固公孫鄭則大夫為無罪矣何以曰宋人衆殺之也戊子晉人及秦人戰于令狐秦欲納公子雍而晉拒之故以晉人及秦人言晉之主戰也此趙盾之師也何以言晉人盾舍嫡而外求君逮其既悔復背約而禦秦師秦亦黨不正而與之戰故兩貶之貶而稱人不言敗績曰是猶楚人及吴戰于長岸者云爾葉子曰吾何以知令狐之戰為兩貶之歟春秋三十四戰未有不言敗績者以為偏戰中國之辭也至于楚人及吴戰于長岸未必非偏戰而但言戰不言敗績以皆非中國是以略而與楚人敗徐于婁林於越敗吴于檇李之辭一施之其或言敗或言戰者蓋言敗績則勝負不可兩見故假内辭以别之戰則我敗也敗則我勝也此春秋重師之道非中國不敢忽焉故河曲之役亦云今左氏以河曲為交綏而公羊以河曲及此皆為敵交綏猶言兩相敵而俱退也以左氏考之河曲趙盾恐獲趙穿而出戰因以俱退猶云可也令狐乃趙盾潛師夜起以敗秦師何以亦不書秦師敗績乎公羊蓋不見其事而意之故槩以為敵豈三十四戰無一相當而獨見於此二役乎其言亦不足據矣然則河曲何以不言及及以别㑹内為志也勝敗既不可不分則内外亦不可不辨以為兩欲無及之者故不得書戰非人之所欲是以亦重責之者也晉先蔑奔秦先蔑晉大夫之三命者也何以不言出自戰而奔也令狐秦地狄侵我西鄙秋八月公㑹諸侯晉大夫盟于扈此齊侯宋公衛侯鄭伯許男曹伯也何以不序不足序也趙盾背秦約而立靈公不以靈公㑹諸侯而已臨之諸侯以大夫執國命而靡然聽焉故諸侯不序大夫亦不名猶溴梁大夫之盟然不與大夫之得㑹諸侯也冬徐伐莒公孫敖如莒涖盟八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂會晉趙盾盟于衡雍乙酉公子遂㑹雒戎盟于暴何以再言公子遂以兩事出也趙盾晉大夫之三命者也公孫敖如京師不至而復復者事之未畢也事畢之辭謂之還事未畢之辭謂之復大夫受命而出君言不宿於家雖死以尸將事聞父母之喪則徐行而不返以君命為不敢専事未畢而復罪也公子遂至黄乃復非自復也故地而以難言之乃難辭也公孫敖如京師不至而復自復也故不地而以易言之而易辭也丙戌奔莒何以不言出自外而奔也螽宋人殺其大夫司馬大夫司馬者何殺大夫與司馬也何以先大夫殺大夫而後殺司馬也何以不言及異事也猶曰殺其大夫趙同趙括然司馬官舉上大夫卿也不名殺無罪也昭公不禮於襄夫人夫人因戴氏之族殺昭公之黨孔叔公孫鍾離及大司馬公子卭司馬握節以死則大夫司馬為無罪矣宋司城來奔司城何以官舉卿也九年春毛伯來求金毛伯王之下大夫也求賻非矣求金又甚也不言使當喪未君也葉子曰天子諸侯在喪之稱禮不能詳左氏謂諸侯曰子此以春秋言之也其曰天子曰小童則禮未之聞焉豈不曰余小子者乎公羊言世子君薨稱子某既葬稱子踰年稱公此亦以春秋之文次之爾至平王未葬桓王未踰年而求賻襄王未葬頃王已踰年而求金皆不稱天王則以為當喪未君即位而未稱王也為之說曰以天子三年然後稱王亦知諸侯於其封内三年稱子踰年稱公矣曷為於封内稱子縁民臣之心不可一日無君縁終始之義一年不二君不可曠年無君縁孝子之心則三年不忍當也原公羊之義蓋以踰年稱公者民臣之稱封内三年稱子者孝子之自稱也則頃王即位已踰年此正曠年不可無君者安淂不稱天王乎至敬王在景王之喪踰年而狄泉書天王則以為著有天子蓋求其說不得故意之而終不免相戾也以吾考之天子三年曰余小子諸侯曰子此自稱之辭也所謂三年不忍當者春秋與禮之所同也故天子崩有所謂小子王者矣天子即位踰年稱王諸侯即位踰年稱公此民臣稱之辭也所謂不可曠年無君者豈獨即位踰年哉康王始即位於柩前羣臣告之曰御王冊命曰王再拜興則雖未即位踰年亦稱王矣蓋既為之天子而不稱王諸侯而不稱公則無稱也所謂不可一日無君者也乃春秋所書則以踰年未踰年葬未葬為辨爾年者君之節也葬者臣子之終事也二者必兼盡而後可以為君故以年為辨者雖己葬未踰年不得稱君子赤卒不稱公是也以葬為辨者雖踰年未葬亦不得稱君頃王求金不稱天王是也以頃王不得稱王則桓王未踰年未葬其不稱天王固宜矣然則敬王得稱天王其以踰年而又葬乎何以知之鄭莊公以五月卒七月葬厲公明年盟于武父稱鄭伯齊僖公十二月卒明年四月葬襄公五月㑹于艾稱齊侯則敬王之稱王亦固宜矣此春秋盡君親之道者也夫人姜氏如齊二月叔孫得臣如京師辛丑葬襄王葬天王不書此何以書不正其無故以大夫㑹葬也葉子曰吾何以知此為不正大夫之㑹葬歟春秋固有禮所不見而可以情度之者葬天子親者也有不能親焉故也遂不葬則不可禮必有許之大夫將事者則靈王之葬鄭以在楚而以印段行是也天王崩見經者九其四不書葬書葬而見大夫者惟此與叔鞅二而已攷之於經襄王前年八月崩冬十月公孫敖如京師不至以幣奔莒此弔也明年書毛伯來求金則貨貝賵賻蓋遂闕而不供焉此文公之怠也其於葬豈亦慢而不親往乎昭公前年冬如晉至河晉謝之不得見而復此朝也明年天王崩王室亂寧昭公能朝晉而不能朝京師蓋避王子朝之難而不敢進焉此昭公之怠也其於葬豈亦畏而不親往乎慢與畏非故也大夫將事禮之所得通親往或有故不往而合禮所以四不書則無故不親往而違禮此所以二特書歟晉人殺其大夫先都先都晉大夫之三命者也晉侯蒐於夷將登箕鄭父先都而使士縠梁益耳將中軍先克不從於是四人作亂殺先克晉人復殺先都大夫有罪而衆殺之也故以人殺三月夫人姜氏至自齊内夫人出前未有書至者此何以獨書夫人出未有不告歸未有不致者也前此者或以㑹或以饗或以如師或父母没而歸寜皆禮之所不可為者也而況孫與如他國者乎故内夫人出十有四皆不書至非不致也諱而没之也父母在而歸寧惟出姜得其節故書其正以見其不正焉葉子曰泉水載馳之詩孔子何為而取歟善其思不失其正也父母亡而思見其兄弟於義未為甚過也然而諸姑伯姊以為不可則不敢違故曰遄臻于衛不瑕有害國亡矣思歸唁其兄於義亦未為甚過也然而許人以為尤則不敢違故曰視爾不臧我思不逺古者婦人内不忘其宗國而外能止於禮義是以嫌疑之隙無自而萌而亷恥之心油然常存而不亡魯之亂始於不能正家家道之不正常自歸寧始春秋書變事不書常事夫人歸寧常事也宜所不書而不一書則終無以著其正故以出姜一見法焉晉人殺其大夫士縠及箕鄭父箕鄭父晉大夫之三命者也及者罪及之也士縠箕鄭父先都之黨也先都既死晉人復殺二人大夫有罪而衆殺之也故以人殺楚人伐鄭公子遂㑹晉人宋人衛人許人救鄭夏狄侵齊秋八月曹伯襄卒九月癸酉地震記異也陽伏而不能出隂迫而不能散於是有地震葉氏春秋傳卷十一
