body:
  text: 葉氏春秋傳卷七宋葉夢得撰莊公三葬曹莊公夏公如齊逆女逆女大夫之事公親之非禮也秋公至自齊八月丁丑夫人姜氏入入逆辭也莊公義不得娶於齊則夫人義不可見宗廟夫人之至為逆矣故不書至葉子曰諸侯十五而冠冠而生子莊公於是生三十有六年矣而夫人始見以防與扈之盟考之莊公過時而不娶豈得已哉内迫於夫人而齊侯為之制有不得自專也而春秋無異文以為不待貶絶而罪自見也昔者舜不告而娶孟子曰如告則廢人之大倫以懟父母是以不告也不孝有三無後為大使莊公而知此義不娶於齊雖不得於文姜以承宗廟之重而盡人子之道與之為舜豈不可乎卒之身死無嫡而慶父得以乗其隙則莊公之為也戊寅大夫宗婦覿用幣宗婦同宗之婦也覿大夫聘而私見天子之禮也幣諸侯朝王而享王與后之禮也朝有贄享有幣夫人以丁丑入則大夫宗婦既見矣越三日而覿非禮也覿而用幣男女之同又非也以為尊夫人者在物而不在禮矣不言及不以大夫及宗婦也葉子曰吾何以知宗婦之為同宗之婦歟古者諸侯同宗之妻曰宗婦以同言也大夫嫡子之妻曰宗婦以承宗言也大夫非嫡子其妻不得稱宗婦曰介婦曰衆婦焉子同生傳説文姜與宗婦命之齊穆姜卒傳稱齊侯使諸姜宗婦來送葬此諸侯之言宗婦之禮也覿夫人何擇於大夫之承宗者歟凡大夫之妻皆得進矣則宗婦非大夫之妻禮諸侯以時朝於天子各執其玊謂之贄朝畢而享王與后各獻其庭實謂之幣於是享王以璧享后以琮則周官璧以帛琮以錦者也是謂享而非覿大夫來聘無享脩其君之禮成然後奉束錦而請覿者大夫之私禮也大夫而後有覿故曰公事曰見私事曰覿諸侯之大夫宗婦夫人之禮吾不得而聞矣意者其有見而無覿歟見而用贄則大夫以禽鳥婦人以榛栗棗脩先王之制也今見而言覿是再見也覿而言幣是尚物也則宗婦之獻與夫人等大夫覿而用幣猶以為僭享王而况施之宗婦乎公羊以宗婦為大夫之妻固非矣穀梁雖知其説而謂大夫不見夫人諸侯祭宗廟夫人與亞獻以為不見亦非也大水冬戎侵曹曹羈出奔陳羈曹君也何以不言爵踰年而喪未除也何以不言子不周乎喪也葉子曰吾何以知曹羈之為曹君歟射姑卒矣而曹不見君君曹者非羈而何鄭忽君鄭而突奪之故書鄭忽出奔衞而突歸不得繫於鄭曹羈君曹而赤奪之故書曹羈出奔陳而赤歸不得繫於曹突之歸以祭仲赤之歸以戎忽羈正而突赤不正故其辭一施之則羈固所以為曹君也赤歸于曹歸易辭也赤曹莊公之庶子自戎入而取國戎有奉而易也不繫曹不與其得曹也何以不言自戎歸于曹不與擅廢置也郭公闕文也二十有五年春陳侯使女叔來聘女叔陳大夫之嘗入為王卿士而復其國者也夏五月癸丑衞侯朔卒六月辛未朔日有食之鼓用牲于社禮天子救日伐鼓于社諸侯伐鼓于朝用幣于社天災有幣無牲諸侯而鼓于社僭也用牲于社非禮也葉子曰日食之禮天子何以伐鼓于社諸侯何以伐鼓于朝歟凡鼓皆所以亢陽也社者陰也諸侯亦陰也天子救日則攻陰故伐鼓于社以攻之諸侯卑不敢攻社故伐鼓于朝以自攻用幣于社以請之也古者散祭祀之牲皆養於國也未有不養而為牲者也玊帛牲牷非大祀不舉次祀則用牲幣小祀有牲而無幣略之也然天災則有幣無牲者蓋社亦小祀牲幣不可以並舉常祀則用牲非常祀則用幣幣可及牲非養則不可及也是禮也叔孫豹蓋知之矣故曰日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝而季孫宿莫能知乃以為正月朔慝未作而後伐鼓用幣其餘則否故日食而見經者三十有六而書鼓用牲于社者三其二皆在六月六月建巳之月純陽用事詩所謂正月者也則魯人之失久矣經於是特正之其亦考於夏書及季秋月朔辰弗集于房鼓奏鼓嗇夫馳庶人走何必建巳而後行之歟太史以建巳為正月季孫宿以建子為正月皆非也莊公或舉于九月尚先王之制哉左氏不能察而取以為説則太史與宿誤之也伯姫歸于杞伯姫莊公之妹也不言逆女逆之合乎禮則常事不書秋大水鼓用牲于社于門水旱祭雩宗蓋有壇焉禮非日月之眚不鼓鼓于社于門非禮也禜門用瓢齎用牲于社于門亦非禮也冬公子友如陳公子友吾大夫之三命者也二十有六年春公伐戎夏公至自伐戎曹殺其大夫大夫何以不名大夫無罪也赤之歸曹戎實奉之故公以春伐戎以正其不得奉也曹懼而殺其大夫則大夫為無罪矣葉子曰春秋因人以立法不窮法以治其人因事以見法不因法以窮其事曹之事非春秋所得盡紀也春秋之所見焉者其君之正不正大夫之有罪無罪云爾則大夫之名固非春秋之所必見也古者國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾故君前而後臣名父前而後子名士二十而冠尊其名而始乎字以見名之重故春秋之法常寄於字與名不應字而字所以為褒也故宋髙哀得以子哀書則仍叔之子不書字奪之也不當名而名所以為貶也故宰渠伯書糾則曹大夫不書名與之也秋公㑹宋人齊人伐徐宋何以序齊上齊侯失霸也前此者宋人齊人邾人伐鄭齊猶未霸也則宋以主兵先齊人可也今齊之主中夏十年矣宋猶得以主兵居上則非霸之道也故皆貶而人之古者二王後不專征唯方伯而後專征冬十有二月癸亥朔日有食之二十有七年春公㑹杞伯姫于洮洮魯地也文姜死矣伯姫不得歸寜故即洮以為㑹㑹非伯姫之所得為洮非伯姫之所得㑹而莊公莫之正蓋文姜㑹齊侯于禚公不以為非則公㑹伯姬于洮冝不以為過矣㑹禚而後見夫人如齊師㑹洮而後見杞伯姫皆公為之也夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽再見同盟距前十二年矣天子殷國之節也同盟非齊侯之所得已諸侯信而霸業成則吾所以尊天子者亦已終故自是不復盟天子於是使召伯廖來賜公命則加命以賞之也秋公子友如陳葬原仲原仲陳大夫也原氏也仲字也大夫則何以得字見主人之辭也古者大夫死訃於他國之君曰君之外臣寡大夫某死訃於適者曰吾子之外私寡大夫某不禄使某實則葬之矣不書小事也此何以書為其將以圖國也莊公在位久未有嫡子子般孟任之子庶長而得立者也慶父叔牙通乎夫人欲舎般而立慶父季子懼不能正託葬原仲而之陳以為之圖莊公病召公子友於陳於是殺叔牙而立子般君子以是録其行也何以得言如使若以君命出然臧孫辰大無麥禾而出告糴不得言如書曰臧孫辰告糴于齊公子友謀子般而出葬原仲得言如書曰公子友如陳葬原仲非春秋莫能辨焉葉子曰吾何以知春秋之録季子歟昔者陳莊子死訃於魯魯人欲勿哭繆公召縣子而問焉縣子曰古之大夫束脩之問不出竟雖欲哭之安得而哭之今之大夫交政於中國雖欲勿哭焉得而弗哭繆公於是哭諸縣氏謂諸侯不哭大夫也乃諸侯大夫士師行出疆請於君其反必有獻且告固有許之出者矣而况謀其國乎方慶父叔牙之與夫人通也季子必微察之曰非我莫能正而勢未可以加也將委之而奔則懼絶而不得復將出而不以名則懼疑而不得去魯之安危季子所自任也則託原仲之葬請於公而求援於陳季子盖有以圖之矣此所以能卒立子般而行其志也歟君子之防患也貴見微其弭亂也貴能濟若季子可謂微且濟矣冝君子之録之也冬杞伯姫來來歸寜也内女不言來此何以書來父母没矣伯姫不得來而來也凡諸侯女歸寜曰來出曰來歸夫人歸寜曰如某出曰歸于某莒慶來逆叔姫莒慶大夫之再命者也凡婚親迎不親逆天子非展義不巡守諸侯非民事不舉卿非君命不越竟親逆非也非君命而來亦非也不曰逆女大夫之辭也天子逆后稱王后已成婦之辭也諸侯逆夫人稱女未成婦之辭也大夫逆妻稱字姓聽於父母之辭也杞伯來朝此杞侯也何以稱伯時王貶之也公㑹齊侯于城濮二十有八年春王三月甲寅齊人伐衞衞人及齊人戰衞人敗績戰不言伐言伐至之日也不地地於衞也凡兵以及者為主及之者為客齊以王命伐衞衞不服而戰故以衞人及齊人言衞人之主戰也敗績不言人其曰人貶逆王命也齊不救子頽之難雖以王命討衞其稱人亦貶也葉子曰吾何以知齊人之為貶歟始惠王立而五大夫奉子頽以伐王後幽之同盟三年也是時天下諸侯已推小白而霸矣豈非以率天下而尊王室歟然小白坐視而莫之正也子頽奔衞衞背幽之盟遂與燕師伐王而立子頽明年鄭厲公和王室不克執燕仲父處王于櫟而後入周又明年與虢公復王而殺子頽小白方逺伐戎亦莫之問也衞自是負其罪八年小白亦不討至王賜以侯伯之命請伐衞不得已而後加之兵僅敗衞人亦不能執衞侯歸之於京師孰謂鄭突能不失幽之盟以正王室而小白為霸主反逺事於夷狄鄭突能執燕仲父而小白反不能執衞朔春秋所以與衛同罪而一施之槩貶以為人歟夏四月丁未邾子𤨏卒秋荆伐鄭公㑹齊人宋人救鄭以兵相援曰救諸侯相伐而方伯救之正也凡救之志皆善也何以曰人微者也冬築郿郿内邑也書不時也大無麥禾麥與苗同時先言大水而書無麥苗者麥苗以水為害也麥與禾不同時先不言災而書大無麥禾者倉廩竭也不言米無禾則無米矣冬書之嵗杪知其足否之時也大無者無餘藏之辭也國不能預知其足否逮無餘藏而後知之莊公之政亦已荒矣大饑民病也大無麥禾國病也臧孫辰告糴于齊告糴者何請糴也何以不言使非君命而辰請行也魯無麥禾辰請於公曰國病矣君盍以名器請糴於齊公曰誰使曰國有饑饉卿出告糴古之制也辰也備卿請如齊乃以鬯圭玊磐如齊告糴齊人歸其玊而與之糴謂之為辰之請行也然則與之歟非與之也臧孫辰卿也古者冢宰以嵗杪制國用量入以為出待其竭而後為之謀則已晚矣以為居官當事不辟難則可以為卿之職則非也二十有九年春新延廏因舊而脩曰新有加其度曰新作廏馬閑也禮天子十有二閑諸侯六閑四馬為乗三乗為皁三皁為繫六繫為廏廏為一閑何以書大無麥禾延廏之脩非務也葉子曰僖公脩泮宫春秋不書其新泮宫諸侯所得為也大室屋壞新宫桓宫僖宫災書於春秋亦不書其新宗廟則當新桓宫僖宫或以親盡而不新壞與災所當書也新不新所不當書也至於雉門及兩觀亦魯之所得為也既書其災又書其新作災所當書也新作所不當書也豈以因是而有加其舊者歟由是以推新作南門蓋又有無所因而加之者矣所惡於新者為其作也新而不作則又何書莊公之於延廏固所得為矣以為不能制其國用至於大無麥禾君臣且將無粟而食此不之恤而有事於他豈知務者哉故雖其所得為亦不免於罪魯人為長府閔子騫曰仍舊貫何必改作孔子取之新延廏亦可仍而不仍者也夏鄭人侵許秋有蜚記異也冬十有二月紀叔姫卒此酅叔姫也何以繫於紀而得卒成紀季之後也城諸及防諸防内二邑也得時矣何以書新延廏已非矣城又非也以諸及防小大之辭也三十年春王正月夏次于成次于成公羊穀梁作師次左氏作次當從左氏不言主帥微者也故與伐邾之辭一施之秋七月齊人降鄣鄣國也降鄣非自降降之者也八月癸亥葬紀叔姫伯姫卒矣書葬叔姫卒矣又書葬存紀也葉子曰春秋於紀何其致意之深也自紀季以酅入齊不以為叛紀侯大去其國不以為奔終始二十餘年常欲紀之屢見至叔姫葬而紀絶矣蓋王政不作諸侯以力相并者不可盡誅也故以紀一見之以為雖齊之强有終不可以滅紀雖紀之弱有終不可以服齊者則國固非人之所可滅而人亦不得滅人之國而天下之争奪息矣故曰興滅國繼絶世而天下之民心歸焉孔子之志也九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟魯濟内地也有齊濟有魯濟齊人伐山戎山戎北戎也此齊侯之師何以曰人正亂者先中國而後四夷楚强而未伐衞伐而未服罪乃越千里之險而事夷狄以齊侯為誇也故貶而人之三十有一年春築臺于郎禮天子外屏諸侯内屏大夫帷士簾臺非以為觀也天子為靈臺以候天地諸侯為時臺以視四時非是不築築臺于郎非所築而築也築而又築益過矣夏四月薛伯卒築臺于薛六月齊侯來獻戎捷捷者何軍獲也下奉上曰獻齊霸主則何以獻獲於我威我也始小白伐山戎請兵於我不從怒將攻之管仲曰不可我已刑北方諸侯矣今又攻魯魯必即楚小白乃止故其歸也誇之以示我春秋從而書之挈齊侯若奉我然欲求名而不得也凡蠻夷戎狄有干王命方伯征之則獻其功於王王以警於夷諸侯不相遺俘秋築臺于秦冬不雨記異也歴月不雨異也歴時不雨尤異也歴再時不雨異益甚矣葉子曰雨者陰陽之和氣也一失其節則陰陽之氣繆矣故春秋以冬春書不雨者所以見異也至夏則將有害乎稼穡矣異不足言也故夏而不雨則書旱至秋則稼穡將成而又受其害者矣旱不足言也故秋而不雨則書雩雩者禱也春秋無以秋書不雨以雩見之也夏以旱見不雨而僖獨四月一書不雨者以著其不為旱也秋以雩月不雨而宣獨秋一書大旱者以見其不得雨也此周正也禮至於八月不雨則君不舉者夏正也夏而不雨猶有望於秋秋至於八月不雨則苗槁矣無復有望矣故君為之變君以民為本者也民以食為本者也君而無民則無與立民而無食則無與生此春秋之所謹也三十有二年春城小穀小穀内邑也書亟也夏宋公齊侯遇于梁丘梁丘宋地也齊侯霸也宋何以先齊地主也秋七月癸巳公子牙卒公子牙吾大夫之三命者也此季子殺之也何以不言刺順季子之意也君親無將將而必誅始公問於牙固曰慶父材矣俄而牙弑械成則不得於公而欲弑公也季子幸其惡之未成而不以為國獄則和藥而飲之使託若以疾死然義不失正其國仁不失全其親者季友之意也葉子曰周公使管叔監殷管叔以殷畔周公曰我之弗辟我無以告我先王於是居東二年而罪人得周公弟也管叔兄也周公之誅管叔豈得已哉使周公知其將畔必有以處之矣何至於誅故曰仁智周公未之盡而季子能隱之此周公之所不得為也而何貶焉故苟不可以殺雖鄭伯之於段容之於始君子不以為慈書曰鄭伯克段于鄢苟可以殺雖季子之於牙酖之於將弑君子不以為過書曰公子牙卒此君子所以處君親之道也八月癸亥公薨于路寢正也禮天子六寢路寢一小寢五諸侯三寢路寢一小寢二男不死於婦人之手以齊終也冬十月己未子般卒此弑也何以不書弑内辭也不書則何以知其為弑不地則知其為弑也未踰年之君未葬稱子書名未成其為君也古者天子在喪稱予小子未踰年而死則曰小子王生名之死亦名之諸侯則否故諸侯未踰年有子則廟廟則書葬無子不廟不廟則不書葬公子慶父如齊如齊者何閔公立而聘齊也慶父殺般者也何以不貶成季子之意也叔牙可殺則殺慶父未可討則未討惟不急於慶父而後季子之謀可行也葉子曰慶父季子之事魯存亡之所由分也嘗試論之慶父與叔牙專國久矣外乗莊公之弱而無所憚内扶夫人之姦以為援季子陳出也而非其母弟得與聞國政於其間亦幸而已矣及莊公問後而告以叔牙之言方是之時權在慶父季子非特不可誅其兄固力之所不能誅也適其將謀而未成故得先事而密殺之至於牙死慶父知其謀而復殺般則次必及於季子季子豈愛其身不能死難者哉以為慶父殺己而自取之諸侯容而不討則魯固慶父之國矣不容而討之則兵加於國魯之亂未巳也閔公者夫人之娣叔姜之子是亦慶父之黨於時纔八嵗僖公賢而長慶父不立僖公而立閔公亦豈甘心以為君者哉假夫人之故以説於齊少緩魯人之怨而申其志於後云爾則慶父終欲得魯者也季子於此勢不得兩全寜置慶父而辟之陳則可因陳援以訴於齊使夫人慶父之惡不能隠而季子得全於外魯庶幾其可為矣此季子之志也春秋蓋察之矣故直書慶父如齊而深隱季子奔陳至季子來歸而後始見褒則慶父如齊非逸賊季子奔陳非逃難卒之誅慶父而立僖公則季子之謀魯者無遺䇿是固君子所以成其意者也狄伐邢閔公一元年春王正月不書即位繼故也有不忍於先君也閔公般之庶弟而般未踰年也親之非父也尊之非君也繼之如君父者受國焉爾齊人救邢夏六月辛酉𦵏我君莊公秋八月公及齊侯盟于落姑落姑齊地也何以盟定公位也葉子曰吾何以知此盟為定公位歟左氏穀梁皆以是盟為納季子夫子般弑而季子奔陳慶父請於齊而立閔公慶父與季子蓋不並立於魯者閔公生纔八嵗安能内拒慶父之强外召季子而請諸齊慶父者季子之所不得制權非出於閔公則魯人亦安能違慶父召季子乎此理之必不然者也公羊不為義而何休獨以為季子畏慶父權重後復為亂如齊聞之奉閔公託齊桓而為此盟是雖無據而吾以為可信何以知之落姑齊地慶父利閔公之幼而終欲奪之季子察之審矣既殺子般而歸獄於鄧扈樂則安知不復殺閔公歸獄於人而自取之歟凡諸侯立不以正必待于盟㑹而後定固非王法矣桓伯而與鄭伯為垂之㑹制在鄭伯也宣立而與齊侯為平州之㑹制在齊侯也閔公之時小白方霸諸侯閔公雖不當立而慶父之惡不可以不前戒則假齊之重以定公位者實季子之意此吾所謂因陳援以訴於齊使夫人慶父之惡不得隱而後魯可為者也經所以書公及齊侯盟于落姑蓋齊侯與公即其地以為盟其謀出於齊非出于魯既盟而慶父之惡見其姦不得行於齊則季子亦可挾齊令以歸魯是盟固季子定公位非魯人納季子也季子來歸此公子友也何以謂之季子親貴之也内大夫奔未有言歸者此何以書歸賢之也桓公之子四人長則莊公也仲為牙而謀弑公叔為慶父而殺公能殺牙以全公盟閔公以正慶父則人孰不以為親而願其還孰不以為貴而倚其重曰是乃吾君之季子云爾天王書季子來聘親貴之在上譏之也魯書季子來歸親貴之在下賢之也葉氏春秋傳卷七
