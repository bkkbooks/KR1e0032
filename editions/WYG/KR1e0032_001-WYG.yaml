body:
  text: 葉氏春秋傳卷一宋葉夢得撰春秋何始乎隠公王政不行而王法絶也孟子曰王者之迹熄而詩亡詩亡然後春秋作詩亡於陳靈公則何始乎隠公無王詩也二雅至幽王而絶平王東遷詩下降於國風而王迹熄矣隠公之始平王之末也而恵公先焉何以不始於恵公而始隠公是春秋之義也天者能生殺萬物者也天子者繼天以取法者也春秋者代天子以行法者也天道運於四時布於十有二月備於三百有六十日周公達而在上故佐天子者列天地四時以為之職而作周官設其屬三百有六十以當朞之日而取法者顯矣孔子窮而在下故代天子者具四時以為年而作春秋斷自隠公為十有二公以當月之數而行法者著矣天之大數不過十二古者天子冕十有二旒服十有二章圭十有二寸其食也鼎十有二物列天下十有二州而時巡以十有二嵗皆所以法天也而孔子不得行之於其君故其託之於春秋亦曰春者天之所以生萬物而吾彰善以襃焉者也秋者天之所以殺萬物而吾懲惡以貶焉者也是以因古史而為之名兹不以周公天地四時名官者歟夫然故載之十有二公之行事以備其數則亦以三百六十為之屬之意也是説也古之人有傳之者而何休獨知之春秋感獲麟而作乎作而絶筆於獲麟乎感獲麟而作也吾何以知之孔子求為周公者也盖曰天下無道禮樂征伐自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣周之失政自隠公魯之失政自宣公三桓之不得専國政自陽虎孔子盖傷之而知其莫能為也故其始曰甚矣吾衰也久矣吾不復夢見周公及其中也曰鳯鳥不至河不出圖吾已矣夫至於獲麟非特王者之瑞不至所以為王者之瑞且不得自保而獲焉則曰孰為來哉孰為來哉其察於天者如是其審以為明王不作而天下莫能宗予然後載之空言以為之終而作春秋逆而推之上始於隠公是説也古之人有傳之者而杜預獨知之惟知春秋之名而後知天子所以法天知春秋之作而後知孔子所以代天子知春秋之取十二公而後知代天子以法天之道如是而可與言春秋矣元年春王正月王者以正朔一天下故協時月正日者天下無不同諸侯繼世而有其國故即位而見始者各得稱元年以自異年者其總名月者政令之所從施也易曰元者善之長也君子體仁足以長人未有始即位而不求其為仁者也故不曰一年曰元年子曰政者正也子帥以正孰敢不正未有始行事而不求其為正者也故不曰一月曰正月古者命是久矣王者上求法於天而下以為政於天下故春秋舉王於元年春正月之間此百王不易之道也諸侯受朔於天子元年者已之所有也正月者王之所頒也知其為王正月而諸侯之道盡矣隠何以不書即位將以治隠也隠受國於恵公則正私其志而欲以讓桓則不正其必曰是桓之位而非吾之所得居也故書正月以見正不書即位以治其不正不書非不即位也諸侯繼世未有不即位而成君者以為有其位而不能居是以沒之以正其志也葉子曰隠桓之事三傳言之各不同左氏以仲子為桓母而恵公再娶於宋仲子為嫡夫人桓公為嫡子故謂隠不得立而以即位為攝立桓公為太子而已奉之此以事推之也不知仲子非桓母諸侯禮不得再娶桓惡得為嫡而立則事不足信矣公羊以立子以貴不以長而為子以母貴之論故謂桓幼貴而宜立隠長賤而不宜立此以義推之也不知諸侯一娶九女為貴賤者嫡庶爾禮未有衆妾而别貴賤者桓惡得以貴而立則義不足取矣惟穀梁以恵公能勝其邪心而與隠則隠盖受國於恵而正者也隠探先君之邪心而欲以與桓則隠不能守其位而失正者也經書正月不書即位其説在是矣禮王后無嫡則立長恵公既無元妃則隠與桓皆庶子而隠為長隠之宜立不特受之於先君亦禮之所宜立也三月公及邾儀父盟于蔑邾魯附庸之國也五等之國不能五十里附於諸侯以達於天子曰附庸視王之大夫四命皆以字見儀父邾子克之字也盟天子之事也古者天子與諸侯非其節而時見曰㑹不能時巡而衆見曰同皆設方明盟於國門之外昭神明也諸侯有不協請於天子而後盟司盟掌之諸侯不得擅相盟凡盟之志皆惡也有以外為主彼欲盟而我從之則言公㑹某盟於某㑹聚辭也有以内為主我欲盟而連彼則言公及某盟於某及連辭也不日闕文也葉子曰記史者以事繫日以日繫月然歟曰然春秋以日月為例歟曰否繫事以日月史之常也有不可以盡得則有時而闕焉春秋者約魯史而為之者也日月史不可以盡得則春秋亦安得而盡書哉必將以為例有當見而史一失之則凡為例者皆廢矣故日月不可以為例為是説者公羊穀梁之過也然則何以有日或不日有月或不月此史之闕而春秋不能益也以為非義之所在則從史而已間有待之以見義而適得者癸酉大雨震電庚辰大雨雪見時之失也癸亥公之喪至自乾侯戊辰公即位見即位之節也而不可為常亦有經成而後亡之者夏五之類是也夏五月鄭伯克段于鄢段鄭伯母弟也挈鄭伯殺世子母弟目君甚之也不曰殺曰克著其以力勝之必於殺而後己也于鄢逺也大夫三命而後氏段不稱公子未三命也諸侯之尊弟兄不得以屬通必有見焉而後挈之罪在兄而舉屬不友也罪在弟而舉屬不恭也段何以不言弟兩責之也視之若非兄弟然鄭伯與段盖争國者也即位而與之京祭仲以為過制而不禁曰多行不義必自斃既命二鄙貳於己公子吕言之而不聴曰無庸將自及至收貳以為己邑吕復以為得衆而不顧曰不義不昵厚將崩不已禍於將萌稔而至於襲我然後一舉而以二百乗伐之内有武姜之愛而不之恤必殺而後己者鄭伯之志也去而之鄢可以反矣又往及焉殺不足以言之天叙五典兄弟居其一賊其親而棄其天鄭伯無與立於天下矣秋七月天王使宰咺來歸恵公仲子之賵仲子恵公之妾母也何以不言夫人非夫人也其卒在隠公之世未嘗致為夫人也歸死曰賻歸生曰賵賻以貨財賵以車馬宰大宰也上大夫也咺名也王之上大夫以邑爵見而不名妾母非王之所宜賵故咺去邑爵而名貶也葉子曰太宰王之所與治邦國者也葵丘之㑹宰周公在焉春秋舉而加之諸侯之上所以尊王也至僖公而以宰周公來聘盖已屈矣若桓公以弑立而宰渠伯糾聘之則有甚焉故貶而加名仲子妾也而宰咺賵之則又甚焉故貶而去邑爵春秋之用法固有漸也以為王不可以遽貶故即其使以見之將使王天下者有以自反也然王使榮叔歸成風含且賵使召伯來㑹葬不貶榮叔召伯而去天以貶王何也仲子猶妾也成風則致之為夫人矣賵仲子禮之所不宜為也含賵成風而葬之則成之以為夫人非特禮之所不宜為也以妾為嫡此王之所應治不能治而反成之王之不王孰大於此是不足以繼天者非使之所可見也九月及宋人盟于宿宋人微者也及者何公也何以不書公殺恥也凡公與微者盟無事而屈之則見公以示貶有為而求之則沒公以殺恥宿國也地以國者國亦與盟也葉子曰吾何以知及者之為公歟春秋凡兩微者之盟不志畧小事也大夫以上書則或以名或以名氏今但言及而不目其人則誰乎春秋盖有以公及人者矣公及莒人盟於浮來之類是也古者列國之卿當小國之君故禮卿不㑹公侯㑹伯子男可也夫公侯卿且不得㑹况微者乎公與卿大夫微者盟皆恥也然有不得已而非公之本意者則沒公有如及陽處父盟者焉則及微者盟而不目其人固以公為恥而沒公者也春秋者原情以定罪者也以為有為而求之非吾所欲也吾既以自為恥矣故為之隠而沒公無事而屈之可以已矣而吾欲焉則吾何懼於恥故從而著之以見公宋盟之事於傳無傳而左氏以為始通恵公娶于宋隠公亦娶于宋魯宋盖婚姻之國也今曰始通則前盖嘗有絶之矣宿盟之後宋穆公遂以卒來赴而公葬之自是復遇宋公於清兩國不交兵者十年至於齊鄭為好然後翬始伐宋則是盟非公有為而求之乎浮來之役左氏以為成紀好善小國也雖以子帛之盟息怨於我我不能自强而猶假以為重至莒以微者敵之而不愧斯亦可已矣而公從之宜其不為公隠也冬十有二月祭伯來祭伯寰内諸侯王之上大夫也來來朝也不書朝不與其朝也古者内諸侯不外交外諸侯不内交有天子在不敢以貳故凡夷狄不責其朝亦不能朝則不書朝凡内諸侯不正其與外朝亦不可受其朝亦不書朝皆曰來葉子曰吾觀於詩書以參春秋凡王之公卿大夫士有稱爵與邑如周公召公毛伯芮伯者有稱氏與爵如劉子單子者有稱氏與字如南仲仍叔者有稱氏與名如劉夏石尚者有去氏稱名如寔者有名氏俱不稱稱人如王人者然後知詩書之所見其制名者甚備春秋之所書其正名者甚嚴也凡王之公卿皆大夫也有上大夫有中大夫有下大夫古者二十冠而字曰伯某甫字與名並見故伯牛仲弓之類男子之通稱也至五十為大夫則有爵矣又敬其字繫以氏而不名以是差而上之大夫始爵以字繫氏而不名則南仲仍叔之類皆下大夫也字進則爵下大夫以字繫氏中大夫宜以氏繫爵則劉子單子之類皆中大夫也爵進則邑中大夫以氏繫爵上大夫宜以爵繫邑則周公召公毛伯芮伯之類皆上大夫也由字而上則爵而已卿可以兼公皆上大夫故爵邑不嫌同辭下大夫不可兼中大夫之職故以氏與爵為辨此仕於王朝者也其封於寰内三公之田視公侯故公食於邑亦稱公州公之類是也卿視伯故卿食於邑亦稱伯祭伯之類是也以是差而下之下大夫以字繫氏上士宜以氏繫名則劉夏石尚皆上士也上士以氏繫名中士宜去氏稱名則寔中士也中士去氏稱名下士微矣名氏俱不足稱而稱人則王人皆下士也自人為名自名為氏自氏為字自字為爵自爵為邑其等以是為差莫不有命數焉即其命數以推於諸侯之卿大夫士有大國有次國有小國大國公也㳄國侯伯也小國子男也王之上士三命以名氏見大國㳄國之卿亦三命亦當以名氏見則甯俞華元之類皆卿也王之中士再命以名見大國㳄國之大夫小國之卿亦再命亦當以名見則鄭宛莒慶之類皆大夫與卿也王之下士一命以人見則大國㳄國之上士小國之大夫亦一命亦當以人見而大國㳄國之中士下士與小國之士其辭窮矣皆當以人見則宋人邾人之類皆士也故諸侯之臣非嘗入而為王卿士者皆無得以氏字見諸侯無四命之大夫也王之所以為王者以有禮也禮之所以為有禮者以有名分也王政不作而禮廢禮廢而天下之名分亂矣舉先王之典而申之示天下為復有王者必春秋而後能正也公子益師卒公子益師吾大夫之三命者也諸侯之子稱公子公子之子稱公孫皆氏也公子之尊視大夫大夫三命而後以氏見故公子亦三命而後以氏見内大夫卒外大夫不卒為之服者則卒之不為服者則不卒内外之辭也禮王為三公六卿錫衰諸侯緦衰大夫士疑衰其首服皆弁絰以為君臣同體皆所以示有恩也則諸侯之卿大夫宜亦有以為之服如王之服者也二年春公㑹戎于濳夏五月莒人入向向國也得而不居曰入入逆辭也入國猶圍國未有不以兵者其曰人將卑師少也諸侯以强陵弱以衆暴寡而後有入人之國者凡入之志皆惡也無駭帥師入極極國也無駭吾大夫之再命者也帥師將尊師衆也二千五百人為師萬二千五百人為軍周制也然軍或謂之大師或謂之六師則師亦軍也盖有合而名之者有别而名之者帥師將之也不言使將非君所御也凡將尊師衆稱某帥師將尊師少稱將將卑師衆稱師將卑師少稱人惟君將不言帥師秋八月庚辰公及戎盟于唐九月紀裂繻來逆女紀侯國也裂繻紀大夫之再命者也諸侯娶於他國以上大夫逆女女在國之辭也在國稱女在途稱婦入國稱夫人裂繻不言使母命之也禮宗子無父則母命之親皆沒則已躬命之支子則稱其宗弟稱其兄春秋凡變事書常事不書逆女常事也此何以書為其母命之一見正也葉子曰昏禮五逆女不與焉逆女娶於他國之道也天子諸侯必親迎禮歟禮也逆女於他國則親之禮歟非禮也昏禮主人請期賓告曰某日使者反命主人曰聞命矣及期初婚父親醮子而命之迎主人筵几於廟而拜迎於門外壻執鴈入升堂再拜奠鴈降出御婦車而壻授綏於門外是謂冕而親迎故詩著刺不親迎以俟我於著俟我於庭俟我於堂為言若娶於他國則上大夫逆之即館及期而後迎焉正也孰有逆女而親迎之者歟逆女非昏禮之正而先儒一之謂春秋書逆女為譏不親迎是知迎而不知逆也冬十月伯姬歸于紀伯姬公之姑姊妹也婦人謂嫁曰歸内女嫁為夫人則書歸不為夫人則不書歸尊相敵也逆稱女别婦也歸稱伯姬别異姓也以字繫姓婦人之通稱葉子曰吾何以知伯姬之為姑姊妹歟春秋有言伯姬叔姬季姬者有言子叔姬者古者曰男子曰女子非以别子之稱别男女之稱也以别乎子必有加子者焉故女子或曰女子子禮所謂女子子在室為父三年者是也或曰子女子禮所謂子女子之長殤中殤大功者是也叔姬而加子者盖今公之子則伯姬叔姬季姬固公姑姊妹也紀子帛莒子盟于密紀子帛左氏作子帛公羊穀梁作子伯當從左氏紀侯國非子爵也子帛紀大夫之字也莒子將不利於魯子帛以婚􅊚之故通與之盟而平焉故以字見襃之也其事則史失之矣凡外諸侯盟㑹征伐以告則書不以告則不書葉子曰吾何以知子帛之為紀大夫之字歟春秋盖有襃外大夫而字者矣宋子哀是也盟雖諸侯且不得擅為而况大夫乎然愛而知其惡憎而知其善君子之道也春秋雖正名以定罪於罪之間有可録焉亦不以廢也楚屈完來盟得以名氏見屈完不得不稱名氏者也齊髙子來盟得以字見髙傒不得不稱字者也屈完之盟以天下髙傒之盟以魯見義不得不與子帛可獨已乎以子帛為裂繻之字謂莒魯有怨紀侯既婚於魯使子帛盟莒以和解之為魯結好息民其説雖出於杜預然左氏以為魯故則傳之盖有自也十有二月乙卯夫人子氏薨子氏隠公之妻也公死曰薨夫人之死亦曰薨内辭也不書葬夫人之義從君者也先薨則不葬待君而後葬周道也合葬非古也自周公以來未之有改也葉子曰子氏左氏以為隠公之母則聲子也公羊以為惠公之母則仲子也聲子仲子皆未嘗致之為夫人固不得稱夫人則子氏稱夫人盖隠公之妻穀梁之言是也鄭人伐衞聲其罪而討曰伐伐備鐘鼓不聲其罪而直討曰侵侵密聲有鐘鼓而不作罪大則伐小則侵侵伐皆討罪之辭服則止矣故不書勝敗賊賢害民則伐之負固不服則侵之大司馬之法也天子在上諸侯不得擅相討天下無道征伐自諸侯出凡伐之志皆惡也葉子曰吾何以知侵伐之辨歟宋人殺昭公晉趙盾請師以伐宋發令于大廟召軍吏而戒樂正曰三軍之鐘鼓必備焉趙同有疑盾曰大罪伐之小罪憚之襲侵之事陵也是故伐備鐘鼓聲其罪也戰以錞于丁寧儆其民也襲侵密聲為蹔事也乃使旁告於諸侯治兵振旅鳴鐘鼓以至於宋猶行先王之政也春秋之世征伐自諸侯出雖無適而不為僭然其名則竊取之矣三年春王二月己巳日有食之為天下記異也日天下之至陽也有君道焉有父道焉有夫道焉有中國之道焉食者何傷之也為天下至陽而物得以傷之必有為之然者矣而不可知也日有食之云爾是天下之大異也其食必於朔日月之㑹也日一日一周天月一月一周天天之大物為十有二辰月一周而與日遇於辰陽得其道則不食不得其道則食故有食不食日月動物也動而或差則不能皆中節月未望則載魄于西晦而見西謂之脁日行遲而月行疾也月既望則遡魄于東朔而見東謂之仄慝日行疾而月行遲也故或食於朔君子一推以其數則凡見其異者不知其可畏也一以為有以致之則不當其物者必以為不信也特舉其異而與天下共記焉其必有當之者而畏天者知所警矣凡書月與日而見其朔者正也書月與日而不見朔書月而不見日與朔者差也書月與朔而不見日者史官之失也葉子曰惟上帝不常作善降之百祥作不善降之百殃自堯舜以來天人未嘗不相因也有一國之異有天下之異一國之異繫一國故大災可繫齊六鷁退飛可繫宋鸜鵒來巢可繫魯天下之異繫天下故梁山崩沙鹿崩皆晉也而不可繫晉日者有目之所共覩其繫非以天下歟春秋之時臣弑君子弑父妻弑夫外服侵中國以其道言之則陽之傷也多矣謂其無以致之不可也然日月之行則有冬夏兆而為至裂而為分日食必於朔月食必於望不可差以毫釐謂其非有數焉於其間亦不可也或曠年而不食或仍月而食彊弱在其道盈縮在其行皆聖人所不敢知惟兩存而不廢是故以為有以致之也先王於是伐鼓用幣瞽奏鼓嗇夫馳庶人走曰吾以救日也而春秋日食則書之以為有數焉而莫之違先王於是有救日之失而無救月之請曰是其當然而無與於人也而春秋月食則不書所以正人事而全天道也葉氏春秋傳卷一
