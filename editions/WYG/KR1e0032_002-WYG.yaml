body:
  text: 葉氏春秋傳卷二宋葉夢得撰隠公二三月庚戌天王崩天子曰崩諸侯曰薨大夫曰卒士曰不禄禮也天子記崩不記葬舉天下而葬一人不疑也葉子曰周天王見春秋之世者十有二有見崩見葬者有見崩不見葬者有崩葬皆不見者崩以赴書葬以義見莊僖頃不書崩不以告則不得而書也天子七月而葬桓以七年則緩匡以四月簡以五月景以二月則速非其時也葬天子親者也文公以叔孫得臣葬襄王昭公以叔鞅葬景王非其禮也故特書崩所書也莊僖頃三王以不赴不書葬所不書也桓匡簡襄景五王以失時違禮特書葬則平恵定靈四王書崩不書葬周不失時魯不失禮以為常事而不書歟夏四月辛卯尹氏卒尹氏左氏作君氏公羊穀梁作尹氏當從二傳夫人不可以氏君王之卿士也外大夫不卒此何以卒天王之喪嘗主我而我喪之也何以舉族因是以貶世卿也葉子曰古者内諸侯禄外諸侯嗣内諸侯而嗣强也諸侯世國大夫不世爵禄諸侯之大夫而世爵禄僭也春秋之世内諸侯之嗣有如尹氏者其後卒以擅立君諸侯之大夫世爵有如齊崔氏者其後卒以弑君故尹卒以氏書崔杼出奔以氏書以為是世卿者所為故各因其事一見法焉秋武氏子來求賻賻歸生者也禮有喪弔而含含而襚襚而賵賵而臨五者皆同日臣為君喪致襚曰致廢衣於賈人納貨貝曰納甸於有司賵馬入廟門賻馬與其幣大白兵車不入廟門生事也天王崩於是五月矣魯當歸而不歸周不當求而求皆過也何以不言使桓王當喪未君也君薨百官總已聴於冢宰武氏子大夫之在喪者也君子不奪人之喪武氏在喪而命之亦非也諸侯在喪稱子繫之國大夫在喪稱子繫之氏八月庚辰宋公和卒外諸侯何以卒以我喪之也同姓臨於祖廟同宗同族臨於禰廟異姓臨於外皆以名見所以正終也不言薨以别乎内也古者制名上可以兼下下不可以兼上諸侯曰薨而天子亦有言君薨聴於冢宰者士曰不禄而諸侯之赴亦有言寡君不禄者故外諸侯卒不嫌與大夫同辭以上兼下也卒者以赴為辭赴則書不赴則不書赴以名則書以名赴不以名則不書以名卒而不赴赴而不以名以為不恭其君外之失也葉子曰諸侯死而赴以名禮歟曰然同盟則赴以名不同盟則不赴以名禮歟曰否此左氏之誤也古者無諱至周而後諱然必葬而後諱之者生事終鬼事始也未葬而諱是不懐也子蒲卒哭者呼滅子臯曰若是野哉呼之非也赴之禮也春秋有同盟而不名者宿男卒之類是也有未同盟而名者蔡侯考父卒之類是也豈皆别於盟乎春秋雖以名正然終有不得而名者春秋不能益也從史而已然則禮君赴於他國之辭曰寡君不禄而不名何也非禮也記禮者之失也冬十有二月齊侯鄭伯盟于石門外盟也内盟言㑹及外盟不言㑹及直曰盟而已内外之辭也必有事焉然後與内同辭鄫子㑹盟於邾衞人及狄盟是也癸未葬宋穆公外諸侯何以葬以我㑹之也諸侯之喪士弔大夫㑹葬禮也卒從正故書名葬從主人故書諡周人以諱事神葬而後舉之凡見卒不見葬者我不往㑹内之失也四年春王二月莒人伐杞取牟婁牟婁杞邑也外取邑不書此何以書不正其以伐取也伐者問罪之師服則止矣從而取其邑是利之也凡國曰滅邑曰取無宗廟社稷君長屬之以為己有謂之取戊申衞州吁弑其君完州吁公子也不氏未三命也惡莫大於弑其君不待貶絶而罪自見君子無所加辭焉各正其名而已世子稱世子公子稱公子大夫以名氏見者稱名氏以名見者稱名微者稱人有稱國者為衆弑君之辭也夏公及宋公遇于清遇㑹之薄也清衞地及我接之也㑹不言及遇言及㑹所期也遇非所期也宋公在衞而我往從之故以我及宋公諸侯非王命不出境凡遇之志皆惡也葉子曰遇天子冬見諸侯之禮也諸侯相遇亦有為之禮者歟曰未有兩君相見而不為禮者也昭公孫于野井齊侯來唁公既哭以人為葘以幦為席以鞍為几曰以遇禮相見則諸侯之遇固有禮矣然則季姬及鄫子遇于防亦禮歟曰非此之謂也桃丘之㑹衞侯不至書公弗遇此不以禮言也季姬非所見而見故假遇以為辭使若適相值然固不嫌與諸侯之遇同辭也宋公陳侯蔡人衞人伐鄭宋公陳侯何以稱爵君將不言師也君行師從不嫌於無師故外稱爵内稱公秋翬帥師㑹宋公陳侯蔡人衞人伐鄭翬吾大夫之再命者也翬名也九月衞人殺州吁于濮濮陳地也稱人以殺討賊之辭也臣弑君在官者殺無赦子弑父在宫者殺無赦夫人而可討也此殺州吁者石碏也而曰衞人以是為衞人皆得討也冬十有二月衞人立晉晉桓公之弟也不氏未三命也衞人衆辭也石碏既殺州吁衞人逆晉於邢而立之立者不宜立也以其不宜立也故特書立焉以見義之得與其立也晉則何以謂之得與其立以弟繼兄謂之宜立不可也致萬民而詢立君周道也衆以為可立而立之謂之不宜立不可也葉子日公儀仲子之喪舍其孫而立其子子服伯子曰仲子亦猶行古之道也昔者文王舍伯邑考而立武王微子舍其孫腯而立衍子㳺問諸孔子孔子曰否立孫春秋所謂宜立者孔子之言是也然不可以文王為不得立武王微子為不得立衍春秋所謂宜立者文王微子之意是也國君有嫡而立嫡無嫡而立長正也不幸無嫡又無長不與之立則無君與之立則未知其孰宜立也先王於是有致萬民而詢立君之道使桓公而有嫡與長則石碏必立之矣今見晉不見嫡與長是桓公無嫡又無長也衞人立晉而不得立則衞安得有君乎此春秋所以與晉也故因晉一見法焉以為異乎尹氏立王子朝也五年春公矢魚于棠矢魚公羊穀梁作觀魚左氏作矢魚當從左氏矢射也古者天子諸侯將祭必親射牲因而獲禽亦以共祭春獻魚之節也公將以盤逰盖託射牲以祭焉以公為荒矣於是公子彄諫曰鳥獸之肉不登於俎皮革齒牙骨角毛羽不登於器則公不射非其矢也棠魯地于棠逺也夏四月葬衞桓公宋穆公稱公二王後也衞侯爵也桓公何以亦稱公主人之辭也葉子曰五等諸侯皆稱公禮歟曰禮也人有十等王臣公公臣大夫古者五等諸侯有别而稱之者有合而稱之者别而稱之者實之所在不可得而越者也故諸公之儀不可為侯伯侯伯之儀不可為子男合而稱之者名之所在可得而通者也故五服之别槩曰侯服五等之名槩曰諸侯舉其中以包上下也諸侯即位踰年於其國中得稱公豈不以臣子皆欲推尊於其君者歟公之為言上以别乎王下以别乎大夫者也故有言后王君公者矣有言坐而論道謂之王公者矣子曰公子孫曰公孫非特許其臣子也雖王亦假之矣是以魯侯爵而諸公皆書公諸國之葬皆稱公寰内諸侯葬亦稱公周道也以為貶其僭者誤也秋衞師入郕郕國也九月考仲子之宫初獻六羽仲子恵公仲子也宫廟也考成也仲子則何以得考宫亡乎禮之禮也與之歟與之也禮庶子為君為其母築宫使公子主其祭於子祭於孫止仲子不得終於恵公之世則隠公不得祭然為人後者為其祖母三年則隠公以孫祭之可也是謂亡乎禮之禮義之所得與也與則何以書不正其初獻六羽干武舞也羽文舞也隠公知婦人無所用武而不用干不知仲子不得有樂而不可以獻六羽曰獻尊之也曰初謹始也夫欲尊之而不得其道適以為卑而已矣子曰天下無道禮樂征伐自諸侯出六羽其當之矣葉子曰吾何以知春秋與仲子之考宫歟立武宫立煬宫不與其立者也故不書考而書立立宜不可考固不足譏也仲子之宫與其考者也故不書立而書考於立無譏則考固吾之所與也然辭閒容之之緩辭也不與其正之辭也故築王姬之館言之震夷伯之廟言之隠公雖可為仲子立宫而終不可為禮之正故君子不以所與廢所正春秋之義也婦人則何以不得有樂婦人從夫者也死而祔於夫則何所用樂周以閟宫祀姜嫄有先妣之樂亦亡乎禮之禮也而不通於仲子曰祭必用樂歟先王於羣小祀不興舞則仲子固不傷於無樂也雖以諸侯用六君子以為悖矣先儒或以僭而越四羽為譏或以殺而厲八佾為美夫禮必先察其是非而後議其當否使婦人而得有樂則六羽固仲子之樂也使不得用樂雖殺其足美乎古者禮之别有四而已天子也諸侯也大夫也士也諸侯之樂同以軒縣為節射同以貍首為節未聞羽數而公侯有别也何獨取於四佾則亦不可謂之譏耶曰魯諸侯之廟僭用八佾自仲子始降而用六則八佾之用至昭公猶然則亦不可謂之美僭與殺二者皆無當吾是以知春秋所書不在六羽也邾人鄭人伐宋邾何以先鄭主兵也盟㑹以爵為序盂之㑹楚子先諸侯之類有不以爵焉侵伐以主兵為序戚之圍齊國夏先衞石曼姑之類有不以主兵焉春秋之義也螟記災也螟蝥賊皆害稼螟食心食葉蝥食節賊食根稼以食心為重故獨書螟冬十有二月辛巳公子彄卒公子彄吾大夫之三命者也宋人伐鄭圍長葛長葛鄭邑也伐國不言圍邑此何以言圍為後取長葛起也六年春鄭人來輸平輸平左氏作渝平公羊穀梁作輸平當從二傳輸猶輸粟然有物以將之也和而不盟曰平來外辭也何以不言及鄭平方請未平也人微者也凡外大夫來皆言使鄭人何以不言使辭不可言使人也葉子曰吾何以知輸為有物以將之歟夫平則平矣故春秋有書及平者矣有書暨平者矣未有先請而後遽書也是必有義重於己平者而後書以見譏焉其重者何歸邴是也前無與之後孰歸之非以物輸之而何左氏以輸為渝謂之更成更成猶言釋憾也杜預以狐壤之戰實之夫釋憾何足志乎二氏雖以渝為輸而以為墮成則失之尤逺甚盖知其文不知其事而妄意之也春秋諸侯㑹盟口血未乾而背之者皆是曷嘗盡以前告盟且不告而况於平乎更成墮成皆非義之所在法所不書吾是以知歸邴之為輸也夏五月卒酉公㑹齊侯盟于艾秋七月無事必書首月以見時全天道也時者天道之一變而嵗之所自成也春秋王者之事先天而天不違後天而奉天時王者繼天而為之子也故厯一時無事必書首月而繫於時不敢以無事廢時也厯一月無事則各於有事之月以見時欲因有時不失時也如是而後可以王矣冬宋人取長葛外取邑不書此何以書不正其以伐取也伐人而圍其邑踰年而後取之其暴為已甚矣不繫之鄭不與其得取於鄭也七年春王三月春秋書王惟春各於其有事之月見之至夏則否王者以正始為本春嵗之始也無事不得見於正月則見於二月不得見於二月則見於三月過三月則時已變矣非王之所以為始是以夏不書王不嫌於無王也叔姬歸于紀伯姬歸於紀矣叔姬何以復言歸歸紀季也内女嫁為夫人則書不為夫人則不書叔姬非夫人也何以得書將以起紀季之以酅入於齊也酅紀季之邑也紀季以酅入於齊非以存酅以存紀也言歸紀季則不得書言歸於紀則得書君子憫紀之亡而欲存之紀季不得以侯書故假叔姬以夫人之辭成紀季以為侯而後紀可見者春秋之義也葉子曰叔姬歸於紀左氏公羊皆無傳而説者以為伯姬之媵而待年者也禮諸侯一娶九女盖以廣繼嗣之道而絶妬忌之行為之媵者必與之俱行詩曰韓侯娶妻諸娣從之待年於室於禮未之聞也且媵小事不書宋共姬之媵有為言之也使叔姬以紀故而録自當正名曰媵亦安得以夫人之辭同書曰歸於穀梁獨以為逆之道微故不言逆媵固不得言逆以為大夫妻乎則不當書歸以為紀侯妻乎則既有伯姬矣吾不知其説則曰紀季為妻者義當然也滕侯卒夏城中丘中丘内邑也夏城之失時也凡土功有時制龍見而戒事火見而致用水昏正而栽日至而畢時也大都不過參國之一中五之一小九之一無過百雉制也不得其時則書不得其制則書其役長者志以時其役短者志以月未有以建子書者外是皆失時也創築曰築修舊曰城修舊淺事不得其時制雖淺事亦書重民事也齊侯使其弟年來聘諸侯之邦交嵗相問殷相聘周道也書聘不書問畧小事也聘大夫之事古者大夫五十而後爵異姓以名氏見同姓以公子見雖母弟亦以公子見年不稱公子非大夫也諸侯之尊弟兄不得以屬通其弟年云者以母弟而任大夫之事以齊侯為愛其弟而易大夫非公天下之道也秋公伐邾不言師君將也冬天王使凡伯來聘凡伯王之上大夫也凡邑也伯爵也天子時聘以結諸侯之好大夫將之周道也何以書非常也葉子曰存頫省聘問五者君之事也春秋何以獨書聘吾考於禮天子之撫邦國者一嵗徧存三嵗徧頫五嵗徧省而無聘問至時聘以結諸侯之好殷頫以除邦國之慝間問以喻諸侯之志則存省不與盖存頫省常也猶臣之有朝覲宗遇也聘問非常也猶臣之有㑹同也聘與問一事也大曰聘小曰問則問亦聘矣而殷頫亦與常頫異特見於除慝二者時舉而用之故典瑞有殷聘之玊無存省之玊無存省之玊盖非常則用玊常事則不用玊春秋之世邦國之慝無嵗無有王之所不暇頫亦非王之所得除也則非常而見者惟聘而已此聘之所以獨見也戎伐凡伯于楚丘以歸楚丘衞邑也凡伯王之上大夫戎朝周發幣于公卿凡伯弗賓戎因其使我而歸邀諸塗而執之其曰伐何不與戎之得執天子之使也伐何以與執何以不與伐者一國之辭執者一人之辭伐者加諸我當不當未可知焉執則為之囚服矣伐可言執不可言也戎之伐雖不得為正而凡伯以王臣而見伐於戎則為凡伯者亦病矣葉子曰子貢問何如斯可謂之士矣子曰使於四方不辱君命可謂士矣周衰以楚邱近地而暴天子之使君子雖為之辭以抗王人然凡伯不能正其身以辱君命亦春秋所不得掩如是而後可以正王臣焉八年春宋公衞侯遇于垂外遇不言及畧之也以告則書不以告則不書三月鄭伯使宛來歸邴邴左氏作祊公羊穀梁作邴當從二傳邴鄭邑也宛鄭大夫之再命者也鄭邑則何以歸于我以輸平也諸侯受地於天子不得私與人歸之罪納之亦罪也葉子曰邴三家皆以為鄭祀泰山湯沐之邑盖自左氏失之古者謂秋田祭四方為祊祭之明日再祭為祊祊祭名也左氏既以為祀泰山之邑故遂誤其地為祊謂鄭請復祀周公易田而以許田為周公祊鄭祀周公非其鬼而祭之此理之必不然者也而何祊之云二傳雖得其名而不察其實故亦從以為湯沐之邑邴不得為祀周公之祊則許安得為祭泰山之邑哉惟不知前之為輸平是以妄信其傳而弗悟也庚寅我入邴歸邴挈鄭伯著鄭罪也入邴挈我著魯罪也凡内邑歸言取不言入我所有也歸外邑言入不言取非我所有也入逆辭也非我所有外雖歸之其道猶為逆云爾葉子曰春秋書内事未有言我者惟外伐我言某鄙敗績言我師此别外之辭也舍是惟我入邴齊人歸我濟西田吳伐我齊伐我凡四見焉是豈别於外乎凡我皆有己之辭春秋之所貶固皆己罪然有因人而致之者未必皆出於我也夏六月己亥蔡侯考父卒辛亥宿男卒秋七月庚午宋公齊侯衞侯盟于瓦屋八月葬蔡宣公九月辛夘公及莒人盟于浮來螟冬十有二月無駭卒九年春天王使南季來聘南季王之下大夫也聘或以卿或以大夫以卿聘者大聘也以大夫聘者小聘也葉子曰吾何以知聘大小之異使歟聘禮使者載旜旜孤卿之所建也然有曰大夫來使無罪則饗盖有大夫而為使者矣而禮諸侯之邦交五年一大聘三年一小聘先儒謂大聘用卿小聘用大夫此諸侯之禮也春秋書王聘言尊者如宰周公幼者如王季子仍叔之子固異文而有書卿以邑爵見如凡伯渠伯者有書大夫以氏字見如南季家父者以諸侯之禮推之兹非大小之辨歟大聘聘也小聘問也聘有享獻及夫人主人筵几有私面外而郊勞至問則畧之是所以為大小之辨者此使所以亦不得同也三月癸酉大雨震電大雨震電不書此何以書不時也建寅之月未雨雨水而大雨雷未發聲而震電庚辰大雨雪大雨雪不書此何以書不時也建寅之月也挾卒挾吾大夫之再命者也夏城郎不時也秋七月冬公㑹齊侯于防十年春王二月公㑹齊侯鄭伯于中丘夏翬帥師㑹齊人鄭人伐宋六月壬戌公敗宋師于菅前未有言戰者此何以言敗宋師内辭也春秋内魯而外諸侯内敗於外皆不言我師敗績直曰戰不以内受敗於外也内勝外皆不言及某師戰直曰敗某師不以外見敗於内也此翬之師也何以言公非翬之師也翬還以為不得志而公自將也葉子曰春秋有偏戰有疑戰偏戰結日而戰也疑戰詐戰也為左氏之説者曰皆陳曰戰謂偏戰也未陳曰敗某師謂疑戰也而穀梁亦云非也凡魯與外書敗者七未有一言敗績者豈魯皆詐戰乎凡外諸侯書戰者十有四未有一言敗我師者豈諸侯皆偏戰乎吾是以知春秋之義在内外不在偏戰疑戰也辛未取郜郜宋附庸之國也凡取附庸之國曰取屬之以為己有也雖有社稷宗廟君長而屬之以為己有故不嫌於與邑同辭也葉子曰吾何以知郜為附庸之國歟桓書取郜大鼎于宋以郜别宋則非宋之邑也僖書國之来朝則郜非特為魯之附庸盖後自能立國進而為子猶邾之為邾子也誠為宋邑則郜安得有君哉辛巳取防防宋邑也内取外邑不書此何以書我舊邑而嘗侵於宋者也葉子曰吾何以知防之為我邑歟前年書公㑹齊侯于防固我邑也至是而㑹齊鄭伐宋未知宋之罪也或者齊㑹之後宋嘗侵於我遂伐而復取之歟何以不書宋侵外取内邑皆不書殺恥也故書取鄆亦不著其侵也秋宋人衞人入鄭宋人蔡人衞人伐戴鄭伯伐取之鄭伯伐者何伐宋蔡衞三師也鄭伯取者何取宋蔡衞三師也何以言伐又言取不正鄭伯乗人之隙出不意而覆其師也宋人衞人入鄭固非矣得而不居猶未盡惡焉益之以蔡而伐戴則力已憊志已驕矣鄭伯乗而伐之三國不支鄭伯於是乎取其師伐討罪之名也鄭伯討其入國之役可也不待其服乗其隙而取其師不可也何以不言師師少也春秋有言宋皇瑗取鄭師于雍丘矣有言鄭罕達取宋師于嵒矣取者覆而敗之不遺一人之辭也何以不言鄭伯取宋人衞人蔡人於戴戴不見伐無以著三師玩兵而可取鄭不見伐無以著其以討罪為名而志復怨伐宋取長葛為暴師也伐邾取須句為登叛也且不可况一日而覆三師乎君子為之變文曰伐取之其辭畧而殺甚鄭伯也冬十月壬午齊人鄭人入郕十有一年春春秋正月無事則以次月首時而書王矣亦有事在時而不得其月者則以事繫時而不書王無所寄王也隠十年無正月豈皆不得其月歟因其有不得者而去其所得者以正隠也葉子曰吾何以知隠正月為因其有不得而去其所得歟春秋天下之大法也事者法之所記以著者也事可以見法則著事事不可以見法則著法事可去法不可失也隠受位於恵正也不有其位欲致國於桓則不失也著其始正而治其終不正故元年有正月自二年終其世無正月定不受位於昭非正也因其受而有之不為徒讓以起亂則正也治其始不正而與其終正故定元年無正月自二年終其世有正月是説也公羊穀梁知之而不盡夫定亦安得為終正哉盖定既迫於季氏而受之矣將復致國於昭之子則季氏必不從也定既不受昭之子又終不得立則魯何時而可治乎三家未必不乗其隙而取之是以不得已而與之正夫定猶不得已而見歟則隠之得已宜春秋之不與也葉氏春秋傳卷二
