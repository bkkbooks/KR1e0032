body:
  text: 葉氏春秋傳卷十宋葉夢得撰僖公三執宋公以伐宋此楚子執之也何以不言楚諸侯與有罪也諸侯知宋公之不足宗則勿㑹而巳矣從之而先楚子則宋公之執非楚所獨能為也冬公伐邾楚人使宜申來獻捷宜申楚大夫之再命者也捷者何捷乎宋也前未有言敗宋者此何以言捷不使楚子得執宋公以敗宋故見伐不見戰也宋捷則何以獻於我威我也楚居一方與宋襄公爭中國執宋公以伐宋懼諸侯猶未盡宗已故其捷也誇之以示諸侯挈使宜申若奉我然欲求名而不得也不言宋不使楚子得捷於宋也十有二月癸丑公㑹諸侯盟于薄釋宋公此前㑹盂之諸侯也不序前目而後凡也何以言公㑹約盟而公徃㑹也執不言釋此何以言釋以二王後見重也楚既得宋矣宋公猶未釋諸侯於是請於楚而盟焉此楚子釋之也何以不言楚諸侯與有力也執不言楚則諸侯不能逃其罪釋不言楚則楚子不能專其徳宋公曰釋晉舎季孫行父于苕丘曰舎君臣之辭也二十有二年春公伐邾取須句須句邾邑也内取外邑不書此何以書不正其伐取也須句風姓之國邾人滅而屬之以為邑則取邑者也夏宋公衛侯許男滕子伐鄭秋八月丁未及邾人戰于升陘冬十有一月己巳朔宋公及楚人戰于泓宋師敗績此救鄭之師也以宋公及楚人言宋之主戰也薄之釋宋公鄭伯在焉宋公以鄭為楚與國背惠而伐鄭不量力而與楚戰敗之道也何以不貶不重傷不禽二毛不鼓不成列以襄公有取敗之道則可以襄公為非戰之道則不可春秋貴偏戰不貴詐戰則襄公義有不可貶也二十有三年春齊侯伐宋圍緡伐國不言圍邑此何以言圍緡不正其伐泓之敗而凌之也伐者問罪之師不正其義而幸其間非伐也為後宋公兹父卒起也夏五月庚寅宋公兹父卒秋楚人伐陳冬十有一月杞子卒此杞伯也何以言子時王降之也何以降用夷禮也葉子曰孔子言夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也文獻不足故也古者天子五載一巡守考制度于四岳變理易樂者為不從其君沿革制度衣服者為畔其君杞二王之後所以尊賢也豈不曰統承先王修其禮物者乎宋禮之不足或以久而亡也而杞習於用夷則時王得降之矣故雖周之衰王政猶或行也二十有四年春王正月夏狄伐鄭秋七月冬天王出居于鄭天子以畿内為國諸侯以封内為國諸侯不以其道去其封内故曰出奔天子不以其道去其畿内故曰出居出之為言恥也若曰雖有其國而不能守云爾天子無外雖去其國不失天下故謂之居焉凡諸侯與其國内曰居國外曰在諸侯以國為家者也天子内外皆曰居天子以天下為家者也葉子曰天子非巡守不適諸侯諸侯非述職不見天子諸侯於盟㑹征伐之事未嘗書出義可得而行也至於奔則失其位矣然後書出天子於伐鄭狩于河陽未嘗書出亦義可得而行也至於出居于鄭則失其位矣然後書出蓋大有天下小有一國皆其所當守而不可失安有内難不能正而及避之於外以託於諸侯歟夫子帶之亂君子亦有以處之矣方其奔齊或放焉或封焉親愛之而勿殺可矣古之人有行之者舜也而王不能反召之使得終其惡及以狄伐周則罪在可討弗辟則無以告先王古之人有行之者周公也而王不能反避之使得奪其位在易鼎而受之震鼎器也震長子也主器莫若長子故必不喪匕鬯而後出可以守其宗廟社稷以為祭主若襄王者可謂喪其匕鬯矣有天下而不知此則亦何以王天下哉故以襄王一見法焉晉侯夷吾卒二十有五年春王正月丙午衛侯燬滅邢衛侯何以名嫉誘滅也衛侯將伐邢其大夫禮至曰不得邢之守國不可得也請往其昆弟仕於邢及衛伐邢邢之守國子巡城衛之仕於邢者乃掖國子赴外而殺之邢遂以亡禮至銘其器曰余掖殺國子莫余敢止君子是以嫉衛侯也葉子曰甚矣君子之惡詐也曰自古皆有死民無信不立民之所以能並生於天地之間而不相害者以其信足恃也使人而各懷其詐雖匹夫且不可與共處况有國與天下者乎故楚子䖍誘蔡侯般殺之名惡誘殺人之君也衛侯燬從禮至之請誘殺國子而滅邢名惡誘滅人之國也夫滅國之罪亦大矣而辭無所貶以為不待貶絶而自見也乃其誘殺人之君誘滅人之國非有所示其誰察焉是以衛與狄異而其辭一施之而三傳皆言貶滅同姓記禮者從而為之説春秋之義不加於事之所易見而常致意於義之所難察同姓所易言也楚滅䕫齊滅萊皆不名滅國滅同姓一事也既見滅則罪已重矣故不以輕者復參焉誘殺人而滅國與誘人而殺之二事也不正則終無以著其罪三傳既已失之為禮者又從而弗悟吾然後知學之為難也夏四月癸酉衛侯燬卒宋蕩伯姬來逆婦蕩氏也伯姬内女而嫁於宋之蕩氏者也子逆妻而母親之非禮也婦縁姑之辭宋殺其大夫大夫何以不名大夫無罪也何用見大夫之無罪其討泓之敗歟秋楚人圍陳納頓子于頓圍陳何以言納頓子與其納也納君未有不以師何以言圍陳頓陳之鄰國蓋有迫於陳而出奔者圍陳而使頓子得以歸是亦所以為納也頓子何以不名内未有君也凡納君而名者内有君也納君而不名者内未有君也葬衛文公冬十有二月癸亥公㑹衛子莒慶盟于洮公不諱與莒慶盟衛子在焉者也二十有六年春王正月己未公㑹莒子衛寗速盟于向寗速衛大夫之三命者也公不諱與寗速盟莒子在焉也齊人侵我西鄙公追齊師至酅弗及弗及左氏作不及公羊榖梁作弗及當從二傳弗及可及而我不及也善用師者量敵而後進慮勝而後㑹追而弗及有畏齊之志焉酅齊附庸之國齊人而言齊師以公弗及大之也夏齊人伐我北鄙衛人伐齊公子遂如楚乞師乞重辭也得不得之辭也古者諸侯無師帥教衛以賛元侯人乞師而我從之固已非矣况我不足而乞于人乎非正師之道也葉子曰齊自鹿上之㑹不復與楚通蓋欲與爭霸而我方與諸侯㑹楚盟于薄以釋宋公則棄齊而從楚矣故齊連年既侵我又從而伐之我畏齊弗敢追反假楚以報怨所謂既不能令又不受命者也召陵之盟桓公與我伐楚而楚服今我乃欲以楚伐齊而恃之以勝公之謀國為可知已昔者滕文公嘗問於孟子曰滕小國也間於齊楚事齊乎事楚乎孟子告之以鑿斯池築斯城與民守之效死而民弗去使僖公而知此則齊不必畏楚不必恃蓋為國必有自勝之道故以僖公一見法焉秋楚人滅䕫以䕫子歸䕫子何以不名申䕫子也凡滅國之君内無君則不名然國滅而奔則不名國滅而以歸則名者著屈不屈也虁楚之同姓楚人責其不祀祝融與鬻熊䕫子以熊摯有疾别於楚而不得祀楚用是滅焉則䕫子為有辭而未嘗屈故以出奔之辭書之見䕫子非楚之所得歸也冬楚人伐宋圍緡伐國不言圍邑此何以言圍緡未能得宋先嘗之於緡也伐者問罪之師國未可得而先嘗之於其邑非伐也為後圍宋起也公以楚師伐齊取穀穀齊邑也内取外邑不書此何以書不正其伐取也公至自伐齊二十有七年春杞子來朝夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公乙巳公子遂帥師入杞公子遂吾大夫之三命者也冬楚人陳侯蔡侯鄭伯許男圍宋楚子何以先諸侯主兵也於是宋襄公死矣而晉文公未興中國無霸楚子遂欲先諸侯而諸侯莫不從焉故貶而人之人楚子所以人諸侯也十有二月甲戌公㑹諸侯盟于宋此前圍宋之諸侯也不序前目而後凡也宋公猶在圍則何以地宋盟于宋之國外是亦宋矣不嫌也曹南言南聶北言北此何以不言方志於圍則不主方也楚圍宋而公不與於是如㑹而請盟焉惡矣何以不没公公欲之也葉子曰吾何以知此盟為圍宋歟僖公自陳穆公之盟雖以為齊故然陳蔡鄭皆楚之與國也而公與之同好楚子得交中國蓋自是始矣春秋没公而人三國則公宜與楚厚者也明年公雖不㑹盂而為薄之盟以釋宋公然後五年伐齊之役乃乞師於楚而楚援之遂以取榖則何以得於楚乎晉文公之興首伐衛以致楚而公為之戍衛又責公子買之不卒戍而刺之則公之附楚審矣圍宋之役初雖不與㑹而為盟豈有意於救宋哉殆亦若戍衛以成楚志爾楚子居申而後使子玉去宋若前盟而宋圍解何待既退而後命之是㑹圍非解圍也薄之盟公㑹而釋宋公宋之盟公㑹而圍宋公美惡不嫌於同辭也二十有八年春晉侯侵曹晉侯伐衛何以再見晉侯嫌侵曹與伐衛並也曹侵諸侯之田不用僖負羈而乗軒者三百人衛欲與楚見逐於國人楚始得於曹而新昬於衛文公欲習齊桓之迹先攘楚以圖霸故自南河濟而侵曹歸而討衛罪因以怒楚而求戰何以不言遂侵曹非以伐衛也公子買戍衛不卒戍刺之公子買吾大夫之三命者也何以言不卒戍以買為善遂事而不正其殺也衛自淮之㑹不復與諸侯通至文公卒始以莒故與我為洮及向之盟以我為楚與國而同好也故晉伐衛而我戍之以援焉買以晉不當敵而去之大夫出疆可以安社稷而專之可也則公畏楚而殺買不正也何以言刺内殺大夫不言殺刺之為言一曰訊羣臣二曰訊羣吏三曰訊萬民周道也若言察之審而後殺焉内辭也凡先刺而後名者殺有罪也先名而後刺者殺無罪也楚人救衛三月丙午晉侯入曹執曹伯畀宋人侵而不服然後入之數其罪而執其君伯討也故以侯執不歸之京師而畀宋人則伯討歟闕文也是當曰畀宋人田不言田經成而亡之也曹衛嘗侵諸侯之田矣晉侯圖霸欲怒楚而求戰先軫乃為之謀使執曹君而歸諸侯之田晉侯於是侵曹數其不用僖負羈而乗軒者三百人奪所侵地以還諸侯宋與得焉畀之為言與也不曰與曰畀與者我物而歸之彼畀者彼物而受之我猶曰皇天用訓厥道付畀四方云爾葉子曰吾何以知畀宋人田為闕文歟楚之圍宋在二十七年之冬宋公孫固如晉告急是時宋公蓋在圍也及諸侯盟于宋蓋即宋之城外以為㑹宋公不與焉明年三月晉侯入曹執曹伯宋圍猶未解故再見宋使門尹般如晉師告急左氏載先軫始謀言我執曹君而分曹衛之田以賜宋人既而公説復言執曹伯分曹衛之田以畀宋人此其終事也楚子聞果命子玉去宋宋公于是始釋圍得歸而從晉城濮之戰始見宋師則方執曹伯畀之者誰乎晉侯有疾侯獳貨晉史歸曹伯則曹伯之歸蓋自晉不自宋也是其畀之者田而已穀梁固不見其事左氏見之而不能辨蓋不知侯執之為伯討也公羊雖知之而不悟其與京師楚同文亦求之經者不審爾夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績晉怒楚而與之戰故晉與諸侯之師及楚人言晉之主戰也楚何以言人得臣之師也城濮衛地楚殺其大夫得臣得臣楚大夫之再命者也城濮之役楚子命得臣還師而不從楚子不能制怒而少與之師晉侯戰而師遂敗得臣之死罪累上也故以國殺衛侯出奔楚衛侯何以不名非二君也楚敗衛侯懼而出奔使其大夫元咺奉母弟叔武受盟於晉叔武不正其為君而攝焉以内為未君故不名衛侯也五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土衛子者何叔武也叔武既不正其為君曰衛侯弟則既已攝其君矣曰衛侯則叔武未之敢君也故與之以未踰年君之辭而繫之子賢之也陳侯如㑹如㑹者何非前約而來從㑹也何以不言乞㑹前無拒㑹而後無乞㑹如則得之也何以不言㑹陳侯以疾返而不及㑹也不及㑹則何以書如㑹成其意也公朝于王所何言乎王所天子所在曰所古者天子無事諸侯來見于京師則朝于廟中天子巡守諸侯來朝于方岳之下則朝于王所何以書非常也晉侯既勝將合諸侯以尊王室遂為踐土之盟作王宫於衡雍王於是往而即焉何以不言王狩於踐土以王自往為見正也何以獨言公朝於王所朝者諸侯各自致於王非有所期而後聽之者也六月衛侯鄭自楚復歸于衛衛侯何以復名成叔武為君以惡衛侯也衛侯既命元咺奉叔武以受盟或訴元咺曰立叔武矣遂殺元咺之子及其歸也盟國人曰既盟之後行者無保其力居者無懼其罪衛侯先期入叔武聞君至喜而走出前驅公子􅞰犬華仲射而殺之故進叔武以為君而名衛侯曰自楚楚有奉焉爾何以言復歸歸順辭也君而復其國以其道則順也衛元咺出奔晉元咺衛大夫之三命者也陳侯欵卒秋杞伯姬來内女不言來此何以言來父母没矣伯姬不得來而來也公子遂如齊冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温天王狩于河陽狩者何天子適諸侯曰巡狩諸侯見天子曰述職巡狩者巡所守也何以書前以王之自往則不書今以晉侯召王而往則書蓋王以巡狩為之名也葉子曰吾何以知晉侯召王而王以狩為之名歟春秋有諱而為之辭者矣未有諱而變其實者也天王敗績於茅戎可以自敗見義不可以非敗而言敗也天王出居於鄭可以自出見義不可以非出而言出也使晉侯實召王而往春秋虚假之狩是加王以無實之名而免晉以當正之罪孰有如是而可為春秋乎此自左氏失之而公羊榖梁復謂再致天子故通文公以全天子之行則又非矣使天子而可致雖書而何諱使不可致一致固巳罪矣何再致而反通之乎天子之行不可以晉侯而苟全此春秋垂萬世之義也壬申公朝于王所前朝不言日蒙上癸丑見天子在焉諸侯即其所而朝也今朝言日見諸侯先㑹天子來狩而後朝也此因其日之可得而著者也何以不書月闕文也葉子曰吾何以知不書月之為闕文歟春秋不以日月為例吾固言之矣而其所謂闕文蓋有二焉有史失之而經不能益者有經成亡之而後世不敢益者故桓書五月而無夏昭書十二月而無冬有月而無時豈時不可推乎僖書壬申公朝于王所以上五月癸丑推之知其為十月而不書定書辛已葬定姒以上九月丁巳推之亦知其為十月而不書有日而無月豈月不可推乎以公羊榖梁言之可書而不書者皆義之所在也而二氏不能為之説榖梁但於僖壬申不書月以為晉文公致天子之罪其言亦已迂矣由是言之何日月例之云乎以為史失之則經固可推而益也而不推非經成而後亡之者歟吾意以日繫月以月繫時此史之常例有不得則闕之而傳春秋者以為非義之所在雖經之所見亦或略而遺之不然如是四者雖二氏且不能容其私豈後世可得而妄意之乎晉人執衛侯歸之于京師晉侯初伐衛衛侯請盟而晉不許故去奔楚而以叔武受盟晉侯雖治殺叔武之罪而衛有辭非伯討也故以人執何以言歸之于京師諸侯有罪霸主執而歸之京師正也執之當其罪則曰歸于執之不當其罪則曰歸之于之緩辭也不與其正之辭也古者君臣無獄元咺訟衛侯晉侯宥元咺而刖衛大夫鍼莊子殺士榮歸衛侯于京師是以不與其正也衛元咺自晉復歸于衛元咺何以言復歸大夫出奔而位已絶則不可以復歸者也歸而君復之則可自求復而歸則不可大夫之復歸惡也元咺訟衛侯而勝以文公之命歸而立公子瑕求復而歸者也何以曰歸歸易辭也有晉以為奉則其歸為易也諸侯遂圍許此㑹温之諸侯也何以不序前目而後凡也遂繼事之辭也曹伯襄復歸于曹曹未有君曹伯不名者也何以名不正其歸之不以道也曹伯執於晉而未釋晉侯有疾使其竪貨晉之筮史以脅晉侯晉侯於是釋曹伯以是為非歸之道也何以曰復歸歸順辭也君而復其國以其道則順也遂㑹諸侯圍許二十有九年春介葛盧來介附庸之國也葛盧介君之名也附庸之君以字見葛盧書名不滿三十里之國也來來朝也何以不言來朝公在㑹未見公也我接之云爾公至自圍許此㑹温也何以不致㑹而致圍許春秋之辭也以為晉侯召諸侯而㑹天子此不可以告宗廟者故歸而為之辭以見正也夏六月公㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉㑹左氏作㑹公羊榖梁作公㑹當從二傳公不恥㑹則不没公也翟泉王城之内也此王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憗何以皆稱人不正諸侯不自朝王而以陪臣請盟也晉召王使諸侯皆來朝則自行天子還京師諸侯當朝于王則以陪臣往受命以諸侯為無君故貶大夫而人之也諸侯貶則不以公為恥也秋大雨雹雨雹不志此何以志記災也害禾稼傷人畜也冬介葛盧來此既見公而朝也何以不言朝習於用夷不能朝也三十年春王正月夏狄侵齊秋衛殺其大夫元咺及公子瑕公子瑕衛大夫之三命者也元咺訟君而專立公子瑕以叔武也衛侯將復使賂其大夫曰苟能納我吾以爾為卿大夫於是殺元咺及瑕而衛侯入元咺之死罪累上也故以國殺瑕逾年之君也其曰公子瑕何瑕元咺之所立不與瑕之得成君則是猶公子也元咺立之則何以及公子瑕瑕不當受也為曹子臧吳延州來則免矣葉子曰春秋正名以定罪可謂審矣衛之事當議罪者四人焉晉侯也衛侯也元咺也公子瑕也晉侯以霸主逐人之兄而立其弟使骨肉更相殘衛侯始入則殺叔武再入則殺公子瑕暴戾而賊其親元咺以臣訟君君入則已出巳入則君出立公子瑕衛侯在不命於天子而受國于元咺與霸主則失諸侯與諸侯則失霸主與君則失臣與臣則失君而春秋未嘗容心焉執衛侯不以為伯討而晉侯之罪定矣復國特加之名而衛侯之罪定矣自晉歸以復書而元咺之罪定矣立踰年不稱君而公子瑕之罪定矣四者不相為乗除而君臣之義方伯諸侯之職無不各得其正此君子斷獄之道也衛侯鄭歸于衛衛侯何以不言復歸絶之不與其復也衛侯既已殺叔武矣再歸不以為非而又殺公子瑕以為無君之道雖有其位而不可復也何以名子瑕在焉也何以曰歸歸易辭也元咺死則衛侯之歸為易也葉子曰晉侯執曹伯歸於京師及其復也書曰曹伯歸自京師晉人執衛侯歸之于京師及其復也書曰衛侯鄭歸于衛而不曰歸自京師何哉曹伯伯討也諸侯將見子臧於王而立之子臧辭而奔於宋晉侯使曹人反子臧而歸其君天子許焉故子臧反而曹伯歸天子命之使君也衛侯非伯討也辭間固巳容之矣及晉侯使醫酖衛侯不果魯公為納玉於王與晉侯而後復焉雖曰命之非天子所以君諸侯之道也衛侯歸于衛而已京師天子之居也諸侯有奉曰自某歸于某自者諸侯所可為也歸者諸侯所不可為也自某歸而已天子有命曰歸自京師天子歸之而我自焉歸自京師者也衛侯命于天子而不得以京師言其為天子者亦病矣晉人秦人圍鄭介人侵蕭冬天王使宰周公來聘公子遂如京師遂如晉如曷以言遂疾不專於王也遂如京師拜周公之聘也曰因是而往聘晉焉非尊天子之道也大夫出疆固有以二事行者矣必再見名公子遂㑹晉趙盾盟于衡雍公子遂㑹雒戎盟于暴是也惟天子不可以二事故諱為之辭不再挈公子遂若大夫之專事然葉子曰吾何以知是為因之使聘歟大夫之罪有曰盟曰城曰入者矣聽於人則可盟兵在已則可城可入此遂而可得為者也内大夫如皆聘也必有禮焉非遂之所能為也蓋必受之於君而後施之於其國以為出疆之專則不可也葉氏春秋傳卷十
