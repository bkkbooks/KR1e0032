body:
  text: 葉氏春秋傳卷十九宋葉夢得撰昭公三三月公至自齊居于鄆公既失守其宗廟矣何以書至春秋之辭也公雖居外而義不敢以外公故猶以在國之禮書之也夏公圍成成孟氏之邑邑不言圍此何以言圍以公之不能得成也附於季氏齊侯謀納公梁丘據取申豐之貨請先卜於成故公以齊師伐成而不能克公既失國而假人之師以伐私邑故挈公焉病公也秋公㑹齊侯莒子邾子杞伯盟于鄟陵謀納公也邾莒魯之怨杞伯不能自立久矣而何盟焉著齊志也公至自㑹居于鄆九月庚申楚子居卒冬十月天王入于成周成周東周也尹氏召伯毛伯以王子朝奔楚三子與朝皆王之大夫也何以不言出周非大夫所得同出也故與王子瑕之辭一施之何以知其齊自周出也王猛卒于王城而尹氏立朝王城亦王國也以别於成周爾及敬王入於成周而三子以朝奔楚則其出固自周也葉子曰或曰禮天子不言出朝嘗立而君矣為其以不正非所得君也故春秋奪之不得與天王同辭是豈瑕之比歟非也君朝者誰乎尹氏也春秋固未嘗與之夫不見與於春秋何君之云是亦周之大夫爾天子不言出非君子之言也吾固論之矣二十有七年春公如齊公至自齊居于鄆夏四月吳弑其君僚稱國以弑衆弑君之辭也此闔廬之弑也何以言衆僚以篡立衆之所弃也楚殺其大夫郤宛郤宛楚大夫之三命者也宛暱費無極之䜛而求說於令尹囊瓦以其藏甲取賂譛之囊瓦信費氏䜛而殺宛盡滅郤氏族黨郤宛之死罪累上也故以國殺秋晉士鞅宋樂祁犁衛北宫喜曹人邾人滕人㑹于扈樂祁犁宋大夫之三命者也此謀納公也鄟陵之盟合三國而後不果今晉復合諸候之大夫而士鞅取貨於季氏脅宋衛亦無成然辭無所貶以公不能於季氏則未可責諸侯大夫之不能復公也葉子曰黃父之㑹大夫不貶所以正天子而有天下者也扈之㑹大夫不貶所以正諸侯而有一國者也冬十月曹伯午卒邾快來奔快邾大夫之三命者也公如齊公至自齊居于鄆二十有八年春王三月葬曹悼公公如晉次于乾侯乾侯晉地也次于乾侯待命于晉也公既不得於齊因扈之㑹故改而求之晉見公不得其所也夏四月丙戌鄭伯寧卒六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公二十有九年春公至自乾侯居于鄆齊侯使髙張來唁公髙張齊大夫之三命者也齊侯嘗唁公矣此何以復唁公以公求晉而不獲也非徒吾不能納晉亦不能納爾齊侯於是稱主君子家子曰齊卑君矣君祗辱焉公於是復如乾侯公如晉次于乾侯夏四月庚子叔詣卒秋七月冬十月鄆潰内未有言潰者此何以言潰見公之失民也始公出齊國人如釋重負公之居鄆齊侯命之鄆人未必欲也故公舍齊而適晉鄆人遂潰三十年春王正月公在乾侯鄆潰故公留于乾侯中國不言在言在存公也夏六月庚辰晉侯去疾卒秋八月葬晉頃公冬十有二月吳滅徐徐子章羽奔楚滅國不名内無君也徐子何以名賤之也吳子始伐徐防山而水其城徐子斷髪擕其妻子以逆吳子吳子為唁而送之使邇臣迫其後徐子乃奔以徐子為求服不獲而奔也三十有一年春王正月公在乾侯季孫意如㑹晉荀躒于適歴荀躒晉大夫之三命者也謀納公也意如身為惡晉欲納公而意如何謀焉著晉志也夏四月丁巳薛伯榖卒晉侯使荀躒唁公于乾侯晉侯嘗謀納公矣何以復唁公以季氏為不欲也葉子曰齊晉皆無意於納公者也夫諸侯失位自非得罪於其國而不能容則必有與之爭國而篡奪或權臣擅命而迫逐之也上無天子下無方伯既無以討其罪則諸侯力能正之則正之者義安得而不為乎故春秋凡納君而得其正者未嘗不與也頓子迫於陳而出奔楚人圍陳而納之春秋雖夷狄楚然猶書納頓子于頓蓋善之以勸諸侯之義也方昭公之時見逐於季氏苟明君臣之義者孰不欲加誅於意如而大國先於齊晉晉為霸主尤諸侯之所服而聼命者也使果有意於納公一興師而季氏無不服矣而公徬徨於陽州乾侯之間者八年齊一為鄟陵之盟而謀之於其怨與弱國晉一為適歴之㑹而謀之於其罪人中間雖晉合五國以㑹於扈而齊不與士鞅卒取魯貨而無成功晉侯不以為過也有意如不能問而徒取鄆圍成寄公於乾侯此豈其志哉故齊徒能使髙張來唁其不得見於晉晉徒能使荀躒來唁其不得入於魯不知其責皆在於己而莫之為也故春秋據其實而書之未嘗加之辭亦以為不待貶絶而自見者非特發齊魯之隠使不得欺於當時見昭公之暗且懦墮二國之計徃來迭求至死而弗悟雖無季氏固未可保其國者也秋葬薛獻公冬黒肱以濫來奔黑肱者何濫之黑肱也何以不言濫邾之别子非受封於天子者也十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞闞内邑也魯羣公墓之所在孰取之公取之也公在乾侯則何以取闞公以乾侯為不得其所故欲託於先公之墓以居也内邑則曷為謂之取以公不能自有其地猶取之外夏吳伐越秋七月冬仲孫何忌㑹晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周仲孫何忌吾大夫之三命者也韓不信仲幾世叔申國參晉宋衛鄭大夫之三命者也天子之都而諸侯城之正也諸侯不自城而使大夫城非正也何以無貶辭以大夫有勤王之心不可貶也大封天子合衆之禮也古者天子無城成周而城天王固已病矣諸侯無封城成周諸侯固已違矣然而王室亂天子不能城諸侯而不能共其事大夫而能共其役變之正也雖欲加之辭不可也何以不言京師宗周亦京師也葉子曰天下有道守在四夷域民不以封疆之界固國不以山谿之險王室烏在城而後固與嵗十一月土功興司徒詔民司空詔事雖宫室溝洫道路之政皆在王而有城未有壞而至於脩也王畿之内凡徒役之政家一人嵗三日功築不煩而民無所困其力城而有役未有勤民於民也然不幸而至於城諸侯不能共其事大夫不能共其役夫誰與王立者故義所可城城邢雖諸侯猶可况天子乎城楚丘雖遷而城猶可況不遷乎吾是以知其為變之正而通乎大夫之城者春秋之義也乃天王之病則自若矣十有二月己未公薨于乾侯定公一元年春王何以不書正月元年正月所以正始也定之立不以正則其始不得為正也定公昭公之弟也昭公薨季孫意如廢大子公衍而立定公定公蓋受國於季氏非受國於昭公也國不受於先君而受於權臣非正也大子不得位而弟得位亦非正也元年者定公之年也定公以六月即位而得稱元年稱年者不以月元可與也月者元年之月也可以其始稱元不可以其始稱正正不可與也葉子曰舜避堯之子三年然後踐天子位方其格文祖曰月正而不言正月未踐位則不可言正月也武王伐紂二月而後克方其渡孟津曰一月而不言正月其未克紂則不可言正月也夫正之不可易如此雖舜之未得位武王之未得國且猶不敢稱而況於定公乎如是而後知天子諸侯不可輕以其位與人人亦不可輕受其位於天子諸侯雖有大臣亦不可以其權而輕予奪其君故以定公一見法焉三月晉人執宋仲幾于京師此大夫之執也何以與霸主之辭一施之以霸主之令執也以霸主之令而執則何以言晉人役在王都仲幾不受功而執之不以歸之天子而歸霸主三月而後返諸京師非伯討也故以人執夏六月癸亥公之喪至自乾侯公薨于乾侯非正也故辭閒容之之緩辭也不與其正之辭也戊辰公即位諸侯薨五日而殯正棺乎兩楹之間而後即位者喪次之嗣位也不書踰年以其正月朔即位者朝廟之君位也書而不日昭公薨至是踰年矣不嫌於一年二君則不必待踰年而即君位自癸亥至戊辰歴五日殯之節也曠年不可以無君則以喪次之嗣位遂正朝廟之君位者變之正也故特書日秋七月癸巳葬我君昭公九月大雩立煬官煬宫者何煬公之宫也煬公伯禽之子廟已毁矣毁而復立非禮也冬十月隕霜殺菽記異且災也建酉之月而隕霜固異矣又殺菽焉不言草殺草不為災也二年春王正月夏五月壬辰雉門及兩觀災以雉門及兩觀災自雉門始也禮天子有兩觀諸侯有臺門魯何以有兩觀周公之賜也秋楚人伐吳冬十月新作雉門及兩觀何以言新作有加其度也禮天子之門制路門不容乘車之五个應門二徹三个魯雖得有庫門雉門以天子臯門應門而為之也新作雉門及兩觀豈有因災而僭天子者歟故與南門之辭一施之子家駒言魯僭天子之禮曰設兩觀設之為言有為為之也三年春王正月公如晉至河乃復二月辛卯邾子穿卒夏四月秋葬邾莊公冬仲孫何忌及邾子盟于拔四年春王二月癸巳陳侯吳卒三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之公孫姓蔡大夫之三命者也沈楚之與國也故晉以不㑹召陵而討焉然以蔡怨楚因使伐沈蔡遂滅沈而殺其君非道也是以沈子先名而後言殺之之緩辭也不與其正之辭也五月公及諸侯盟于臯鼬諸侯何以不序不足序也楚囊瓦有美裘之怨於蔡侯止蔡侯於南郢不歸者三年晉以蔡侯之請合十八國之諸侯㑹于召陵以侵楚天子以王臣臨之荀寅求貨於蔡侯弗得而辭諸侯固已失矣故公再合諸侯而為此盟後亦無聞焉蔡侯於是求於吳而吳入郢中國無能為而後勾呉得以致其功以諸侯為不足序也杞伯成卒于㑹六月葬陳惠公許遷于容城秋七月公至自㑹劉卷卒劉卷者何劉子也外大夫不卒此何以卒嘗主㑹以臨我天子為之赴而我喪之也何以不言爵寰内諸侯不言爵不得以爵見也葬杞悼公楚人圍蔡晉士鞅衛孔圉帥師伐鮮虞孔圉衛大夫之三命者也葬劉文公卷何以稱公主人之辭也古者卿六命賜官故卿得臣其邑大夫不得臣其邑得臣其邑則言公不得臣其邑則言主公者君也故曰大夫不稱君冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績蔡以楚圍請救於吳吳子為之興師故以蔡侯吳子及楚人言蔡之主戰也吳何以稱子進之也召陵之㑹臯鼬之盟諸侯既無能為吳子能為之出師一戰而復楚讎則中國之不若也其曰蔡侯以吳子何言吳子之為蔡用也此楚囊瓦之師也何以稱楚人貶而人之曰是拘蔡侯者也楚囊瓦出奔鄭囊瓦楚大夫之三命者也庚辰吳入郢吳何以復稱國甚惡之也吳既入郢以班處于楚王之宫君居其君之寢而妻其君之妻大夫居其大夫之寢而妻其大夫之妻蓋有欲妻楚王之母者也何以不言楚既惡之矣不使得與諸侯入國之辭同故不以楚與之是入郢而已五年春王三月辛亥朔日有食之夏歸粟于蔡孰歸之我歸之也我何以歸粟於蔡蔡圍於楚而饑諸侯相與共歸之也諸侯歸之則何以獨言我救災恤患諸侯之道人得自爲者也於越入吳於越者何越之自名者也名從主人六月丙申季孫意如卒葉子曰學者言春秋内大夫弑君皆貶不書卒是以公子翬不書卒仲遂卒有為而書之也故以意如書卒為正其為定公之大夫以見定公不討賊而賞私勞吾以為不然弑君之賊以為君貶之而不卒邪則桓公與翬同惡者也桓公既以弑立而進翬為三命稱公子其為大夫可知矣安有生以爲大夫而死反追其罪不以大夫卒之乎以為春秋貶之而不卒邪則翬進三命之大夫尚不以進桓而書卒意如之為大夫當從先君而不革乃反責之爲大夫而卒之乎二義皆無當春秋不輕以弑加人昭公雖以意如逐君而死於外正以爲弑則春秋冝有别矣楚公子比從弃疾之立靈王縊而死以公子比主弑蓋靈公之死由比也今昭公不以逐而死不得其正謂意如為弑可乎然則翬弑而春秋無貶文以桓公主弑也遂弑而春秋無貶文以宣公主弑也貶翬遂則桓宣得以免矣意如之罪異於二人春秋於昭公書季孫意如固不待貶絶而自見稔其惡定公而不書正月所以誅意如者已盡而定公終身不得爲正其貶之亦孰大於是則治定公與意如者不在其卒意如也秋七月壬子叔孫不敢卒叔孫不敢吾大夫之三命者也冬晉士鞅帥師圍鮮虞六年春王正月癸亥鄭游速帥師滅許以許男斯歸游速鄭大夫之三命者也二月公侵鄭公至自侵鄭夏季孫斯仲孫何忌如晉季孫斯吾大夫之三命者也使舉上客季孫斯仲孫何忌何以並見非使介也以二卿並出也聘則何以使二卿出非常聘也為陽虎請已也陽虎欲作亂謀殺三桓取魯國囚季孫斯獻鄭俘强使仲孫何忌報夫人之幣與之俱以爲後圖於是何忌謂范鞅曰陽虎若不能居魯而息肩於晉所不以為中軍司馬者有如先君季孫斯蓋畏虎而不能止也秋晉人執宋行人樂祁犁祁犁使晉嘗主於范鞅及是趙簡子逆而飲之酒范氏趙氏方交惡范鞅怒以其私告於晉侯曰祁犁以君命越疆而使未致而私飲酒於趙氏不敬二君乃執之非伯討也故以人執冬城中城中城公宮之城也三家既張公懼於為亂故脩中城以備之不正其脅於疆臣而自固也季孫斯仲孫忌帥師圍鄆鄆内邑也不言圍此何以言圍以公之不能得鄆也其事則史失之矣其曰仲孫忌者何仲孫何忌也不曰何忌闕文也七年春王正月夏四月秋齊侯鄭伯盟于鹹齊人執衛行人北宮結以侵衛北宮結衛大夫之三命者也鹹之㑹齊侯召衛侯衛侯欲叛晉而事齊諸大夫不可衛侯乃使北宮結使齊私齊侯曰執結以侵我大夫則從矣齊侯於是執結以侵衛非伯討也故以人執齊侯衛侯盟于沙大雩齊國夏帥師伐我西鄙國夏齊大夫之三命者也九月大雩冬十月八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊曹伯露卒夏齊國夏帥師伐我西鄙公㑹晉師于瓦公至自瓦秋七月戊辰陳侯柳卒晉士鞅帥師侵鄭遂侵衛葬曹靖公九月葬陳懷公季孫斯仲孫何忌帥師侵衛冬衛侯鄭伯盟于曲濮從祀先公從者何順也古者謂從為順橫為逆先公者何閔公也孰祀之陽虎也文公躋僖公以先閔公魯人以為逆祀陽虎欲去三桓而代之故順祀閔公僖公以求說於魯人何以不言陽虎不與陽虎得主宗廟也禘則何以謂之祀禘非陽虎之所得為也閔公則何以謂之先公閔公非陽虎之所得正也是非爲宗廟之禮者曰從祀先公云爾盗竊寶玉大弓寶玉大弓者何夏后氏之璜封父之繁弱魯之分器也古者天子分寶玉于同姓之邦時庸展親諸侯分守之以爲寶焉盜者何陽虎也陽虎何以謂之盜取非其有也陽虎欲誅季氏不克故如公宮取寶玉大弓以奔齊何以書天子之命器也九年春王正月夏四月戊申鄭伯蠆卒得寶玉大弓得者何不求而獲也惡得之陽虎歸諸堤下而得之也何以不目堤下大寶玉大弓也失之書得之書所以爲重者不在地也六月葬鄭獻公秋齊侯衛侯次于五氏秦伯卒冬葬秦哀公十年春王三月及齊平夏公㑹齊侯于夾谷公至自夾谷晉趙鞅帥師圍衛齊人來歸鄆讙龜隂田鄆前見圍蓋叛而附齊矣讙陽虎之邑虎挾之以入齊龜隂龜山之隂也三田皆齊之所侵既與我故會而復歸之何以書善公之有以得齊也葉子曰三田之歸左氏榖梁皆謂孔子相夾谷之㑹退萊兵而齊人以謝過非也夾谷之事匹夫之勇智者所不為而謂孔子為之乎始齊以國夏帥師伐我我執而侵之者再自是遂不復交兵及陽虎叛而奔齊請師以伐曰三加必取之齊侯以鮑國之言而止遂執陽虎是時晉政已衰平公不能主諸侯故公德齊叛晉而與之平則齊魯固相與為好矣是以夾谷㑹而不盟使齊果有意於得魯則方陽虎之奔因之可以乘其間何舍是不為而反僥倖一旦之勝乎孔子在齊十餘年景公欲以尼谿田封之晏子止焉齊大夫蓋有欲害孔子者則齊之君臣固不足以知孔子使其知之必不肯以裔夷之俘行其詐使其不知則何畏乎一言而為之退乎公羊曰孔子行乎季孫三月不違齊人爲是來歸之吾以此言為猶近孔子之用於魯蓋未嘗得盡行其志也使孔子而得盡行其志其為魯者心有道矣何必危其身以要人之所不可必其曰歴階而上不盡一等而視歸乎齊侯與夫優施手足異門而出者皆戰國刺客假之以藉口如言曹沫者曹沫之事尚不足信而況於孔子二氏不能辨蓋欲尊孔子而反卑之也叔孫州仇仲孫何忌帥師圍郈叔孫州仇吾大夫之三命者也郈叔孫氏之邑也邑不言圍此何以言圍以公之不能正郈也叔孫成子初欲立武叔公若藐固諫不可武叔立以公若為郈宰而使侯犯殺之弗能其圉人殺公若侯犯以郈叛於齊有叔孫氏之彊而後南蒯得以肆其惡以國為有政焉則不至於是也秋叔孫州仇仲孫何忌帥師圍郈宋樂大心出奔曹宋公子地出奔陳公子地宋大夫之三命者也冬齊侯衛侯鄭游速㑹于安甫叔孫州仇如齊宋公之弟辰暨仲佗石彄出奔陳辰景公之母弟也仲佗石彄宋大夫之三命者也暨强也景公嬖桓魋而與其母兄公子地爭辰教地使出奔避公以爲禮而公弗止辰爲之請而公弗聽辰曰是我欺其兄也乃強仲佗石彄奔陳以要公以景公爲不能兄也故目弟十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛蕭宋邑也辰自陳入于蕭將以正桓魋也仲佗石彄與公子地從辰入蕭則非強也故言及何以言叛要君也其猶以弟目之宋公之爲也夏四月秋宋樂大心自曹入于蕭何以不言叛從叛人則叛可知矣冬及鄭平叔還如鄭涖盟叔還吾大夫之三命者也十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈墮者何毁其城也葉子曰左氏言仲由爲季氏宰將墮三都然歟非也三家之强久矣昭公欲殺季氏無以爲之謀至於失國春秋未嘗與焉今仲由陪臣而季氏之隸也夫安得墮其主邑而併二都得以治之乎或以爲孔子爲政於魯而以命仲由方是時三家猶彊孔子雖爲司宼而未嘗得行其志正使爲之亦有道矣何至以家臣謀其主反使不服而犯上此豈孔子之術哉以吾考之自陽虎叛季孫氏叔孫氏皆屈於家臣故南蒯不得意於意如則以費叛侯犯不得意於州仇則以郈叛墮郈墮費二氏自爲計而欲去其險爾是以郈帥師主州仇費帥師主斯公山不狃叔孫輙帥費人襲魯蓋懼二氏之討已而先之夫何有於仲由此亦尊孔子而反卑之者也葉氏春秋傳卷十九
