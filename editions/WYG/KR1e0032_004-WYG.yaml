body:
  text: 葉氏春秋傳卷四宋葉夢得撰桓公二螽記災也凡螽與雩同書以時書者皆志秋以月書者皆志八月九月十月害稼也書以時者其災長書以月者其災短以其十二月書者失蟄也冬州公如曹州公寰内諸侯王之上大夫也天子三公曰公嘗為公而食其邑者亦曰公州公嘗為公而食其邑者也外相如不書此何以書貳君也外此則無貳君乎過我也為天子之公而外交於諸侯以為無君則可矣是以因其過我而一正之也六年春正月寔來寔王之中士也來來朝也何以不書朝不正其得外交故不書朝與祭伯之辭一施之也葉子曰三傳皆以是為簡州公之辭夫州公既冬過我則來矣何至春而始書乎或曰州公以冬過我以春來朝若是則當如晉侯侵曹晉侯伐衛異事而複重不可以蒙上文如劉夏石尚以上士三命書名氏王人以下士一命略名氏則中士再命書名而不氏固其所也諸侯再命之大夫如無駭挾以卒見柔以伐見溺以㑹見呉札秦術楚椒以聘見鄭宛莒慶以其事見春秋之通例也何獨至於王士而疑之乎夏四月公㑹紀侯于成秋八月壬午大閱大閱者何冬習武事之名也何以書冬事而夏興之不時也且畏鄭云何以不書田其所志者習武事也蔡人殺陳佗稱人以殺討罪之辭也臣弑君在官者殺無赦以為國人則皆得討之矣佗陳賊也蔡人何以亦得殺春秋之義也惡加於君親者天下之所共絶不必國人而後行之也故蔡殺陳佗得書楚殺夏徵舒得書踰年之君稱爵佗立踰年矣何以不稱爵不成其為君也齊公子商人弑其君舍舍未踰年之君也而成之為君不成其為君然後佗可得與其殺成其為君然後商人可得正其弑九月丁夘子同生同莊公之名也嫡長也禮世子生接以大牢卜士負之士妻食之三月夫人以見於阼階而君親名之以告於太宰書而藏曰某年某月某日某生非世子皆降一等見於外寢而名以有司所以正嫡也舉之以禮則書不以禮則不書所以重嫡也不曰世子未誓於天子也冬紀侯來朝七年春二月己亥焚咸丘咸丘内邑也古者以季春出火季秋納火有田事則焚萊凡國失火野焚萊則有刑罰二月建丑之月也火未出而出曰焚咸丘火失其禁而遂以害其邑也其失火歟其焚萊歟災先言所而後言所災天火也見其火而已焚先言焚而後言所焚人火也有焚之者也葉子曰廐焚孔子退朝曰傷人乎不問馬鄉人為火來者拜之以為相弔之道焉咸丘焚固春秋之所重也夏榖伯綏來朝鄧侯吾離來朝榖伯鄧侯失地之君也諸侯失地以奔來者書以奔以朝來者書以朝失地則何以能朝猶不失其為君者也古者謂是為寄公或曰寓公寓公諸侯分地處之而不臣為其所寓君服齊衰三月何以名内有君也何以再書來朝殊見也八年春正月己夘烝烝夏之冬祭也宗廟四時之祭春曰祠夏曰禴秋曰嘗冬曰烝建子烝節矣何以書為桓公也桓棄父之命簒兄之位盖無辭以見宗廟既取郜鼎納太廟矣復以五月烝踰冬而廢祠八月嘗先秋而廢禴是豈以祭祀為嚴哉其意若曰吾釋其薄而用其厚祖考其說乎君子是以為誣雖祭而時猶不敬焉曰求豐而已矣葉子曰禴祠烝嘗于公先王周人之詩也周之先祖所以事其先公先王者雖亦以是四名不曰吉蠲為饎是用孝享者乎祭莫厚於烝嘗莫薄於祠禴先王因其時而並脩之未之有擇也豈必其厚者以為孝哉而桓公之祭見烝而廢祠見嘗而廢禴曰吾惟享而已矣豈其先祖所謂吉蠲者哉故烝而又烝君子察其重者而著焉易曰東隣殺牛不如西隣之禴祭實受其福桓公無以受其福矣天王使家父來聘家父王之下大夫也夏五月丁丑烝秋伐邾不言主帥内之微者也冬十月雨雪雨雪不志此何以志建酉之月也祭公來遂逆王后于紀祭公寰内諸侯王之上大夫也來來朝也祭公則何以來朝于我天子使我主紀婚祭公逆王后過我而朝也天子逆后以卿而公臨之祭公逆后固非矣内諸侯不外交祭公來朝於我亦非也故祭伯書來寔書來祭公書來逆王后則何以言遂祭公受命徃逆后過我朝而後王亦非也故以繼事之辭書焉遂繼事也齊伐楚侵蔡而後伐可侵蔡所以伐楚也祭公逆后朝我而後逆不可朝我非以逆后也九年春紀季姜歸于京師稱王后矣何以復曰季姜父母之辭也王者無外命之斯成后矣故逆曰王后未廟見父母未敢成之為后雖貴以配天子猶曰吾季姜云爾故歸仍稱季姜京師衆大之辭也京大也師衆也不敢斥天子之名曰是天下莫衆且大焉者也夏四月秋七月冬曹伯使其世子射姑來朝曹伯何以使世子來朝攝也禮諸侯之嫡子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男朝天子之節也朝天子有時有故不能朝則攝諸侯無相朝之道射姑而攝朝是仇天子之禮於諸侯也十年春王正月庚申曹伯終生卒夏五月葬曹桓公秋公㑹衛侯于桃丘弗遇桃丘衛地也㑹兩相期也晉納捷菑而中已曰弗克納弗彼可得而我不欲之辭也宣公葬敬嬴而雨曰不克葬不我欲之而彼不得之辭也衛與我期外我而不至我為恥矣故書弗遇若我不欲見然殺恥也沙隨之㑹晉以僑如愬拒公而不見非我所恥矣故書不見公正彼之不見不恥也冬十有二月丙午齊侯衛侯鄭伯來戰于郎内言戰敗之辭也何以不曰及齊侯衛侯鄭伯戰于郎外為志也魯以周班後鄭而鄭來伐然命魯者實齊也齊於是不能正又為之出兵而衛亦佐焉二國之罪有大於鄭者故不以鄭主兵而變其文曰來來聘來盟來歸來奔可矣未有戰而可來者是以君子之惡戰也十有一年春正月齊人衛人鄭人盟于惡曹三國何以稱人大夫貶而人者也大夫則何以貶正大夫之始盟也大夫交政於中國自是其强矣故於始焉一貶之葉子曰惡曹之盟三傳皆不著其事而先儒有為貶大夫之始盟者吾何以信其言哉前乎此有以諸侯而盟者矣未有大夫而盟者也後乎此有以大夫而盟者矣未有人而盟者也人而盟惟此與鹿上兩見爾鹿上執宋公而貶諸侯者也春秋謹名惟稱人為多義各主其事以别之微者稱人與衆稱人貶諸侯及大夫稱人此其大法也微者之盟不志既不得目微者以為衆則不可貶諸侯則無事非大夫而誰歟大夫之同盟衆矣其皆稱人者惟清丘一見左氏以為貶晉原縠宋華椒衛孔達然則惡曹清丘其罪同春秋固正其法而一施之者也是以雞澤書叔孫豹及諸侯之大夫及陳袁僑盟君命之也溴梁書大夫盟君在而大夫自為盟也各原其事而為之辭矣則大夫之盟始於此宜於是焉而正之也故曰大夫之盟始惡曹大夫之㑹始北杏大夫之同盟始清丘皆貶而稱人是春秋之㫖也夏五月癸未鄭伯寤生卒秋七月葬鄭莊公九月宋人執鄭祭仲祭仲鄭大夫之嘗入為王卿士而復其國者也拘而討罪曰執以伯討者稱君不以伯討者稱人以行人執者稱行人不以行人執者不稱行人祭仲非行人也鄭忽立宋莊公欲私其出突執仲使廢忽而立突不得為伯討也故以人執為人臣而專廢置君祭仲何以不貶言突歸於鄭則仲之惡不待貶絶而自見也葉子曰吾何以知仲嘗入為王卿士歟古者諸侯無四命之大夫惟王大夫四命以字見春秋諸侯大夫以字見經者三宋孔父二王之後得備官也魯夷伯陳原仲死而君不名之也非備官而生見字惟鄭祭仲陳女叔爾盖天子之命官初不别内外惟賢而有功徳者則為之故諸侯而入為王卿士者鄭武公父子為司徒是也諸侯大夫入為卿士雖不著於經而可以類見鄭武公以伯為司徒其適周則復國而卒固當仍書鄭伯乃大夫則有加命矣是不得不與王大夫同書字也突歸于鄭歸易辭也突鄭莊公之庶子自宋入而取國挈乎祭仲而易也不繋鄭不與其得鄭也凡諸侯及大夫去國歸以其道而順者曰歸雖非其道而無難之者亦曰歸歸順辭也亦易辭也歸非其道而逆者曰入雖以道而有難之者亦曰入入逆辭也亦難辭也鄭忽出奔衛諸侯失國曰出奔大夫失位曰出奔諸侯有國而國人所尊者也大夫有位而國人所禮者也諸侯不能有其國棄其宗廟社稷而至於出不見尊於國人去之不以道而至於奔其亦不足以君矣故雖有迫逐之者未必皆其罪而與大夫之辭一施之所以重君也此鄭伯也何以不言爵未踰年也未踰年則何以不稱子不周乎喪也何以名别二君也葉子曰諸侯在喪之稱吾既言之矣一年不可以二君故未踰年之君未葬皆不以爵見内稱子其子般子野卒外稱子宋襄公以宋子㑹于葵丘陳懐公以陳子㑹于召陵是也未踰年雖既葬内亦稱子不名子赤卒稱子卒外亦稱子衛成公以衛子㑹盟于洮是也曠年不可以無君故踰年之君既葬稱爵鄭厲公以鄭伯㑹武父是也雖未葬亦稱爵衛恵公以衛侯㑹諸侯及魯戰宋共公以宋公㑹諸侯伐鄭是也未踰年而有事於諸侯不周乎喪而用吉禮則稱爵以見貶齊頃公以齊侯使國佐來聘鄭悼公以鄭伯伐許邾隠公以邾子盟于拔是也未踰年見廹逐不周乎喪而出奔則奪其子以見貶鄭忽出奔衛是也踰年見廹逐不周乎喪而出奔則奪其爵以見貶曹羈出奔陳莒展輿出奔吴是也聘伐盟㑹雖有貳事猶云可也故如其意書爵以著其實而已三年之喪人子所以盡其愛於其父母者也去而之他彼受於其父者且不得有何有於哭泣之哀祭祀之思乎故子而不能子則奪其子君而不能君則奪其爵春秋之義也至於名則凡出奔者皆書焉盖廹逐者必有與之争國者也内亦一君也外亦一君也不名則無以為辨故國滅而奔不名譚子奔莒弦子奔黄温子奔衛是也奔雖有君不自居而攝亦不名衛侯出奔楚是也皆内無君者也然則名固所以别二君也而先儒乃謂諸侯不生名失地滅同姓則名之殆見其文而不知其說也夫失地說以出奔著其罪矣而且名焉是一罪而再貶非春秋之法記禮者之失也柔㑹宋公陳侯蔡叔盟于折柔吾大夫之再命者也蔡叔蔡侯之弟也叔字也蔡叔何以得字賢之也葉子曰吾何以知蔡叔之為賢歟凡諸侯兄弟尊之則稱公子故大夫三命以氏見公子之尊視大夫亦三命而後氏也親之則稱兄弟故或奔亡而責以恩或盟聘而譏以私則稱兄弟也其不以公子兄弟見者惟許叔紀季蔡季與此而四爾四人之事雖不盡見於傳以紀季許叔之事推之則非賢無以得字也蔡季為國逆而國人嘉之雖未嘗為君然雍容進退於封人之際如何休所言是亦賢也蔡叔以類考其必有取於春秋者歟諸侯大夫㑹盟非其君命未嘗不見貶溴梁書大夫盟是也其不見貶者皆受之於君也此為封人之㑹方是時封人無以君其國雖蔡季且避其害而出奔而蔡叔乃能將君命以㑹諸侯自是訖獻舞敗于荆諸侯無加兵於蔡者十六年意者蔡叔之為政或有以為之圖而傳失之歟公㑹宋公于夫鍾冬十有二月公㑹宋公于闞十有二年春正月夏六月壬寅公㑹杞侯莒子盟于曲池秋七月丁亥公㑹宋公燕人盟于榖丘燕南燕也人微者也八月壬辰陳侯躍卒公㑹宋公于虚冬十有一月公㑹宋公于龜公始以柔㑹宋未㡬復自㑹于夫鍾于闞于榖丘夫鍾郕地闞魯地榖丘宋地也公之求于宋亟矣及是復㑹于虚于龜虚龜皆宋地而公即之公之求于宋益亟矣盖自隠以來我之相與為厚薄者惟宋與鄭黨鄭則伐宋善宋則伐鄭至郎之戰懼鄭之謀已故亟於求宋宋得其情而虚龜之㑹遂辭平公無望於宋矣則反而求鄭以為武父之盟而成伐宋之役明年再㑹又明年復㑹其求於鄭者亦如是其亟鄭適有突之亂知其不足恃乃復從宋而伐之孰有立國如是而可久者乎暴戾則無親失道則寡援君子是以知桓之不終也葉子曰是在周易所謂莫益之或擊之立心勿恒凶者歟孔子傳之曰君子安其身而後動易其心而後語定其交而後求春無冰記異也不書日蒙上文水以孟冬始氷仲冬壯季冬盛二之日鑿氷沖沖壯也凡書以時者志春書以月者志正月二月春包三月也時不志冬始氷則或未氷也春不志三月以解凍則不氷也夏五不書月闕也經成而後亡也鄭伯使其弟語來盟秋八月壬申御廩災御廩藉田之所藏也古者奉天地宗廟天子親耕千畝諸侯百畝以供粢盛廩於藉之東南鍾而藏之大祭祀則廩人供焉御廩災書重神事也凡天火曰災人火曰火乙亥嘗不書月蒙上文嘗秋事建未之月嘗失時也冬十有二月丁巳齊侯祿父卒宋人以齊人蔡人衛人陳人伐鄭伐何以言以已不能敵而假人以為用也伐者討罪之辭也伐不服必至於戰戰伐自諸侯出固罪矣況假人乎諸侯有不協上請於天子則有天子之師下請於方伯則有方伯之師正也徳不足服於人而以人義不可服於人而為人所以是謂以私濟私皆失政也四國何以皆稱人微者也時齊侯卒矣而未葬齊非君則三國亦非君也宋公何以稱人貶也殘人之宗廟以大宫之椽為盧門之椽君子以為與吳入郢者何擇故吳子與國宋公稱人其罪一也葉子曰魯有齊怨而以楚師先書公子遂乞師於楚而魯之師無見焉已不能敵人也蔡有楚怨而以吳子後書吳入郢而蔡之入無聞焉假人以為用也此春秋之義也十有五年春二月天王使家父來求車求取不足於人也天子有賜無求諸侯有貢無與古者邦國九貢車有器貢用有貨貢諸侯不貢而伐之正也不能伐之又從而求焉器不足而求車用不足而求金以是居人上非所以王天下也三月乙未天王崩夏四月己巳葬齊僖公五月鄭伯突出奔蔡鄭世子忽復歸于鄭忽何以稱世子言子則喪已除言爵則雖踰年而不居位與之以君存之稱所以别于突而明正也何以言復歸凡諸侯出奔言復歸諸侯世國者也雖失位而不可絶歸則復矣大夫出奔言歸大夫不世官者也去位則絶矣故諸侯無歸大夫無復歸諸侯而言歸者與其復而奪之也衛侯鄭歸于衛是也大夫而言復歸者有挾而復不正其歸也衛元咺自晉復歸于衛是也葉子曰世子君在之稱也春秋有君薨而稱世子者三鄭世子忽正其為世也衛世子蒯聵辨其當世也蔡世子有與其能世也天下莫大於名分事在名則正名以定其實事不在名則假名以正其實春秋之義也許叔入于許許叔許男之弟也叔字也許叔何以得字賢之也鄭莊公入許奉許叔居東偏以其大夫公孫獲居西偏鄭亂許叔乗之以復其國幽之盟許男遂見焉許君失之許叔復之君子以是為賢也何以不言許男得國而未君也蔡侯廬陳侯吳得稱爵王命復之則君也許叔未受命可以復許未可以君許必君命而後得爵也何以言入難也國已分矣乗人之亂而幸得焉其復之道為難也公㑹齊侯于艾邾人牟人葛人來朝累數旅見也滕薛以兩國旅見累數之則貶矣邾牟葛以三國旅見且桓公非所朝也累數不足見貶故皆人之秋九月鄭伯突入于櫟櫟鄭邑也何以不言入鄭未得鄭也何以不言歸難也突之奔蔡欲殺祭仲而不果及是祭仲之援絶矣其歸之道為難也諸侯雖入其封内而未得國則不名未正其為君也衛侯入於夷儀是也突何以名疾之也非諸侯之所納非國人之所逆因櫟人殺其大夫檀伯而竊居之以是而求復國雖曰盜可也冬十有一月公㑹宋公衛侯陳侯于袲伐鄭袲宋地也此伐忽以納突也突入櫟而未得鄭諸侯㑹而納焉㑹而伐不言地此何以地疑也忽正而突不正故諸侯以為疑先㑹於袲而後伐之非㑹伐也疑而相與謀也卒弗克納而還則亦不果於納也十有六年春正月公㑹宋公蔡侯衛侯于曹夏四月公㑹宋公衛侯陳侯蔡侯伐鄭此復以納突也宋前以突背已㑹齊蔡衛侯四國之師以伐之雖殘其宗廟而不以為過不五月突奔而忽歸乃復合衛陳蔡三國之君而納突此宋公馮之所為也馮前黨於衛州吁而伐鄭今復黨於突而逐忽三國亦靡然從之而不敢違莫惡於弑而馮與黨莫悖於弑而馮與納此亦不待貶絶而罪自見也葉子曰鄭忽自是不復見矣忽弑與子亹子儀之弑終於突復立皆不見於經而出其東門國風獨著之或者以為春秋有所絶而不書非也春秋據魯史鄭亂不以告則魯不得書於䇿魯史所無有則春秋安得而見哉春秋因人以見法不求備於史而著其人故曰其事則齊桓晉文其文則史而左氏間見經所無之事者非魯史也盖參取他國之史而傳之學者不悟因謂春秋有所擇焉而妄為之說者左氏誤之也秋七月公至自伐鄭冬城向不時也十有一月衛侯朔出奔齊十有七年春正月丙辰公㑹齊侯紀侯盟于黄二月丙午公㑹邾儀父盟于趡夏五月丙午及齊師戰于奚六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡蔡季蔡侯之弟也季字也蔡季何以得字賢之也蔡封人卒蔡人召季於陳陳人歸之蔡人嘉之君子以是為賢也凡外有奉曰自某歸于某葉子曰吾何以知蔡季之為賢歟春秋大夫言自而歸者二宋華元自晉歸于宋衛孫林父自晉歸于衛是也公子言自而歸者二陳侯之弟黄自楚歸于陳楚公子比自晉歸于楚是也然其先必見奔故華元書出奔孫林父書出奔黄書出奔比書出奔惟蔡季見歸不見奔夫奔之為言惡也皆非以道去其國者魯公子友書季子來歸而不見奔魯公子之奔未有不書於䇿者也盖以非其罪有不得已而出故君子特變其文曰季子來歸志魯人之喜也蔡季處於封人獻舞之間亦難乎其免矣公子無去國之道而出不言奔其還則蔡人召之進退必有類於魯友歟何休以季為封人之弟封人無子而季當立封人欲立獻舞疾害季季避之陳返而奔其䘮思慕三年無怨心其言略與左氏合雖無所經見而有近乎春秋也癸已葬蔡桓侯桓侯何以不稱公罪臣子也葬者臣子之終事疾其君不以主人之辭稱焉君子以為不臣也葉子曰五等諸侯臣子皆得稱公吾固言之矣古者大夫卒將葬必請其易名者於君而後君誄之諸侯卒將葬必請其易名者於王而後王誄之周道也王誄而賜之諡則各以其爵而臣子必加之於所稱以示其尊焉主人之辭也然春秋之世有君失其君而不得稱者齊商人弑舍公子元不順其正終不曰公曰夫已氏此周之末造也桓侯封人也有季之賢而不能立乃以與獻舞或者蔡人以是罪之歟乃衛人不君宣公而刺之以籧篨戚施鄭人不君昭公而刺之以狡童君子不以為甚而載之國風以國人刺之風其上則可以臣子貶之奪其君則不可春秋所以不懲不恪也古之人盖有知其說者而不能盡或者乃反以為與其正是未知諸侯得稱公之義也葉氏春秋傳卷四
