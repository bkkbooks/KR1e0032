body:
  text: 葉氏春秋傳卷三宋葉夢得撰隱公三十一年春滕侯薛侯來朝朝諸侯見於天子之禮也諸侯不得相朝侯而更相朝固僭矣而又旅見亦天子之禮也故纍數之以公為僭之中又有僭焉者也葉子曰吾何以知諸侯之不得相朝歟禮莫大於君臣辨君臣之分莫嚴於朝故一嵗而以時來見者四六年而以服來朝者五天子所以一天下也朝覲宗遇會同皆朝之名既命之曰朝以其先者為主也朝之為言天子當寧而立諸公東面諸侯西面曽何取於諸侯之庭哉乃諸侯有入其國假道而過焉者謂之邦交於是有兩君相見之好是故諸侯有兩君相見之好無兩君相朝之禮至春秋而先王之制亡矣有言諸侯間於天子之事則相朝者有言小國之免於大國朝而獻功者有言先王制諸侯五年四王一相朝者有言明王之制諸侯五嵗而朝者此周之末造也大抵強弱更相事而已是以魯之往朝者皆晉楚齊大國而諸侯之來朝於魯者皆榖鄧滕薛杞鄫邾郜曹郳郯牟葛小國非特諸侯然也王臣亦有外交而僭者焉其見於內則祭公祭伯來其見於外則州公如曹春秋一正之外書曰朝內書曰如旅見則纍數非其所則志地攝而來則志名各著其實而罪自見至於王臣又絶其朝而不書嫌於二君也要荒亦絶其朝而不書嫌於騖逺也而三家不能辨或曰諸侯即位小國朝之或曰諸侯再相朝以修王命或曰考禮修德所以尊天子此豈周制也哉然則大行人之辭曰諸侯之邦交有世相朝者吾聞諸公侯伯子男入有郊勞出有贈賄見於廟中相與為賓之儀矣未聞當寧而面於庭者此諸侯欲文過而益其籍之辭非先王之言也夏公會鄭伯子時來秋七月壬午公及齊侯鄭伯入許冬十有一月壬辰公薨公薨何以不地故也故則何以書薨以內大惡則不可言以臣子之心則不忍言也何以不言葬春秋之法君弒賊不討則不書葬責臣子也以為所以事君親者人得以任其責故君弒在官者皆得討之不必其國也父弒在宫者皆得討之不必其子也州吁弒桓公衛人能討之故桓公得葬無知弒襄公齊人能討之故襄公得葬葬者臣子之終事君弒賊在偃然南面而事之曰吾所以事其君親者為巳終可乎此春秋所以不得葬也桓公一元年春王正月公即位繼故不書即位言有不忍於先君也此何以書即位身弒君而代之成其意也葉子曰天子崩諸侯薨嗣子立於喪次禮歟禮也天子七日而殯諸侯五日而殯既殯大臣以其受命於前王者即柩前而告之曰顧命禮歟亦禮也然則何以踰年始書即位稱元年有喪次之位有南面之位喪次之位所以繼體也一年不二君故雖即位未成其為君出見羣臣於寢門之外羣臣拜則答拜天子稱子小子諸侯稱子年用舊君之年而未敢改位存舊君之位而未敢居死則天子稱小子王諸侯稱小子侯南面之位所以朝羣臣也曠年不可以無君故至於明年天道一變前王之義終矣然後始以其正月朔朝廟見先祖以所受命者告焉而稱元年天子稱王諸侯於其封內稱爵自周以來未之有改也然則繼故不書即位豈不即位歟原其情有所不忍而不書也而先儒乃以為繼故則不即先君之位夫天下未有無位而為君者不即先君之位而何位乎即位者禮也忍不忍者情也死君而代之位孰以為忍而況於繼故繼故不書即位所以弭天下之爭而示有恩於先君者春秋之義也三月公會鄭伯于垂公何以會鄭伯求免于鄭也葉子曰垂之會三傳皆不著其説吾何以知其為求免於鄭歟放弒其君則殘之周公之刑也周衰王政不行於天下列國有弒其君者非特天子不能討方伯不能正而有幸而求免焉衛州吁弒桓公而立未能和其民厚問定君於石碏石碏曰王覲為可於是教之使朝陳而請覲曹負芻殺宣公之子而自立諸侯與會於戚而執之曹人請於晉曰若有罪則君列諸會矣亂臣賊子之所懼者天子與侯伯爾天子而與之覲諸侯而與之會是既許之為君矣後雖有欲討者無所加兵焉此周之末造也宣公弒子赤而會齊侯于平州左氏以為定公位齊人於是取濟西田以為賂左氏亦既言之桓之會鄭非齊之與宣會歟鄭伯以璧假許田則濟西之會也蓋自隱公初齊晉猶未強鄭莊公獨雄諸侯及使宛來歸邴之後隱遂舍宋而事鄭伐宋入許無不與之同者此桓之所畏也是其首求於鄭者歟鄭既得賂然後始固好而為越之盟故稱及焉及者內為志也三傳惟蔽於易邴之言不知許田之為賂是以併垂之事而失之春秋有屬辭比事而可見者吾故以負芻之討平州之役而知其然也鄭伯以璧假許田許田許之田也許田則魯何得有之鄭伯與我入許而居許叔於東偏以其大夫公孫獲居西偏蓋有分地而共取之者矣許近鄭而逺魯於是因會求併得焉何以言璧假不敢正其為賂而為之辭也其曰許田者何非許也許之田也郜鼎不得取之宋不可曰宋鼎許田不得取之魯不可曰魯田葉子曰居常與許復周公之宇魯固自有許矣吾何以知許田為取之許者歟春秋邑不言田故歡闡不言田舉重也國而後言田鄆言田邾言田得田不得國也惟田目地故濟西汶陽漷東沂西皆繫地許地邑則不目田矣當與取歡及闡同辭其曰許田亦得田不得許也許田既入鄭州來之狩楚子曰昔我皇祖伯父昆吾舊許是宅今鄭人貪賴其田而不我與楚遷許於葉王子勝言於楚子謂鄭以許為俘邑則鄭之有許豈魯之謂歟公羊乃以田邑多寡為别邑多於田稱邑夫邑孰有多於田者非吾所能知也夏四月丁未公及鄭伯盟于越秋大水記災也雨淫而害稼凡大水以時書者皆志夏秋以月書者皆志七月八月志以時者其災長志以月者其災短七月八月尤麥苖之時也不為災則不書冬十月二年春王正月戊申宋督弒其君與夷及其大夫孔父孔父宋大夫之四命者也宋何以有四命之大夫二王後得備官也弒君書及其臣君纍之也纍則何以有書不書賢則書之也孔父正色立朝人莫敢過督將弒殤公先攻孔父之家而殺之知孔父存則殤公不可得而弒矣是以及之也葉子曰吾何以知宋得備官歟古者二王後天子賓之而弗臣皆得修其禮物之舊所以杞宋之郊以禹契者其最大焉者也一娶而十二女三夫人之媵各三則見於經矣是以諸侯大國三卿而宋獨備六卿其在成公則公子成為右師公孫友為左師樂豫為司馬鱗矔為司徒公子蕩為司城華御事為司寇矣其在共公則華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司寇矣其在元公則公孫忌為大司馬邊卬為大司徒樂祁為司城仲幾為左師樂大心為右師樂挽為大司寇矣春秋以命數正名不嫌與諸侯卿大夫同書王上大夫以邑爵見王中大夫以氏爵見宋無畿內之邑不得食采而見爵故王上大夫雖以邑爵見而兼公則舉官宰周公是也宋有司馬司城則亦其上大夫而舉官者也王下大夫以字氏見家父是也宋有孔父則亦其下大夫而字舉者也王上士以名氏見如劉夏宋有仇牧亦上士也王中士以名見如實宋有山亦中士也由是言之非二王後得備官歟然王之上士以名氏見而宋牧得稱大夫王之中士以名見而宋山亦得稱大夫蓋不能備官而攝者或不與諸侯同春秋攝卿與大夫皆同正書是以華元魚石仲幾皆得為卿而山得以大夫稱也或者謂君前臣名孔父不得為字此禮之施於君臣相與之際者豈春秋之謂哉弒君名者初不以為輕大夫字者初不以為重道固並行而不相悖也滕子來朝滕侯國何以稱子時王貶之也諸侯一不朝則貶其爵宗廟有不順亦絀以爵焉周道也滕侯必居一於此矣葉子曰王政不行於諸侯久矣何以能加於滕歟春秋之初小國猶有聽命焉者也故杞於桓以侯見至僖而書子薛於隱以侯見至莊而書伯與是為三皆微國也大國則莫見焉杞於僖以子見至文則復書伯亦以是進之也自文以後雖三國亦莫行則周益衰矣或者以為進退皆春秋夫爵王命也可春秋而專之乎以春秋為可專則諸侯之惡有大於此三國者何以不貶或曰小白伯而正王爵杞薛蓋終小白之世未嘗與齊通也三月公會齊侯陳侯鄭伯于稷以成宋亂成平也古者謂和為平謂平為成宋亂則何以言成取賂於華督而不能討也何以不言平言成則見其與亂和言平則疑有正其亂者焉葉子曰諸侯不專征陳恆弒簡公孔子沐浴而告諸朝請討焉上無天子下無方伯天下諸侯有為無道者臣弒君子弒父力能討之則討之孔子之志也故蔡人殺陳他楚人殺陳夏徵舒不嫌與衛州吁齊無知同辭華督之罪固諸侯所得討也乃取賂而與之成夫伐罪之師不求其必誅苟服則止矣結成而還可焉取成而還可焉行成而還可焉弒君之賊其可服罪而成乎春秋不目事會而目事者二稷之成宋亂也澶淵之宋災故也盟而目事者二盂之執宋公也薄之釋宋公也四者獨志於宋以為二王後雖天子客而不臣是以重之宋亂之成諸侯無與容於天下矣夏四月取郜大鼎于宋此華督之賂也何以言郜大鼎郜之分器也古者親同姓以寶玉郜文之昭也武王克商分其宗廟之器以賜兄弟之國謂之宗彛而郜在焉是天子所賜以守其國者也郜雖失之宋不可有之鼎雖在宋猶曰郜鼎云爾前未有言與之者此何以言取所以見其為成亂也鄭人以賂輸平於我而我從之故書鄭伯使宛來歸邴我責賂于宋以成其亂而宋與焉故書取郜大鼎于宋有所刺於後必有所見於前其曰取于宋宋非我所得取也宋不得取于郜則我固不得取於宋矣戊申納于太廟太廟周公之廟也周公稱太廟魯公稱世室羣公稱宫魯道也廟之有器所以薦德不義而薦之周公其衰矣是謂瀆其祖納者以力強致之辭也秋七月杞侯來朝蔡侯鄭伯會于鄧鄧亦與會也九月入杞不言主師內之微者也內之微者書人則不辭何以不言我不居也公及戎盟于唐冬公至自唐至者何告至於廟也禮諸侯適天子告于祖奠于禰反亦如之諸侯相見告于禰反必親告于祖禰乃命祝史告至於前所告者而後聽朝而入葉子曰春秋書大事不書小事書變事不書常事國君歸而告于廟謂之致常事也何以書大也國君宗廟社稷之所繫安有出境而不致其反者乎何以或書或不書有史失之而不得書者有君廢之而不得書者故自文而上六君見出者九十九致者十有八自宣而下六君見出者八十六致者六十九近詳而逺略則史失之也隱公不終於君故終其世皆不致則君廢之也春秋無所加損所大者惟君而已三傳或以為備禮則書不備禮則不書或以為殆其往而喜其歸齊桓之盟會安之則不致或以為會夷狄不致離會不致惡事不致紛然皆不可通此則不知其説而妄意之也三年春正月正月何以不書王無王也桓弒君而奪之國不受命而自立以為有王則不至於是矣而王亦不加討焉王亦不自有其王也故不書王何以三年而後始不書元年二年未知其無王也十年十八年復有王存王也葉子曰古者諸侯喪畢見於天子賜之韍冕圭璧然後歸以臨其民明其有所受也而桓至莊公始見王使榮叔來錫命是桓未嘗朝王而受命也元年二年隱之喪未畢則將朝而請命歟遂不朝歟未可知也故書王以俟之至於三年而不朝則不朝矣其意曰是何必朝焉爾然後見其無王故去王自三年始王天下之王也十數之終也踰十年無王則無王天下之王豈以桓為有無哉坤之上六曰為其嫌於無陽也故稱龍焉則十年之書王亦嫌於無王而存之也十八年桓之終也桓雖無王王不可以不治使遂終不見王則桓得成其無王之惡而王亦廢其為王之實矣故十八年復書王所以治桓而申王此春秋正王法之道也公會齊侯于嬴夏齊侯衛侯胥命于蒲胥相也胥命相命為侯伯也古者王畿之外設方伯皆以諸侯有功德者為之自侯伯而長九州謂之牧自上公而分二陜謂之伯必有天子之命焉故曰八命作牧九命作伯天下無伯齊侯衛侯不受命於天子而擅相推是諸侯而自為命也何以不言相兩曰相胥有待也見齊衛之更相待云爾葉子曰吾何以知齊衛之擅相命歟齊侯僖公也衛侯宣公也齊衛之初皆常為伯矣管仲曰召康公賜我太公履五侯九伯皆得征之則太公之為二伯而周官所謂九命作伯者也康誥命康叔曰孟侯詩責衛伯不能修方伯連率之職則康叔之為方伯而周官所謂八命作牧者也桓王之時周德衰而諸侯莫適為主僖公宣公因欲舉其世職而更命以為侯伯故曰胥命九儀之命周之所以正邦國之位者也非入而受命於王則王以大夫為之錫命雖桓文之盛不敢竊以為辭葵丘之會束牲載書而稱五命蓋有宰周公臨之焉而況於侯伯乎齊小白之霸也王實使召伯廖命之晉重耳之霸也王實使尹氏王子虎命之而公羊榖梁乃以結言而退為美傅説曰王言惟作命不言臣下罔攸稟令諸侯而得言命非春秋之義也六月公會杞侯于郕秋七月壬辰朔日有食之既既盡也有繼之辭也公子翬如齊逆女翬何以氏始三命也逆女不書此何以書不正其以翬逆也古者嫂叔不通問而況逆女乎翬桓公之弟惠公之子也葉子曰夫婦之道人倫之本也魯諸公十有二見逆女者四皆以違禮而失常也莊書公如齊逆女不正公親逆也桓書公子翬逆女宣書公子遂逆女翬桓公之弟惠公之子遂宣公之弟文公之子不正其以叔逆嫂也成書叔孫僑如逆女僑如成公之族叔祖叔孫得臣之子不正其以尊逆卑也古者天子嫁女乎諸侯以諸侯同姓者主之諸侯嫁女乎大夫以大夫同姓者主之主之以敵大夫可也逆之於他國不可也天下之本在國國之本在家父父子子夫夫婦婦兄兄弟弟而家道正魯之亂有如慶父仲遂之殺嫡者有如僑如之譖其君於霸主而止之者皆自其家失之此春秋所以謹也九月齊侯送薑氏于歡公會齊侯于歡歡魯地也父而自送女非禮也禮送女父不下堂母不出祭門兄弟庶母不出闕門所以逺嫌也何以不稱夫人以齊侯為之辭也葉子曰文公逆女于齊在國不言女已成禮也於文公則既成婦矣故書逆婦薑於齊薑宜稱女者也齊侯送女於歡入國不言夫人未成禮也於齊侯猶女矣故書齊侯送薑氏於歡薑氏宜稱夫人者也是謂名正而言順夫人薑氏至自齊何以不言翬以夫人薑氏至自齊公自受之於齊侯也冬齊侯使其弟年來聘有年有年五榖熟也五榖熟為有年大熟為大有年葉子曰古之辨年之上下者曰豐年曰中年曰無年有年者中年也大有年者豐年也嵗非五榖皆不熟無非有年者何獨於桓書有年於宣書大有年歟桓宣皆弒君者也桓書大水書螽書雨雪書無氷則有年非桓之所得致也宣書螽書大旱書大水書蝝生書飢則大有年非宣公之所得致也於皇來牟將受厥明明昭上帝迄用康年武王之詩也天降喪亂滅我立王降此蟊賊稼穡卒癢厲王之詩也年之有無豈非以其君歟然天之愛人至矣非其惡有至厲王未有因其君而奪之年者則有年其常也無年非其常也故曰自古有年匪今斯今振古如兹以其常而不能常也故有年大有年各因其人而一見法焉然卒常也則不必書故終春秋不以再見非外此則無年也四年春正月公狩于郎狩冬田之名也正月其節矣何以書非其地也天子諸侯四時皆有田以習武事因獻禽以奉祭祀春教振旅以辨鼓鐸遂以搜田而祭社夏教茇舍以辨號名遂以苖田而享礿秋教治兵以辨旗物遂以獮田而祀祊冬教大閲以揔軍實遂以狩田而享蒸振旅茇舍治兵大閲習武之名也搜苖獮狩田之名也志以武者書以武志以田者書以田非其時則書非其地則書夏天王使宰渠伯糾來聘宰渠伯糾王之上大夫也宰大宰也糾名也王之上大夫以邑爵見而不名為大宰則書官此何以名桓負弒君之罪而不能討不朝王而反聘之王失正也大宰以六典佐王治邦國聘非其所聘而不能正使非其所使而不能辭糾失職也然則何以不貶王王不可以遽貶也貶糾所以貶王也葉子曰是嵗與七年皆闕二時不書秋冬史之闕文歟春秋闕之也易曰大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶春秋歷一時無事必書首月以見時所以奉天也桓無王王者天所王也無王亦無天矣是何足與語四時之序者哉而此二時者下無事上有事是以因其可闕而闕之四年承宰渠伯糾來聘見上無天子而渠伯來聘也七年承榖伯綏鄧侯吾離來朝見下無諸侯而榖鄧來朝也上無天子而不能誅下無諸侯而不能討故因其無事不書首月以見時者為其不足與奉天而絶之天也五年春正月甲戌下無文經成而亡之也葉子曰春秋有闕文歟曰然仲尼書而闕之歟曰否經成而後亡之也子曰吾猶及史之闕文也有馬者借人乘之今亡矣夫史不及見其全文而與之正猶無馬不能借人而與之乘也是以君子愼乎闕疑乃春秋則非史也將别嫌疑以為萬世法則何取於多聞哉可及者及之不可及者則去之而已所以為春秋者不在是也故春秋無闕文而先儒之説乃以為信以傳信疑以傳疑納北燕伯於陽謂之公子陽生曰我知之而不革夫如是則春秋何以定天下善惡而示勸沮歟吾是以知凡春秋之闕文非仲尼之闕疑皆經成而後亡之者也己丑陳侯鮑卒夏齊侯鄭伯如紀如朝也外相如不書此何以書諼也外此則無諼乎過我也齊侯將襲紀與鄭假朝以濟其謀紀人知之不及行諸侯相朝固非矣而又諼焉是以因其過我而一正之也天王使仍叔之子來聘仍叔王之下大夫也子之云者非大夫也辭間容之之諼辭也不正以其子代父愛人之子而輕其大夫也桓不足聘名宰渠伯糾已一見貶矣再不足貶也貶其使仍叔之子而已葉子曰春秋之善善也一善不再褒因其可褒而褒之而吾所與者自見矣其惡惡也一貶不再貶亦因其可貶而貶之而吾所奪者自顯矣蓋所以為褒貶者著吾所與奪而已何必致意而屢見哉是以不以其人每加之也葬陳桓公城祝丘不時也秋蔡人衛人陳人從王伐鄭王何以伐鄭鄭不朝也初莊公為平王卿士王二於虢公忌父周鄭交惡而不來朝至桓王立而鄭伯復如周王不禮焉遂畀虢公政鄭伯復以齊人來朝猶修方伯之職也既而取其塢劉蒍邘之田遂復不朝於是八年矣鄭在男服三嵗一見諸侯三不朝則六師移之再不朝則遽伐焉不問罪而王又親之以王為失正矣何以不曰天王伐鄭而舉從者以為之辭不以鄭伯敵天王也鄭伯何以無貶辭古者諸侯有罪方伯征之方伯不能服二伯征之二伯不能服而後王親征焉諸侯而至於王親征固無與立於天下矣然則王無罪乎天下有道諸侯六年五服一朝莫敢不來享莫敢不來王諸侯不能服而王親征王亦病矣三國何以皆稱人諸侯無軍以卿帥其教衛之民以贊元侯入天子之國曰某氏故以人見周禮也鄭於是射王中肩而敗王師何以不書敗不可言也葉子曰天王敗績於茅戎書敗鄭伯大敗王卒不書敗戎荒服也鄭甸服也荒服禮義所不加敗何恥焉甸服而敗王則所以為王者亡矣不可以鄭而亡王是以不可見敗也大雩雩旱祭也天子之雩主上帝諸侯之雩主上公有常雩有旱雩建巳而雩常雩也常雩未旱不書非建已而雩旱雩也旱雩已旱書以時書者皆志秋冬以月書者皆志七月八月志以時者其災長志以月者其災短故春夏不雩冬雩失時也何以不書旱言雩則旱見言旱則雩不見旱而得雨則書雩旱而不得雨則書旱大雩天子之雩也凡天子之祭皆曰大饗曰大饗旅曰大旅大雩必有盛樂焉魯何以得雩周公之賜也葉子曰三傳言雩各不同左氏曰龍見而雩過則書郊禘蒸嘗有常則有時旱無常則無時龍見而雩建已之雩以過而書則旱不得雩乎榖梁以雩月為正秋雩為非正志月者七月八月九月也志秋者包三月也月為正而秋安得不正乎知雩為旱祭惟公羊為近經也葉氏春秋傳卷三
