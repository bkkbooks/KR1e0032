body:
  text: 葉氏春秋傳卷十四宋葉夢得撰成公二六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉卻克衛孫良夫曹公子首及齊侯戰于鞌齊師敗績叔孫僑如公孫嬰齊皆吾大夫之三命者也卻克公子首晉曹大夫之三命者也晉以卻克之怨因我與衛請師而與曹共伐之故以我㑹三國及齊師言四國之主戰也行父許僑如嬰齊以四卿出則四軍也古者師雖衆必有元帥焉四卿並見則大夫強而莫相為屬也大國三卿四卿僣矣諸侯無軍四軍悖矣葉子曰天子作師公帥之以征不德元侯作師卿帥之以承天子諸侯有卿無軍帥教衛以賛元侯周道也則諸侯非方伯連帥盖未之有軍焉天子之軍寓於六卿無事則散於國及有事而用則各以其卿為之將故大為六軍小為三軍者天子元侯之制也周衰征伐自諸侯出列國始各自為軍而以其卿將之故晉初以一軍為晉侯至獻公而作二軍與太子分将文公之霸遂増三行以為六軍則他國盖可知也然猶時出而用之未嘗立以為定制也魯之僭軍自隐公以来見於征伐有自来矣其不見於春秋者猶有元帥以揔之也至是季孫氏雖專國而臧孫氏叔孫氏與嬰齊猶未盡聼是以春秋因以見焉逮成之六年仲孫蔑叔孫僑如侵宋以二卿見自是二卿將者九昭之十年季孫意如叔弓仲孫貜伐莒以三卿見自是三卿將者二蓋魯且三分公室以為三軍則時出而用焉者固非其君所得制也秋七月齊侯使國佐如師己酉及國佐盟于袁婁國佐齊大夫之三命者也師已敗矣何以言如師追奔及於袁婁而未退也齊於是使國佐以賂為請孰及之諸侯之大夫也何以不言諸侯之大夫不與大夫得專盟也使齊侯既敗而佚使國佐以紀甗玉磬與地賂晉曰不可則聼客之所為國佐致賂晉人不可曰以蕭同叔子為質反魯衛之侵田而致使齊之封内盡東其畝國佐辭而請戰晉人於是䀢魯衛之使使為之請而後與之盟袁婁之盟國佐之為也故不繫之於齊制在國佐也何以再見國佐與之也八月壬午宋公鮑卒庚寅衛侯速卒取汶陽田汶陽田我田而齊侵之者也齊既服於晉以反魯衛之侵田於是復歸於我故曰取不繫之齊非齊之所得有也冬楚師鄭師侵衛十有一月公㑹楚公子嬰齊于蜀公子嬰齊楚大夫之三命者也始宣公欲求好于楚不克而薨故公即位受盟於晉楚共王立嬰齊欲以威脅中國而争長故與鄭侵衛之師召諸國而盟之公懼欲附楚於是先諸侯而與之㑹不沒公公欲之也丙申公及楚人秦人宋人陳人衞人鄭人齊人曹人邾入薛人鄫人盟于蜀此公子嬰齊也何以復稱人不與嬰齊争中國而諸侯皆以其大夫受盟也故秦右大夫宋華元陳公孫寧衞孫良夫鄭公子去疾及齊國之大夫皆貶而人焉始晉伐齊楚将以嬰齊救之嬰齊曰君弱羣臣不如先大夫師衆而後可乃悉帥王卒盡行而強冠蔡許之君以為左右諸侯莫敢不聼則嬰齊之為也何以不没公是公往㑹焉而求盟者也葉子曰楚自荘王討夏徴舒滅陳而復封之既得鄭而不有不奪子反之言而與宋平諸侯皆有畏楚之意盖幾於霸矣及其卒也遂能以赴通中國楚子書卒自荘王始然見於春秋未嘗因其善而少進焉豈終不以中國之無霸而假夷狄歟及共王立而弱未知諸侯之復能從楚也而我與晉方為伐齊之役故嬰齊始以卿出悉帥王卒盡行以救齊盖將挾其衆以威我遂以蔡侯為左許男為右以侵衞方是時使中國而有主嬰齊必有為之所者矣而二國之君十國之大夫方且拱手而不敢違則夷狄幾何不横行於天下乎此春秋之所以謹也是以荘王不為無善而未嘗得一裦嬰齊始見其強而力遏之夫然後知中國之有與存者矣三年春王正月公㑹晉侯宋公衞侯曹伯伐鄭辛亥𦵏衞穆公二月公至自伐鄭甲子新宫災三日哭新宫宣公之室也何以不曰宣公禮焚先人之室三日哭成公既已盡之矣謂其志為己哀故不忍以諡舉也乙亥𦵏宋文公夏公如晉鄭公子去疾帥師伐許公子去疾鄭大夫之三命者也公至自晉秋叔孫僑如帥師圍棘棘邑也邑不言圍此何以言圍内邑也大雩晉卻克衛孫良夫伐廧咎如廧咎如赤狄之别種也冬十有一月晉侯使荀庚来聘衛侯使孫良夫来聘丙午及荀庚盟丁未及孫良夫盟荀庚晉大夫之三命者也荀庚孫良夫何以不繫國不與其得專盟也古者大夫出聘受命不受辭辭無所受而説以為專盟則非也孰及之公也何以没公非公欲也鄭伐許鄭何以舉國狄之也鄭自邲之役叛晉而從楚不復與中國交許靈公之弱前既屈于公子嬰齊失位而不得列於諸侯矣鄭方以公子去疾伐之未知許之為罪也曽未三時而再伐焉此其為道馮弱犯寡必有中國所不為者而史失之矣四年春宋公使華元来聘三月壬申鄭伯堅卒杞伯来朝夏四月甲寅臧孫許卒公如晉𦵏鄭襄公秋公至自晉冬城鄆鄆内邑也冬城之節矣何以書不正其所以城也前季孫行父帥師城之雖時亦不書畏齊也今公欲叛晉而求成於楚城之以為備雖時亦書畏晉也葉子曰晉築蒲與屈士蒍曰無戎而城讎必保焉楚囊瓦欲城郢沈尹戌曰苟不能衛城無益也夫城雖以為守而非恃以為守者也故城之非其道以讎則不能拒以己則不能衞而况介於齊晉二大國之間者乎君子以是為非守國之道也鄭伯伐許五年春王正月杞叔姬来歸仲孫蔑如宋夏叔孫僑如㑹晉荀首于榖荀首晉大夫之三命者也梁山崩記異也梁山晉河上之山也何以不繫晉非晉所封也秋大水冬十有一月己酉天王崩十有二月己丑公會晉侯齊侯宋公衞侯鄭伯曹伯邾子杞伯同盟于蟲牢杞伯何以序邾子下杞之習用夷禮久矣今雖能變復能稱伯猶抑之不得使與諸侯齒時王之為也六年春王正月公至自㑹二月辛巳立武宫武宫武公之宫也禮天子七廟諸侯五廟天子親廟四祧廟二祖有功而宗有德則又有不毁之廟焉同謂之祧諸侯有廟無祧武公之廟毁矣毁而復立非禮也僭天子而益五廟亦非禮也葉子曰周衰先王之禮樂盡廢矣古者師出必於廟受命而春秋諸侯盖有各於其先而私禱者焉功成則為之立宫其為說則吾不知也故季孫意如逐昭公禱於煬公因為之立煬宫武公伯禽之九世孫敖也諡之曰武其必有稱此名者豈鞌之戰季孫行父亦私有以請之者歟是盖以為周有文武二祧故以武公配伯禽亦已僭矣記禮者不知遂曰魯公之廟文世室也武公之廟武世室也使誠如記禮之言以為天子之禮而成王賜之亦安能遽先其九世而名之歟儒者之妄毎如是不可以不察也取鄟鄟附庸之國也衛孫良夫帥師侵宋夏六月邾子来朝公孫嬰齊如晉壬申鄭伯費卒秋仲孫蔑叔孫僑如帥師侵宋楚公子嬰齊帥師伐鄭冬季孫行父如晉晉欒書帥師救鄭欒書晉大夫之三命者也七年春王正月鼷䑕食郊牛角改卜牛鼷鼠又食其角乃免牛郊牛之口傷以漸傷也故言之緩辭也鼷鼠食郊牛角忽然而食之非漸也故不言之亟辭也何以書以庀牲之道為未盡則非所以事天也吴伐郯夏五月曹伯来朝不郊猶三望凡免牛免牲不書不郊免牲與牛則不郊可知矣此何以再見不郊為猶三望起也不郊而望非禮也正月免牛五月而望尤非禮也秋楚公子嬰齊帥師伐鄭公㑹晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵公至自㑹吴入州来冬大雩衛孫林父出奔晉孫林父衛大夫之三命者也八年春晉侯使韓穿来言汶陽之田歸之于齊韓穿晉大夫之三命者也汶陽我之舊田也晉為霸主可使齊人反我之侵田不可使我復以與齊名不正則言不順言不順則事不成韓穿之言不可以為順也故辭皆容之之緩辭也不與其正之辭也晉欒書帥師侵蔡公孫嬰齊如莒公孫嬰齊吾大夫之三命者也宋公使華元来聘夏宋公使公孫壽来納幣公孫夀宋大夫之三命者也納幣不書此何以書以宋公使公孫夀為得禮也昬禮無父則母命之無母則己命之公孫夀言使無母之辭也無父則母命之不以母命而已命之則非正故紀裂繻不言使以母命之得禮一見正也無母則己命之不以己命而以諸父兄命之則非正故公孫夀言使以己命之得禮一見正也葉子曰昬禮不稱主人然歟非也禮國君求昬之辭曰請君之玉女與寡人共有宗廟之事其父母納女之辭於天子則曰備百姓國君則曰備酒漿大夫則曰備灑埽未嘗不親命之不稱主人於禮未之聞也為是說者特出於公羊盖以紀裂繻不言使而云爾然公子遂如齊逆女内之言如則外之言使也昬姻之道一在我則得言如在彼則不得言使可乎夫公羊氏既以無母則當稱諸父師友矣宋公無母又安得以辭而言使弟稱其兄禮為支子之無父者非宗子也乃師友則友非禮之所見安有合二姓之好以奉宗廟社稷而受之於他人者其亦何辭以見祖考是皆不可行於春秋則公羊氏不學禮之罪也晉殺其大夫趙同趙括趙同趙括皆晉大夫之三命者也趙朔晉侯之壻朔死而同括之弟嬰亂其室同括不請於君而放之齊於是朔之室訴於晉侯曰同括将為亂晉侯不察而殺之同括之死罪累上也故以國殺秋七月天子使召伯来賜公命賜公命榖梁作錫左氏公羊作賜當從二傳賜命如命也禮子男五命服毳冕侯伯七命服鷩冕上公九命服衮冕有加焉則賜固有服過其爵者矣而非有德者莫之與也臨諸侯曰天王君天下曰天子錫命常也賜命非常也成公即位其德未有聞而王賜之濫矣故以君天下之辭言之曰是天所以彰有德者吾雖有天下繼天而為之子不得而私爾冬十月癸卯杞叔姬卒叔姬己出於杞矣何以復繫之杞雖出而未許其絶也曷為未許其絶我將脅杞而復歸之也晉侯使士燮来聘士燮晉大夫之三命者也叔孫僑如㑹晉士燮齊人邾人伐郯衞人来媵媵不書此何以書為二王後見正也禮天子一娶十二女媵三在焉諸侯一娶九女媵二在焉宋二王後得用天子之禮者也禮不求媵與為好者自往媵之所以一夫人之尊衞人来媵矣晉人秦人復来媵是天子之制也前是必有不得其正者故書以見正也葉子曰吾何以知天子之備三媵歟天子諸侯後宫之數禮不可盡考矣曲禮言天子有后有夫人有世婦有嬪有妻有妾公侯有夫人有世婦有妻有妾而昬義言天子后立六宫三夫人九嬪二十七世婦八十一御妻與周官略同而無妻妾則世婦者所謂妻而御妻者所謂妾也諸侯有世婦妻妾而無嬪盖下於天子矣而不列其數至媵則皆未嘗見獨公羊以爲諸侯娶一國則二國往媵之諸侯一聘九女是諸侯一夫人而二媵夫人與媵皆有左右姪娣合而為九所謂一娶九女也媵當為諸侯世婦之稱下夫人一等故詩江有汜以媵配嫡為言以是推之則天子后宜三國往媵而三夫人者王后之媵也后與三夫人皆有左右姪娣合而為十二則亦所謂天子一娶十二女者也盖自夫人世婦至女御皆婦官之名而媵與姪娣者皆其相與為稱之辭以媵為夫人世婦則姪娣者又下媵之稱而為嬪與妻妾者也故女子謂昆弟之子為姪而同出謂後生者為娣禮稱世婦獻繭於夫人夫人副褘而受之祭祀夫人副褘立於房中副褘王后之服也先儒皆以為二王後之夫人得從后之服則三夫人之數冝亦備焉此宋所以得三國之媵歟公羊乃以三國媵之為非禮此知諸侯之制而不知宋之禮也九年春王正月杞伯来逆叔姬之喪以歸既以杞夫人卒之矣則脅杞伯而歸其喪者非正也故辭間容之之緩辭也不與其正之辭也公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子杞伯同盟于蒲公至自會二月伯姬歸于宋夏季孫行父如宋致女致女不書此何以書為二王後見正也禮女嫁舅姑沒三月以奠菜之禮見於禰廟稱来婦成其為婦也父母之家因使大夫致之謂之致女致之者何亦所以成其為婦者葉子曰致女舅姑沒之禮也昬禮同牢之夕婦已見於廟矣質明復以棗栗腵修賛見於舅姑所以成婦禮也舅姑入室婦盥饋以特豚以明婦順厥明舅姑以一獻之禮饗婦授之室事以申著代而婦道成矣乃舅姑沒則未之有施也故三月擇日而祭於禰廟三月者天道之一變也是以女未廟見而死不遷于祖不祔于皇姑壻不杖不菲不以歸𦵏于女氏之黨示未成婦則三月父母從而致之者其亦成其女於舅姑者歟先儒乃槩謂舅姑存之禮以為聘問以篤昬姻之好故左氏以齊侯使弟年来聘為致夫人文姜是盖不知有禰廟之祭此左氏不學禮之罪也晉人来媵秋七月丙子齊侯無野卒晉人執鄭伯楚人以重賂求鄭鄭伯背蒲之盟與公子成㑹于鄧晉侯執之因以伐其國乃復以鍾儀之使與楚修好而結成遂歸鄭伯非伯討也故以人執晉欒書帥師伐鄭冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆鄆莒附庸國也秦人白狄伐晉鄭人圍許城中城中城公宫之城也楚既入鄆公懼其來偪故修中城以備之不正其衞已而外民也十年春衞侯之弟黒背帥師侵鄭衞侯之弟云者母弟也何以稱弟兵凶器戰危事也不以其可將者將焉而私其弟非爱其弟之道也夏四月五卜郊不從乃不郊卜郊不從何以或言乃免牲或言乃不郊郊祭之大不可斥其廢故以免牲見之也免牲則不郊可知矣卜免牲而不得然後言不郊辭窮也免牲之道必卜卜而吉則免卜而不吉則不免安置之繫以待庀牲而左右焉卜郊者月一卜之也三卜而求吉者盡矣此四月而五卜謂其逺而卜其中辛也五卜非禮也卜其中辛尤非禮也莫甚乎其以四月五卜也五月公㑹晉侯齊侯宋公衞侯曹伯伐鄭齊人来媵丙午晉侯獳卒秋七月公如晉弔厲公也諸侯之喪大夫弔公弔非禮也於是晉人疑公貳於楚止公使送𦵏以待糴茷諸侯莫在焉是以景公不書𦵏以公親㑹為恥也冬十月十有一年春王三月公至自晉晉侯使卻犫来聘己丑及卻犫盟卻犫晉大夫之三命者也何以不繫晉不與其得專盟也孰及之公也何以没公非公欲也夏季孫行父如晉秋叔孫僑如如齊冬十月十有二年春周公出奔晉王大夫奔未有言出者此何以言出以周公也三公論道經邦與王同德故繫之周此宰周公楚也自周無出言宰楚則可出言周公則不可出故言周公不言宰惡楚也葉子曰坐而論道謂之王公作而行之謂之士大夫三公之為徳上有同於王而下有别於士大夫則天下之大盖有共當其任者矣天子有道有㑹朝無出居天王出居于鄭恥也三公有道有經邦無出奔周公出奔晉惡也王子瑕奔晉尹氏毛伯召伯以王子朝奔楚皆不言出周非卿大夫之所得任也是以諸侯之大夫奔言出以其國别也王卿士大夫奔不言出不以其國别也必有不可出者而後言出則出者上下之所病也公羊以為自其私土出誤矣夏公㑹晉侯衞侯于𤨏澤秋晉人敗狄于交剛冬十月十有三年春晉侯使卻錡来乞師卻錡晉大夫之三命者也三月公如京師公朝京師不書此何以書不正其伐秦而道朝京師也夏五月公自京師遂㑹晉侯齊侯宋公衞侯鄭伯曹伯邾人滕人伐秦此伐秦也何以言公自京師遂㑹諸侯伐秦以公為不足於恭故為之辭而以遂言之也曹伯盧卒于師秋七月公至自伐秦冬𦵏曹宣公十有四年春王正月莒子朱卒莒未有書卒者此何以書始来赴也何以不書𦵏辟其名也葉子曰莒子以爵見於隐公自是不復與我通盖其實夷也至文而庶其以弑見襄而宻州以弑見昭而展輿以奔見外此則朱與去疾以卒見而已以傳考之朱之號曰渠丘公去疾之號曰著丘公而非諡也盖朱之辭也辟陋在夷其孰以我為虞則朱之自安於夷乆矣𦵏從主人卒我所可正其爵為子𦵏我不可從其號為夷故與吳楚不言王皆不得以𦵏見也夏衞孫林父自晉歸于衞秋叔孫僑如如齊逆女逆女不書此何以書不正其以僑如逆也鄭公子喜帥師伐許公子喜鄭大夫之三命者也九月僑如以夫人婦姜氏至自齊僑如何以不氏一事而再見者卒名婦有姑之辭也冬十月庚寅衞侯臧卒秦伯卒十有五年春王二月𦵏衞定公三月乙巳仲嬰齊卒此公孫嬰齊也何以曰仲嬰齊後其兄也後其兄則何以曰仲嬰齊孫氏王父之字也正乎不正為人後者為之子禮兄弟之子猶子也兄弟之子可以為後兄弟不可以為後弟而後兄非正也癸丑公㑹晉侯衞侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師曹伯廬卒于師曹人使公子負芻守公子欣時逆曹伯之喪未至負芻殺世子而自立晉侯為是為戚之㑹執負芻以歸京師伯討也故以侯執公至自㑹夏六月宋公固卒楚子伐鄭秋八月庚辰𦵏宋共公宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山山宋大夫之再命者也蕩澤也平公立蕩澤為司馬澤欲弱公室殺公子肥公不能止華元使華喜帥國人攻蕩氏而殺山山之死罪累上也故以國殺葉子曰吾何以知山之為澤歟華元之出奔以澤之欲殺公子肥也故魚石止而請討許之而後反則攻而殺之非澤而誰歟左氏記大夫名氏多欲與經參見經以山為名則澤當為字然澤為六卿而不書氏疑必再命而攝卿者以為背其族而貶則非是此猶言僑如逆夫人為尊夫人而舍族者盖左氏初不知經書名氏之例故毎以其私而妄意之也宋魚石出奔楚魚石宋大夫之三命者也冬十有一月叔孫僑如㑹晉士燮齊髙無咎宋華元衞孫林父鄭公子鰌邾人㑹吳于鍾離髙無咎公子鰌齊鄭大夫之三命者也此吴夀夢之㑹也何以殊㑹不使吴得主㑹也吴前未有與中國通者自申公巫臣請使始通吴于晉遂叛楚而入州来於是始為㑹而晉從之故君子謹焉葉子曰春秋中國之勢不强於吴楚楚自莊公以後始見至僖而浸強然召陵之盟齊小白一起而正之雖成王之強不敢不服及晉重耳繼敗成王於城濮楚卒不得肆盖齊與晉猶有與之敵者也故申之㑹靈王合十二國晉與我雖不能拒亦不復從春秋猶以中國之㑹書焉成王之末楚浸衰而吴驟強矣天下所恃以主盟者晉而已厲公之暴悼公之賢皆不能少振反率諸侯而從之一㑹而合七國再㑹而合十三國三㑹而合十二國我皆與之俱天下無不聼於吴焉於是伐郯伐陳入州来無不如志及其乆也破楚柏舉而入郢幾以滅楚敗頓沈陳蔡之師殺二國君我遂舍中國而從之昭公不恥同姓而與之昬哀公始以叔還㑹呉於柤己而身為鄫與橐臯之好則不被髪而左衽者幾希矣故鍾離與柤與向皆殊㑹夫豈以楚申之㑹與此為異哉楚有與敵吴無與敵君子之所憂也或者乃以為諸侯皆以爵見而吴不得以爵見故殊之夫使吴而有與敵不害其同楚黄池之㑹且以晉侯及吴子矣夫何獨於是三者而嫌哉許遷于葉十有六年春王正月雨木冰記異也雨而木冰也夏四月辛未滕子卒鄭公子喜帥師侵宋六月丙寅朔日有食之晉侯使欒黶來乞師欒黶晉大夫之三命者也甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績晉伐鄭楚子救之士燮欲反欒書不可故以晉侯及楚子鄭伯言晉之主戰也楚敗射共王中目不言楚師君傷舉重也楚殺其大夫公子側公子側楚大夫之三命者也楚以公子側将中軍子重将左二卿交惡而楚子並用之及晉敗之明日楚子欲復戰召公子側謀醉不能見楚子乃宵遁問師敗之故子重使謂公子側曰初隕師徒者而亦聞之矣盍圗之乃自殺公子側之死罪累上也故以國殺秋公㑹晉侯齊侯衞侯宋華元邾人于沙随不見公何以言不見公公不諱恥也晉欒黶来乞師公以申公儆備而後㑹卻犫取貨於叔孫僑如而訴公於晉侯晉侯遂辭公不見非公之恥也故不為公諱葉氏春秋傳卷十四
