body:
  text: 葉氏春秋傳卷十七宋葉夢得撰襄公三秋宋公殺其世子痤何以挈宋公殺世子母弟目君甚之也晉人執衛寧喜喜負弒君之罪晉不以討而以林父之訴執之非伯討也故以人執八月壬午許男寧卒于楚冬楚子蔡侯陳侯伐鄭葬許靈公二十有七年春齊侯使慶封來聘慶封齊大夫之三命者也夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奂鄭良霄許人曹人于宋趙武公孫歸生石惡孔奂晉蔡衛陳大夫之三命者也此向戌之請也不列向戌地于宋則向戌在焉也衛殺其大夫寧喜寧喜初欲納獻公公使公子鱄與喜言曰苟反政由寧氏祭則寡人獻公立而寧喜專公患之其大夫公孫免餘殺喜尸諸朝寧喜之死罪纍上也故以國殺衛侯之弟鱄出奔晉鱄定公之子獻公之母弟也獻公既背鱄之約而殺寧喜鱄不義其所為而去之終身不仕則衛侯之不能兄也故目弟秋七月辛巳豹及諸侯之大夫盟于宋此前㑹宋諸侯之大夫也始宋向戌善于晉趙武又善于楚屈建欲弭諸侯之兵以為名乃如晉告武又如楚告建遂如齊如秦皆許之告於小國亦從故即宋為㑹而盟焉諸侯不在而曰諸侯之大夫受命於其君也於是中國不出夷狄不入而天下之兵熄則向戌之為也豹不氏一事而再見者卒名之也再地宋善之也葉子曰是㑹左氏得其事而不盡其義故言楚人衷甲及齊宋請邾滕晉楚爭先之事析西門蒙門為二盟與其本志不類榖梁知其義而不知其事故知諸侯不在而曰諸侯之大夫為異於湨梁之不臣然以豹不氏為恭則非是乃公羊則既不知事又不知義遂以為石惡在是而殆諸侯且公羊豈不知遂以夫人婦姜至自齊再見遂而不稱公子者乎袁僑之盟固已不能别此又適在公子鱄出奔之後故以意逆之而歸惡於衛以此見三家之傳經蓋有知而不能詳詳而不能盡與不能知而意之者皆未嘗親得其所聞者也非深於經者不足與知此冬十有二月乙亥朔日有食之二十有八年春無冰夏衛石惡出奔晉邾子來朝秋八月大雩仲孫羯如晉冬齊慶封來奔十有一月公如楚十有二月甲寅天王崩乙未楚子昭卒二十有九年春王正月公在楚夏五月公至自楚前未有書公在者此何以書危夷狄以存公也葉子曰成公嘗以七月如晉明年三月致正月不書在晉昭公嘗以冬如晉明年夏致正月不書在晉諸侯以兩君之好相見於五服之內則何為焉而公之如楚過矣昭公於鄆不書在於乾侯書在以失國為危也公如晉不書在於楚書在以失中國為危也庚午衛侯衎卒閽弒吳子餘祭閽賤者也不言盜以吳子為不能保其身也古者使墨者守門劓者守關宫者守內刖者守囿髠者守積各不廢其材而任以職吳子刑越俘使皆守舟又即而觀焉非任官之道也賤者不列於君臣故不言盜弒吳子不君而輕其身故閽特言弒加之以君之辭而後見吳子之不君也弒則何以不言其君越俘不可以君吳也仲孫羯會晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城杞荀盈髙止華定世叔儀公孫段晉齊宋衛鄭大夫之三命者也城杞者何修舊也晉平公杞出故率諸侯為杞城諸侯以二王之後不以晉之私而共城之諸侯之善也晉侯使士鞅來聘士鞅晉大夫之三命者也杞子來盟吳子使札來聘札吳大夫之再命者也吳子始得以爵書進之也葉子曰夀夢之子同母者四兄弟皆欲迭為君而致國於札札不受而去焉於是之魯之齊之鄭之衛之晉歷五國而後歸此札之賢也然則吳何以得進以吳而有札能以禮交於中國雖欲夷狄之不可也則吳之所為而已春秋之義或與其文或與其實楚丘之城非不善而文不得許其專吳子之聘未必善而文不得不與其進故札出僚得國闔廬卒以弒僚不以是罪札之來蓋其與之在此不在彼也公羊獨以為賢季子者誤矣秋九月葬衛獻公齊髙止出奔北燕冬仲孫羯如晉三十年春王正月楚子使薳罷來聘薳罷楚大夫之三命者也夏四月蔡世子般弒其君固五月甲午宋災外災不書此何以書為二王後見重也宋伯姬卒天王殺其弟佞夫佞夫景王之母弟也何以挈天王殺世子母弟目君甚之也王子瑕奔晉瑕王之大夫也何以不言出周非大夫所得同有也何以知其自周出佞夫靈王之子其居固在京師矣靈王崩儋括欲立佞夫而不克景王立尹言多五子殺佞夫瑕以佞夫黨而奔晉其出固自周也秋七月叔弓如宋叔弓吾大夫之三命者也葬宋共姬共諡也內女為夫人葬未有舉諡者此何以書賢伯姬也葉子曰古者生無爵死無諡死而諡周也謂士以下言也士則有爵矣蓋諡者所以易名也葬而卒哭卒哭而諱必有諡焉然後可諱故曰諡者所以尊名也乃婦人則非有爵者也非當名者也安用諡乎周之后妃其逺者莫如姜嫄姜嫄無諡近者莫如大任大姒大任大姒無諡則周婦人未嘗有諡也魯夫人諡自文姜始然其前已見聲子則非特夫人有諡妾亦有諡矣不知為之者何時自是魯夫人無不諡者至宋諡共姬則非特魯也凡諸侯皆諡矣故録共姬之諡雖以表其賢然非所諡而諡之亦以著其失則雖魯亦不得無罪也鄭良霄出奔許自許入于鄭鄭人殺良霄良霄既自墓門之濵入介於襄庫為亂以伐北門子駟子帶帥國人討而殺之不書大夫位已絶矣非復大夫也曰鄭人討賊之辭也冬十月葬蔡景公葬未有不討賊者景公何以得葬正天下之為人父者也蔡景公為大子般娶於楚而通焉般於是弒景公君子以為亂父子之大倫而絶人道者人亦得以絶之也葉子曰蔡固之惡子産蓋知其必有子禍矣然父不父子不可以不子固之惡雖大春秋其可以是免般而不討乎昔者齊景公嘗問政於孔子孔子曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸孔子為是言也以景公繼弒君而不討崔杼者也然豈不曰君臣父子各得其正而後政可為者乎使臣臣而君不君子子而父不父雖其義有不可亂而為君與父之禍無時而可息也君子以是不以免般為嫌微致其意曰必君君而父父然後可以盡天下為臣與子之責則正身而齊家齊家以治國而天下無與為亂者矣故以蔡固一見法焉晉人齊人宋人䘙人鄭人曹人莒人邾人滕人薛人杞人小邾人㑹于澶淵宋災故㑹未有目事者此何以言宋災故為二王後見重也大夫何以皆書人欲歸宋財而後不能故貶而人之也大夫㑹而不終其約者多矣何獨責於澶淵救災恤患諸侯之義也人皆可以自致未有國而無財者也何必待㑹今勤十二國之衆而無一如其言豈皆無是心哉待人而後為之爾孰有因人以為義者乎君子是以原其情而著其事也三十有一年春王正月夏六月辛巳公薨于楚宫非正也秋九月癸巳子野卒己亥仲孫羯卒冬十月滕子來㑹葬諸侯㑹葬非禮也禮天子葬同軌畢至有故則大夫㑹葬諸侯葬同盟畢至大夫㑹葬癸酉葬我君襄公十有一月莒人弒其君密州稱人以弒微者弒君之辭也昭公一元年春王正月公即位叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢公子圍國弱齊惡公子招罕虎楚齊衛陳鄭大夫之三命者也此尋宋之盟也楚何以先諸侯強也葉子曰自襄以來晉主盟齊楚皆未入㑹宋未嘗不先諸侯蓋齊方與楚也雞澤之㑹齊始以世子光來猶在邾人下至邢丘而齊人居宋人上則齊已亢矣澶淵之㑹齊侯始入㑹遂居宋公上宋之㑹楚始入㑹屈建遂居蔡衛上至是楚公子圍先國弱而向戌在三夷狄愈強雖齊亦為之屈而二王之後微矣三月取鄆鄆魯鄆也莒嘗侵之以虢㑹而歸何以不言某歸受命而歸非自歸也葉子曰吾何以知此為魯鄆凡內取外邑不書內取外邑必先見伐不正其以伐取而後書也且莒鄆非邑附庸之國也則固不得為莒邑矣㑹以正月取以三月左氏謂三月諸大夫嘗同盟莒子訴于㑹亦非是㑹而盟未有不志於春秋者何為略而不書乎然則非取莒鄆以為附庸歟亦非也後見疆田屬為附庸則不疆田也夏秦伯之弟針出奔晉針景公之母弟也有寵於桓公而富景公立其母畏景公不能容曰弗去懼數其罪乃使之出以景公為不能兄也故目弟焉六月丁巳邾子華卒晉荀吳帥師敗狄于大鹵秋莒去疾自齊入于莒去疾公子之未氏者也自齊齊有奉也自未有言入此何以言入逆辭也衛朔入于衛齊小白入于齊皆以不正奪正故謂之入莒犁比生去疾及展輿展輿立而去疾奔其復國不得以歸言之則去疾亦奪展輿如衛朔齊小白者也莒展輿出奔吳展輿踰年之君也何以不書爵密州未葬也叔弓帥師疆鄆田疆溝封之也帥師而城邑已強矣帥師而疆田又甚也葬邾悼公冬十有一月己酉楚子麇卒麇公羊榖梁作卷左氏作麇當從左氏公子圍共王之子康王之弟而麇之叔父也康王卒麇立圍欲篡國蓋鄰國莫不知焉而麇莫之戒故卒弒之而以疾赴魯史有知之者矣春秋因其辭而書卒正麇之不能君也葉子曰臣弒君猶有不免於貶者歟曰此非圍之說有國之說也天子有天下諸侯有一國皆以其身受宗廟社稷之託必其身安而後天下國家可保也坤之初六曰履霜堅冰至孔子傳之曰臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也天下之禍莫大於弒父與君使為人父與君者常能辨之於早如履霜而知堅冰則天下豈復有弒哉圍為令尹之始鄭子羽固知其必代麇矣及虢之㑹遂居諸侯大夫之上雖趙孟不能屈以二執戈者前則叔孫豹蔡子家鄭行人揮皆知其必君而非復公子也故其城犫櫟與郟則子産知其欲去黑肱伯州犁二人以行大事薳罷問政而不敢對則叔孫豹知其與聞其意而佐之匿其情此其禍萌於即位之初而形見於鄰國之逺楚之君臣曾莫之慮而預為之圖則圍何憚而不為乎春秋以為圍之惡天下不患於不知而吾治天下之弒者為法亦已嚴矣適得一人焉可以為後世為人君者之戒是以不嫌於免圍而以麇一見法焉或者疑公羊榖梁書麇名不同春秋後見楚子䖍卒為靈王非所謂圍乎以左氏之說為妄吾考於榖梁載慶封就戮之言曰無或如楚共王之子圍弒其兄之子而代之君與左氏之辭合則麇固圍之弒而圍之為靈王審矣圍與䖍名錯見或曰圍即位而改為䖍也楚公子比出奔晉公子比楚大夫之三命者也二年春晉侯使韓起來聘韓起晉大夫之三命者也夏叔弓如晉秋鄭殺其大夫公孫黑公孫黑鄭大夫之三命者也黑逐良霄已而復與子南爭室強盟薰隧子産不能討遂欲作亂去游氏而代其位子産聞而懼使吏數其三罪而誅之公孫黑之死罪纍上也故以國殺冬公如晉至河乃復復者事未畢之辭也蓋晉以公弔少姜為非禮辭公而不見乃難辭以公復之為難也葉子曰恭近於禮逺恥辱也是在周易所謂巽在牀下者君子不貴焉諸侯之相朝固非禮矣自公即位二十三年之閒朝於晉者五唯其末言有疾則外此皆非公之自復晉辭公也是豈晉得以辱公哉蓋公嘗為少姜卒而往弔矣為季孫意如執而往請矣以千乘之君而弔嬖妾且為臣而親行則晉不得不易公也故或以莒人之訴而辭公或以鮮虞之伐而辭公使公知恭之不妄禮則一辭公固可以止何待至于再至于三而不已乎如是而流離於外不得志於齊猶有望於晉以為寄倣徨乎乾侯卒至於死而不悟此春秋所以屢書不少殺獨以有疾一著其實者所以志公之愧也季孫宿如晉三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公秋小邾子來朝八月大雩冬大雨雹北燕伯款出奔齊四年春王正月大雨雹大雨雹左氏作雨雹公羊榖梁作雨雪當從左氏記災也葉子曰吾何以知雨雪之為雹歟正月大雨雪非災也夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申楚子何以先諸侯主㑹也晉自悼公卒而平公立中國日益衰楚靈王方侈止許鄭以求諸侯平公不敢與之爭而從焉則中國幾於無霸也楚於是遂主㑹楚子先諸侯則何以不貶楚所以正諸侯也一人衡行於天下武王恥之諸侯知晉平公不足霸則勿㑹而已㑹而先楚子遂使楚子得以爭中國則晉與諸侯之罪也葉子曰楚子始欲求合諸侯而未定問於子産曰晉其許我乎又曰諸侯其來乎則楚子固自以為不足服諸侯而懼其叛也當是時使晉稍強其誰敢與爭晉强而諸侯聽之則楚亦不能肆其志而晉侯方溺於嬖寵豈復有志於中國哉楚偃然得専於諸侯諸侯舍晉無所附則亦不得已而從楚晉雖不㑹自胡沈小國至於淮夷無不在楚於是伐吳滅陳滅蔡殺干徴師楚之得志於中國未有盛於此時非楚子所能為也黃池之㑹以夫差之強定公一數之且不敢不聽而平公不能行之於申故特挈楚子而無貶辭所以見中國之無霸而憫諸侯之無能為也楚人執徐子徐吳出也楚方與吳爭強而不能服疑徐子為二於吳因㑹而執之非伯討也故以人執秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳楚子既得志故復合諸侯以討吳何以言楚子伐吳猶㑹申也執齊慶封殺之此伐吳也何以言執齊慶封殺之慶封弒齊君而吳納之伐吳所以為齊討也何以不言楚人殺齊慶封不與楚子得討賊之辭也楚子亦一慶封爾故先名而後言殺之之緩辭也不與其正之辭也遂滅賴賴國也孰滅之諸侯滅之也九月取鄫鄫莒附庸之國也莒前滅鄫取鄫何以復見莒復封之以為附庸也去疾立而不撫鄫故我取焉冬十有二月乙卯叔孫豹卒五年春王正月舍中軍舍者何不用也季氏始分公室作三軍叔孫氏為中軍叔孫豹卒復欲兼二氏故毁其軍四分公室而擇其二二子各取其一皆盡征而貢於公魯自是無賦矣何以不言復二軍魯初無二軍也葉子曰三軍之作叔孫豹初不欲也盟諸僖閎詛諸五父之衢蓋知季氏之意後必有甚於此者矣故復竊其名以行其志中軍舍而季氏兼取其二則其舍有進於三軍者是以齊國書之役孟氏以孺子泄帥右師季氏以冉求帥左師各以其家臣為之將而叔孫武叔獨退而搜乘則叔孫氏為無軍矣然季孫意如叔弓仲孫貜復以三軍伐莒見於昭季孫斯叔孫州仇仲孫何忌復以三軍伐邾見於哀則三軍之施舍時出而用之初不繫其所為將亦不必皆三家之臣但分其民與賦而已故作三軍而前已見四軍舍中軍而後復見三軍公羊榖梁或以為近正或以為近古者皆不知其事而意之也楚殺其大夫屈申屈申楚大夫之三命者也申楚之執政也靈王弒君而不能討及使之圍朱方而不得志於慶封故吳復來伐疑其二於吳而殺之屈申之死罪纍上也故以國殺公如晉夏莒牟夷以牟婁及防兹來奔牟夷莒大夫之再命者也何以言牟婁及防兹牟婁私邑防兹公邑不以私邑纍公邑也秋七月公至自晉戊辰叔弓帥師敗莒師于蚡泉秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳越始與伐何以得稱人能從討吳則越為可進也諸侯不可從楚而可伐吳故不以從楚廢伐吳也六年春王正月杞伯益姑卒葬秦景公夏季孫宿如晉葬杞文公宋華合比出奔衛華合比宋大夫之三命者也秋九月大雩楚薳罷帥師伐吳冬叔弓如楚齊侯伐北燕七年春王正月暨齊乎孰暨之我也何以不言及齊平連而逮彼曰及率而強彼曰暨齊自慶封來奔遂走之吳楚為齊討慶封而我不㑹齊蓋有憾於我矣故我求齊率之以為平叔孫婼於是如齊以涖盟三月公如楚叔孫婼如齊涖盟叔孫婼吾大夫之三命者也夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒九月公至自楚冬十有一月癸未季孫宿卒十有二月癸亥葬衛襄公八年春陳侯之弟招殺陳世子偃師兩下相殺不書此何以書重殺君之世子也其曰陳侯之弟招者何陳哀公生世子偃師既又生公子留而嬖以留屬於招哀公疾招遂殺偃師而立留以哀公為親其弟而忘其子也故目弟焉夏四月辛丑陳侯溺卒叔弓如晉楚人執陳行人干徴師殺之干徴師陳大夫之三命者也徴師以哀公卒赴于楚且告立君而以公子勝之訴不治招而殺徴師非伯討也故以人執先名而後言殺之之緩辭也不與其正之辭也陳公子留出奔鄭留未逾年之君也其曰公子留者何留偃師之弟也不與留之得成君則是猶公子留也秋搜于紅搜春田之名也何以書不時且非其地也何以不言公季孫意如復得政欲以動其民則非公之所為也葉子曰四時之田天子諸侯之常事也不書桓書大閲大閲冬事也冬田則狩也莊書治兵治兵秋事也秋田則獮也不記狩記大閲不記獮記治兵以其為之者不以田也桓書狩于郎莊書狩于禚不記大閲而記狩于郎于禚以其為之者不以武事也自莊而後田之不見于春秋者六世非皆廢而不舉其為之者以常事則不書也至昭而纍書搜大搜者三定而纍書大搜者二是豈習武事者哉蓋自季氏作三軍凡君之政皆在三家既而復舍中軍以為二公皆不得與焉臣之者三家也征之者三家也貢之者三家也則其所謂搜與大搜者皆自以閲其軍實而已是以自紅而後一名之曰搜而加大焉亦非復先王春田之事比蒲之役邾子來㑹公而不書公則此五書皆不見公公非不與也以非公之為則不書也陳人殺其大夫公子過公子過陳大夫之三命者也過招之黨也哀公同以留屬而殺偃師者楚既殺干徴師故招懼而歸罪於過以說楚雖招之為固亦陳人之所欲討也大夫有罪而衆殺之故以人殺大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奂楚為偃師討而滅陳非討賊也滅國而已不殺招而放之則招之自免者亦不得行於公子過孔奂招之黨而反殺之故奂雖得討賊之辭而招不正其為放是以先名而後言放之之緩辭也不與其正之辭也此楚子則曷為謂之師不正其伯討則是其為師焉者而已矣葬陳哀公陳已滅矣哀公何以得葬楚子葬之以說陳也葬臣子之事也諡臣之所以誄其君也楚子知滅陳之為愧不知奪人之國而身行其臣子之事為尤愧也故齊取紀而書葬紀伯姬楚滅陳而書葬陳哀公春秋正其辭而一施之焉葉氏春秋傳卷十七
